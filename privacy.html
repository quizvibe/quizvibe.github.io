function setLang(l) {

  localStorage.setItem('quizdrop_lang', l);
  document.getElementById('back-link').textContent = t.backLink;
  document.title = t.title + ' - QuizDrop';
  document.getElementById('content').innerHTML = `
    <h1>${t.title}</h1>
    <p class="updated">${t.updated}</p>
    ${t.body}
  `;
}

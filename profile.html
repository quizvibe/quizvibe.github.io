<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人頁面 - QuizDrop</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
  * { font-family: 'Noto Sans TC', sans-serif; }
  body { background: #f7f2e9; color: #4a3f35; margin: 0; }

  .topbar {
    height: 64px; background: rgba(255,253,248,0.94); backdrop-filter: blur(10px);
    border-bottom: 1px solid #ece4d4; display: flex; align-items: center; padding: 0 20px; gap: 14px;
    position: sticky; top: 0; z-index: 10;
  }
  .back-btn { display:flex; align-items:center; gap:6px; font-weight:700; font-size:14px; color:#4a3f35; text-decoration:none; }
  .logo { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 18px; }
  .logo .drop { color: #a9633a; }
  .topbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
  .lang-pill { display: flex; gap: 3px; background: #f1e9da; border-radius: 10px; padding: 3px; }
  .lang-pill button { padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; color: #9c8f7e; border: none; background: none; cursor: pointer; transition: all .2s; }
  .lang-pill button.active { background: #fffdf8; color: #a9633a; box-shadow: 0 1px 4px rgba(80,60,30,0.1); }

  .wrap { max-width: 680px; margin: 0 auto; padding: 40px 20px 80px; }

  .profile-card {
    background: #fffdf8; border-radius: 20px; padding: 32px 28px; margin-bottom: 28px;
    border: 1.5px solid #d9cbb3; box-shadow: 0 4px 20px -8px rgba(80,60,30,0.08);
  }

  .avatar-big {
    width: 72px; height: 72px; border-radius: 50%;
    background: #a9633a; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 800; margin-bottom: 16px;
  }

  .field-label { font-size: 12px; font-weight: 700; color: #9c8f7e; margin-bottom: 6px; display:block; }
  .input-field {
    width: 100%; padding: 12px 16px; border-radius: 10px; border: 1.5px solid #d9cbb3;
    font-size: 14.5px; margin-bottom: 16px; outline: none; transition: border-color .2s;
    background: #fffdf8; color: #4a3f35;
  }
  .input-field:focus { border-color: #a9633a; }
  .input-field:disabled { background: #f1e9da; color: #9c8f7e; }

  .btn-save {
    padding: 12px 28px; border-radius: 4px; background: #4a3f35;
    color: #fff; font-weight: 800; border: none; cursor: pointer; font-size: 14px; transition: opacity .2s;
  }
  .btn-save:hover { opacity: 0.9; }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-change-pw {
    width: 100%; margin-top: 10px; padding: 12px 28px; border-radius: 99px; background: none;
    color: #4a3f35; font-weight: 700; border: 1.5px solid #d9cbb3; cursor: pointer; font-size: 13.5px; transition: all .2s;
  }
  .btn-change-pw:hover { background: #f7f2e9; }

  .btn-logout-bottom {
    width: 100%; margin-top: 24px; padding: 14px; border-radius: 12px; background: none;
    color: #b14a35; font-weight: 700; border: 1.5px solid #e0b8a8; cursor: pointer; font-size: 14px; transition: all .2s;
  }
  .btn-logout-bottom:hover { background: #f6e0d8; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(60,45,30,0.45); backdrop-filter: blur(4px);
    z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box { background: #fffdf8; border-radius: 22px; padding: 32px 28px; max-width: 380px; width: 100%; position: relative; }
  .modal-close { position: absolute; top: 16px; right: 16px; width: 30px; height: 30px; border-radius: 50%; background: #f1e9da; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #9c8f7e; }
  .modal-title { font-size: 19px; font-weight: 900; margin-bottom: 4px; color: #4a3f35; }
  .modal-sub { font-size: 13px; color: #9c8f7e; margin-bottom: 20px; }

  .pw-field-wrap { position: relative; margin-bottom: 14px; }
  .pw-field-wrap .input-field { margin-bottom: 0; padding-right: 46px; }
  .pw-eye {
    position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
    width: 36px; height: 36px; border: none; background: none; cursor: pointer;
    font-size: 16px; opacity: 0.5; transition: opacity .2s; border-radius: 8px;
  }
  .pw-eye:hover { opacity: 1; background: #f1e9da; }
  .pw-eye.showing { opacity: 0.9; }

  .save-msg { font-size: 13px; padding: 8px 0; display: none; }
  .save-msg.success { color: #4a7a3a; display: block; }
  .save-msg.error { color: #b14a35; display: block; }

  .section-title { font-size: 18px; font-weight: 900; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; color: #4a3f35; }

  .tab-row { display: flex; gap: 8px; margin-bottom: 18px; border-bottom: 1.5px solid #ece4d4; }
  .tab-btn { padding: 12px 4px; background: none; border: none; font-size: 14.5px; font-weight: 700; color: #9c8f7e; cursor: pointer; border-bottom: 2.5px solid transparent; margin-right: 16px; font-family: inherit; }
  .tab-btn.active { color: #a9633a; border-bottom-color: #a9633a; }

  .blackboard-trigger {
    width: 100%; padding: 13px; border-radius: 10px; background: #f1e9da; border: 1.5px dashed #c99a6b;
    color: #a9633a; font-weight: 700; font-size: 13.5px; cursor: pointer; margin-bottom: 16px;
  }

  .game-history-item {
    display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px 12px; border-bottom: 1px solid #ece4d4;
    cursor: pointer; transition: background .15s; font-size: 13.5px; color: #4a3f35; border-radius: 10px;
  }
  .game-history-item:hover { background: #f7f2e9; }
  .game-history-item .ghi-left { display: flex; align-items: center; gap: 10px; }
  .game-history-item .ghi-arrow { color: #b5a890; font-size: 16px; flex-shrink: 0; }

  .blackboard-overlay { position: fixed; inset: 0; background: rgba(40,30,20,.5); z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px; }
  .blackboard-overlay.show { display: flex; }
  .blackboard-box {
    background: #1e352f; border: 3px solid rgba(255,255,255,0.4); border-radius: 16px; padding: 28px 24px;
    max-width: 400px; width: 100%; color: #f0ead6; font-family: 'Noto Sans TC', sans-serif;
    box-shadow: 0 0 0 6px rgba(255,255,255,0.05) inset;
  }
  .blackboard-title { font-size: 17px; font-weight: 900; margin-bottom: 18px; text-align: center; }
  .blackboard-row { margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px dashed rgba(255,255,255,0.25); }
  .blackboard-row:last-child { border-bottom: none; }
  .blackboard-game-name { font-weight: 800; font-size: 14px; margin-bottom: 6px; }
  .blackboard-stat { font-size: 12.5px; color: #c8d8d0; line-height: 1.6; }
  .blackboard-close { width: 100%; padding: 11px; border-radius: 10px; background: rgba(255,255,255,0.15); color: #fff; border: none; font-weight: 700; margin-top: 14px; cursor: pointer; }

  .history-item {
    background: #fffdf8; border: 1.5px solid #d9cbb3; border-radius: 16px; padding: 18px 20px;
    display: flex; align-items: center; gap: 14px; margin-bottom: 10px; transition: all .2s;
  }
  .history-item:hover { box-shadow: 0 6px 16px -6px rgba(80,60,30,0.1); transform: translateX(2px); border-color: #a9633a; }
  .history-emoji { font-size: 28px; flex-shrink: 0; }
  .history-info { flex: 1; }
  .history-title { font-weight: 700; font-size: 14.5px; color: #4a3f35; }
  .history-result { font-size: 13px; color: #a9633a; font-weight: 600; margin-top: 2px; }
  .history-date { font-size: 11.5px; color: #b5a890; margin-top: 2px; }

  .empty-state { text-align: center; padding: 50px 20px; color: #b5a890; }
  .empty-state .emoji { font-size: 44px; margin-bottom: 12px; display: block; }

  .login-required { text-align: center; padding: 80px 20px; }
  .login-required .emoji { font-size: 56px; margin-bottom: 16px; display: block; }
  .login-required h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; color: #4a3f35; }
  .login-required p { color: #9c8f7e; font-size: 14px; margin-bottom: 24px; }
  .login-required a {
    display: inline-block; padding: 13px 32px; border-radius: 4px;
    background: #4a3f35; color: #fff; font-weight: 800;
    text-decoration: none; font-size: 14.5px;
  }
</style>

<div class="wrap">

    <a href="index.html" id="login-required-link">回首頁登入 →</a>
  </div>

  <!-- Logged in state -->
  <div id="profile-view" class="hidden">

    <div class="profile-card">
      <div class="avatar-big" id="avatar-initial">U</div>
      <label class="field-label" id="label-nickname">暱稱</label>
      <input type="text" class="input-field" id="nickname-input" maxlength="20" />

      <label class="field-label" id="label-email">Email</label>
      <input type="text" class="input-field" id="email-display" disabled />

      <button class="btn-save" onclick="saveProfile()" id="save-btn">儲存變更</button>
      <button class="btn-change-pw" onclick="openPasswordModal()" id="btn-change-pw-text">🔑 修改密碼</button>
      <div class="save-msg" id="save-msg"></div>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" id="tab-quiz" onclick="switchTab('quiz')">📜 測驗紀錄</button>
      <button class="tab-btn" id="tab-game" onclick="switchTab('game')">🎮 糞Game紀錄</button>
    </div>

    <div id="quiz-tab-content">
      <div id="history-list">
        <div class="empty-state">
          <span class="emoji">🌱</span>
          <span id="loading-text">載入中...</span>
        </div>
      </div>
    </div>

    <div id="game-tab-content" class="hidden">
      <button class="blackboard-trigger" onclick="showBlackboardModal()" id="blackboard-trigger-text">📊 查看全站總任務黑板</button>
      <div id="game-history-list">
        <div class="empty-state">
          <span class="emoji">🎮</span>
          <span id="no-game-history-text">還沒有遊戲紀錄，去玩一場吧！</span>
        </div>
      </div>
    </div>

    <button class="btn-logout-bottom" onclick="handleProfileLogout()" id="btn-logout-text">🚪 登出</button>

  </div>

</div>

<div class="blackboard-overlay" id="blackboard-overlay">
  <div class="blackboard-box">
    <div class="blackboard-title" id="blackboard-title-text">📊 全站總任務黑板</div>
    <div id="blackboard-content"></div>
    <button class="blackboard-close" onclick="closeBlackboardModal()" id="blackboard-close-text">關閉</button>
  </div>
</div>

<div class="modal-overlay" id="password-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closePasswordModal()">✕</button>
    <div id="pw-step-form">
      <div class="modal-title" id="pw-modal-title">🔑 修改密碼</div>
      <div class="modal-sub" id="pw-modal-sub">請輸入目前密碼與新密碼</div>

      <label class="field-label" id="label-pw-old">目前密碼</label>
      <div class="pw-field-wrap">
        <input type="password" class="input-field" id="pw-old" />
        <button type="button" class="pw-eye" onclick="togglePwVisibility('pw-old', this)">👁️</button>
      </div>

      <label class="field-label" id="label-pw-new">新密碼（至少6位數）</label>
      <div class="pw-field-wrap">
        <input type="password" class="input-field" id="pw-new" />
        <button type="button" class="pw-eye" onclick="togglePwVisibility('pw-new', this)">👁️</button>
      </div>

      <label class="field-label" id="label-pw-new-confirm">再次輸入新密碼</label>
      <div class="pw-field-wrap">
        <input type="password" class="input-field" id="pw-new-confirm" />
        <button type="button" class="pw-eye" onclick="togglePwVisibility('pw-new-confirm', this)">👁️</button>
      </div>

      <div class="form-msg" id="pw-form-msg"></div>
      <button class="btn-save" id="pw-submit-btn" onclick="handlePasswordSubmit()">確認變更</button>
    </div>

    <div id="pw-step-confirm" class="hidden">
      <div class="modal-title" id="pw-confirm-title">⚠️ 確定要變更密碼嗎？</div>
      <div class="modal-sub" id="pw-confirm-sub">變更後，下次登入請使用新密碼</div>
      <div style="display:flex; gap:10px; margin-top:20px;">
        <button class="btn-save" style="background:#f1e9da; color:#4a3f35;" onclick="cancelPasswordConfirm()" id="pw-cancel-text">取消</button>
        <button class="btn-save" onclick="finalizePasswordChange()" id="pw-confirm-final-text">確定變更</button>
      </div>
    </div>

    <div id="pw-step-success" class="hidden" style="text-align:center;">
      <span style="font-size:48px; display:block; margin-bottom:12px;">✅</span>
      <div class="modal-title" id="pw-success-title">密碼已成功變更！</div>
      <button class="btn-save" onclick="closePasswordModal()" id="pw-success-done-text">完成</button>
    </div>
  </div>
</div>

  document.getElementById('label-pw-new').textContent = t.labelPwNew;
  document.getElementById('label-pw-new-confirm').textContent = t.labelPwNewConfirm;
  document.getElementById('pw-confirm-title').textContent = t.pwConfirmTitle;
  document.getElementById('pw-confirm-sub').textContent = t.pwConfirmSub;
  document.getElementById('pw-cancel-text').textContent = t.pwCancel;
  document.getElementById('pw-confirm-final-text').textContent = t.pwConfirmFinal;
  document.getElementById('pw-success-title').textContent = t.pwSuccessTitle;
  document.getElementById('pw-success-done-text').textContent = t.pwSuccessDone;

  // 重新渲染依賴語言的動態內容（測驗紀錄的標題/結果本身不翻譯，但日期格式與空狀態文字要跟著語言切換）
  if (currentUser) {
    if (!document.getElementById('quiz-tab-content').classList.contains('hidden')) loadHistory();
    if (!document.getElementById('game-tab-content').classList.contains('hidden')) renderGameHistory();
  }
}

(function initLangFromStorage() {
  const saved = localStorage.getItem('quizdrop_lang') || 'zh';
  currentLang = saved;
  document.querySelectorAll('[data-lang-btn]').forEach(b => b.classList.toggle('active', b.dataset.langBtn === saved));
})();

let currentUser = null;

async function init() {
  setLang(currentLang); // 套用之前儲存的語言偏好，確保載入時文字已是正確語言
  const { data: { session } } = await supabaseClient.auth.getSession();

  if (!session) {
    document.getElementById('login-required-view').classList.remove('hidden');
    document.getElementById('profile-view').classList.add('hidden');
    return;
  }

  currentUser = session.user;
  document.getElementById('login-required-view').classList.add('hidden');
  document.getElementById('profile-view').classList.remove('hidden');

  // 載入 users 表的資料（暱稱）
  const { data: userRow, error } = await supabaseClient
    .from('users')
    .select('display_name, email')
    .eq('id', currentUser.id)
    .single();

  const displayName = userRow?.display_name || currentUser.email.split('@')[0];
  document.getElementById('nickname-input').value = displayName;
  document.getElementById('email-display').value = currentUser.email;
  document.getElementById('avatar-initial').textContent = displayName.charAt(0).toUpperCase();

  /* ============================================================ */
/* 糞Game 紀錄頁籤 + 全站任務黑板                                   */
/* ============================================================ */
const GAMES_META = [
  { id: 'timing', title: '黃金秒數盲數挑戰', emoji: '⏱️', url: 'game-timing.html' },
  { id: 'chicken', title: '社畜超度：尖叫雞進化論', emoji: '🐔', url: 'game-chicken.html' },
  { id: 'bubble', title: '強迫症救星：無限捏泡泡紙', emoji: '🫧', url: 'game-bubble.html' },
];

function switchTab(tab) {
  document.getElementById('tab-quiz').classList.toggle('active', tab === 'quiz');
  document.getElementById('tab-game').classList.toggle('active', tab === 'game');
  document.getElementById('quiz-tab-content').classList.toggle('hidden', tab !== 'quiz');
  document.getElementById('game-tab-content').classList.toggle('hidden', tab !== 'game');
  if (tab === 'game') renderGameHistory();
}

function getGameProgress() {
  const raw = localStorage.getItem('quizdrop_game_progress');
  return raw ? JSON.parse(raw) : {
    timing: { wins: 0, plays: 0, stylesUnlocked: ['default'] },
    chicken: { hits: 0, plays: 0, stylesUnlocked: ['default'] },
    bubble: { totalPopped: 0, fastestSheetMs: null, stylesUnlocked: ['default'] },
  };
}

function renderGameHistory() {
  const progress = getGameProgress();
  const listEl = document.getElementById('game-history-list');
  const t = i18nProfile[currentLang];

  const rows = GAMES_META.map(g => {
    let recordText = t.notPlayedYet;
    if (g.id === 'timing' && progress.timing.plays > 0) {
      recordText = t.timingRecord(progress.timing.wins, progress.timing.plays);
    } else if (g.id === 'chicken' && progress.chicken.hits > 0) {
      recordText = t.chickenRecord(progress.chicken.hits);
    } else if (g.id === 'bubble' && progress.bubble.totalPopped > 0) {
      const fastest = progress.bubble.fastestSheetMs ? t.fastestSuffix((progress.bubble.fastestSheetMs / 1000).toFixed(2)) : '';
      recordText = t.bubbleRecord(progress.bubble.totalPopped) + fastest;
    }
    return `
      <div class="game-history-item" onclick="window.location.href='${g.url}'">
        <div class="ghi-left">
          <span>${g.emoji}</span>
          <span>${g.title}　｜　${t.latestRecord}：${recordText}</span>
        </div>
        <span class="ghi-arrow">→</span>
      </div>
    `;
  }).join('');

  listEl.innerHTML = rows;
}

function showBlackboardModal() {
  const progress = getGameProgress();
  const content = GAMES_META.map(g => {
    let stats = '';
    if (g.id === 'timing') {
      stats = `累積勝利：${progress.timing.wins} 次<br>累積遊玩：${progress.timing.plays} 次<br>已解鎖風格：${progress.timing.stylesUnlocked.length} / 3`;
    } else if (g.id === 'chicken') {
      stats = `累積暴擊：${progress.chicken.hits} 次<br>已解鎖風格：${progress.chicken.stylesUnlocked.length} / 2`;
    } else if (g.id === 'bubble') {
      const fastest = progress.bubble.fastestSheetMs ? (progress.bubble.fastestSheetMs / 1000).toFixed(2) + ' 秒' : '尚無紀錄';
      stats = `累積捏爆：${progress.bubble.totalPopped} 個<br>單張最快手速：${fastest}<br>已解鎖風格：${progress.bubble.stylesUnlocked.length} / 2`;
    }
    return `
      <div class="blackboard-row">
        <div class="blackboard-game-name">${g.emoji} ${g.title}</div>
        <div class="blackboard-stat">${stats}</div>
      </div>
    `;
  }).join('');

  document.getElementById('blackboard-content').innerHTML = content;
  document.getElementById('blackboard-overlay').classList.add('show');
}

function closeBlackboardModal() {
  document.getElementById('blackboard-overlay').classList.remove('show');
}

loadHistory();
}

async function saveProfile() {
  const nickname = document.getElementById('nickname-input').value.trim();
  const btn = document.getElementById('save-btn');
  const msg = document.getElementById('save-msg');

  if (!nickname) {
    msg.textContent = '暱稱不能空白';
    msg.className = 'save-msg error';
    return;
  }

  btn.disabled = true;
  try {
    const { error } = await supabaseClient
      .from('users')
      .update({ display_name: nickname })
      .eq('id', currentUser.id);

    if (error) throw error;

    msg.textContent = '已儲存！';
    msg.className = 'save-msg success';
    document.getElementById('avatar-initial').textContent = nickname.charAt(0).toUpperCase();
  } catch (err) {
    msg.textContent = '儲存失敗：' + err.message;
    msg.className = 'save-msg error';
  } finally {
    btn.disabled = false;
    setTimeout(() => { msg.style.display = 'none'; }, 3000);
  }
}

// 測驗 ID 對應到實際的測驗頁面檔名，用於「重溫結果」的連結
const QUIZ_URL_MAP = {
  '00000000-0000-0000-0000-000000000001': 'edge-quiz.html',
  '00000000-0000-0000-0000-000000000002': 'love-quiz-v2.html',
  '00000000-0000-0000-0000-000000000003': 'work-quiz-v2.html',
  '00000000-0000-0000-0000-000000000004': 'soul-aging-quiz.html',
  '00000000-0000-0000-0000-000000000005': 'wild-quiz.html',
};

async function loadHistory() {
  const listEl = document.getElementById('history-list');
  const t = i18nProfile[currentLang];

  const { data, error } = await supabaseClient
    .from('quiz_results')
    .select('result_label, result_title, played_at, quiz_id, quizzes(title)')
    .eq('user_id', currentUser.id)
    .order('played_at', { ascending: false });

  if (error || !data || data.length === 0) {
    listEl.innerHTML = `
      <div class="empty-state">
        <span class="emoji">🌱</span>
        ${t.noQuizHistory}
      </div>
    `;
    return;
  }

  const localeMap = { zh: 'zh-TW', ja: 'ja-JP', en: 'en-US' };

  listEl.innerHTML = data.map(item => {
    const date = new Date(item.played_at).toLocaleDateString(localeMap[currentLang], { year:'numeric', month:'long', day:'numeric' });
    const quizTitle = item.quizzes?.title || t.unknownQuiz;
    const quizUrl = QUIZ_URL_MAP[item.quiz_id];
    const linkHref = quizUrl ? `${quizUrl}?result=${encodeURIComponent(item.result_label)}` : '#';
    const clickable = quizUrl ? `onclick="window.location.href='${linkHref}'" style="cursor:pointer;"` : '';
    return `
      <div class="history-item" ${clickable}>
        <span class="history-emoji">✨</span>
        <div class="history-info">
          <div class="history-title">${escapeHtml(quizTitle)}</div>
          <div class="history-result">${t.resultLabel}：${escapeHtml(item.result_title || item.result_label)}</div>
          <div class="history-date">${date}</div>
        </div>
        ${quizUrl ? '<span style="color:#ccc;font-size:18px;">›</span>' : ''}
      </div>
    `;
  }).join('');
}

// XSS 防護：簡單轉義特殊字元
function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ============================================================ */
/* 修改密碼流程：開啟Modal → 填寫表單 → 二次確認 → 完成              */
/* ============================================================ */
function openPasswordModal() {
  document.getElementById('password-modal').classList.add('show');
  document.getElementById('pw-step-form').classList.remove('hidden');
  document.getElementById('pw-step-confirm').classList.add('hidden');
  document.getElementById('pw-step-success').classList.add('hidden');
  document.getElementById('pw-form-msg').style.display = 'none';
}

function closePasswordModal() {
  document.getElementById('password-modal').classList.remove('show');
  document.getElementById('pw-old').value = '';
  document.getElementById('pw-new').value = '';
  document.getElementById('pw-new-confirm').value = '';
  // 重置密碼顯示狀態，避免下次打開時殘留「顯示中」的狀態
  document.querySelectorAll('#password-modal .pw-field-wrap input').forEach(input => { input.type = 'password'; });
  document.querySelectorAll('#password-modal .pw-eye').forEach(btn => { btn.textContent = '👁️'; btn.classList.remove('showing'); });
}

function togglePwVisibility(inputId, btn) {
  const input = document.getElementById(inputId);
  const showing = input.type === 'text';
  const savedValue = input.value; // Chrome 強密碼自動填入後切換 type 有時會清空顯示，先保存值
  input.type = showing ? 'password' : 'text';
  if (input.value !== savedValue) {
    input.value = savedValue;
  }
  btn.textContent = showing ? '👁️' : '🙈';
  btn.classList.toggle('showing', !showing);
}

function showPwMsg(msg, type) {
  const el = document.getElementById('pw-form-msg');
  el.textContent = msg;
  el.className = 'form-msg ' + type;
  el.style.display = 'block';
}

let pendingNewPassword = null;
let pendingOldPassword = null;

async function handlePasswordSubmit() {
  const oldPw = document.getElementById('pw-old').value;
  const newPw = document.getElementById('pw-new').value;
  const newPwConfirm = document.getElementById('pw-new-confirm').value;

  if (!oldPw || !newPw || !newPwConfirm) {
    showPwMsg('請填寫所有欄位', 'error');
    return;
  }
  if (newPw.length < 6) {
    showPwMsg('新密碼至少需要 6 個字元', 'error');
    return;
  }
  if (newPw !== newPwConfirm) {
    showPwMsg('兩次輸入的新密碼不一致，請再確認一次', 'error');
    return;
  }
  if (newPw === oldPw) {
    showPwMsg('新密碼不能跟目前密碼相同', 'error');
    return;
  }

  // 先驗證舊密碼是否正確：用目前帳號的 email + 輸入的舊密碼重新登入測試
  const btn = document.getElementById('pw-submit-btn');
  btn.disabled = true;
  btn.textContent = '驗證中...';

  try {
    const { data: { user } } = await supabaseClient.auth.getUser();
    const { error: signInError } = await supabaseClient.auth.signInWithPassword({ email: user.email, password: oldPw });
    if (signInError) {
      showPwMsg('目前密碼輸入錯誤，請重新確認', 'error');
      btn.disabled = false;
      btn.textContent = '確認變更';
      return;
    }

    // 舊密碼驗證通過，進入二次確認畫面
    pendingNewPassword = newPw;
    pendingOldPassword = oldPw;
    document.getElementById('pw-step-form').classList.add('hidden');
    document.getElementById('pw-step-confirm').classList.remove('hidden');
  } catch (err) {
    console.error('Password verify error:', err.message, err);
    showPwMsg('驗證失敗，請再試一次', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '確認變更';
  }
}

function cancelPasswordConfirm() {
  document.getElementById('pw-step-confirm').classList.add('hidden');
  document.getElementById('pw-step-form').classList.remove('hidden');
}

async function finalizePasswordChange() {
  try {
    const { error } = await supabaseClient.auth.updateUser({ password: pendingNewPassword });
    if (error) throw error;

    document.getElementById('pw-step-confirm').classList.add('hidden');
    document.getElementById('pw-step-success').classList.remove('hidden');
    pendingNewPassword = null;
    pendingOldPassword = null;
  } catch (err) {
    console.error('Password update error:', err.message, err);
    alert('密碼變更失敗：' + (err.message || '請再試一次'));
    document.getElementById('pw-step-confirm').classList.add('hidden');
    document.getElementById('pw-step-form').classList.remove('hidden');
  }
}

  if (confirm(i18nProfile[currentLang].confirmLogout)) {

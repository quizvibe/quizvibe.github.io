<script>
const SUPABASE_URL = 'https://xsflpzozgdgbtrtdzdlj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzZmxwem96Z2RnYnRydGR6ZGxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTMyMzUsImV4cCI6MjA5NzE4OTIzNX0.Uyi5dYa73h0JJ9KwT2bP0C79wV_H-PoYneiR5xsbT6I';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;
supabaseClient.auth.getSession().then(({ data: { session } }) => { currentUser = session?.user || null; });

function getGuestId() {
  let gid = localStorage.getItem('quizdrop_guest_id');
  if (!gid) { gid = 'guest_' + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('quizdrop_guest_id', gid); }
  return gid;
}

const AudioEngine = (() => {
  let ctx = null;
  function getCtx() { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); if (ctx.state === 'suspended') ctx.resume(); return ctx; }
  function playScream() {
    const c = getCtx(); const now = c.currentTime;
    const osc = c.createOscillator(); const gain = c.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(1400 + Math.random() * 300, now);
    osc.frequency.exponentialRampToValueAtTime(180, now + 0.35);
    gain.gain.setValueAtTime(0.16, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    osc.connect(gain).connect(c.destination); osc.start(now); osc.stop(now + 0.4);
  }
  return { playScream, getCtx };
})();

const PROGRESS_KEY = 'quizdrop_game_progress';
function getProgress() {
  const raw = localStorage.getItem(PROGRESS_KEY);
  return raw ? JSON.parse(raw) : {
    timing: { wins: 0, plays: 0, stylesUnlocked: ['default'] },
    chicken: { hits: 0, plays: 0, stylesUnlocked: ['default'] },
    bubble: { totalPopped: 0, fastestSheetMs: null, stylesUnlocked: ['default'] },
  };
}
function saveProgress(p) { localStorage.setItem(PROGRESS_KEY, JSON.stringify(p)); }
function unlockStyle(gameId, styleName) {
  const p = getProgress();
  if (!p[gameId].stylesUnlocked.includes(styleName)) { p[gameId].stylesUnlocked.push(styleName); saveProgress(p); }
}

function showAdUnlockModal(onComplete) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(20,20,20,.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:20px;padding:28px;max-width:320px;width:100%;text-align:center;font-family:'Noto Sans TC',sans-serif;">
      <div style="font-size:13px;color:#999;margin-bottom:12px;font-weight:700;" id="adm-counter">廣告播放中...</div>
      <div style="background:repeating-linear-gradient(45deg,#f0f0f0,#f0f0f0 10px,#e8e8e8 10px,#e8e8e8 20px);border-radius:12px;height:140px;display:flex;align-items:center;justify-content:center;color:#999;font-size:13px;margin-bottom:14px;">📺 模擬廣告</div>
      <div style="height:6px;background:#f0f0f0;border-radius:99px;overflow:hidden;margin-bottom:14px;"><div id="adm-fill" style="height:100%;background:linear-gradient(90deg,#ff5da2,#ff8a5c);width:0%;transition:width .1s linear;"></div></div>
      <button id="adm-btn" disabled style="width:100%;padding:12px;border-radius:10px;background:#1f1f1f;color:#fff;border:none;font-weight:700;opacity:.3;cursor:not-allowed;">請等待...</button>
    </div>`;
  document.body.appendChild(overlay);
  let elapsed = 0; const duration = 3000;
  const fill = overlay.querySelector('#adm-fill'); const btn = overlay.querySelector('#adm-btn');
  const interval = setInterval(() => {
    elapsed += 100; fill.style.width = Math.min(100, (elapsed / duration) * 100) + '%';
    if (elapsed >= duration) {
      clearInterval(interval); btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer';
      btn.textContent = '完成，解鎖風格 →'; overlay.querySelector('#adm-counter').textContent = '廣告播放完畢！';
    }
  }, 100);
  btn.onclick = () => { document.body.removeChild(overlay); onComplete(); };
}

const PRESSURE_WORDS = ['收到請回覆！', 'KPI呢？', '加班一下吧', '明天早上交！', '誰叫你的？', '會議改到現在', '客戶在等', '老闆找你', '報告呢？', '今晚要嗎？'];

let hitCount = 0;
let currentStyle = 'default';
let syncTimer = null;

function hitChicken(e) {
  hitCount++;
  document.getElementById('hit-counter').textContent = i18nChicken[currentLang].hitCounter(hitCount);
  AudioEngine.playScream();

  const stageEl = currentStyle === 'default' ? document.getElementById('chicken-default') : document.getElementById('chicken-muscle');
  stageEl.classList.remove('shake');
  void stageEl.offsetWidth; // reflow 重置動畫
  stageEl.classList.add('shake');

  spawnFloatingText(e);

  const progress = getProgress();
  progress.chicken.hits = hitCount;
  saveProgress(progress);
  checkUnlocks();

  // 節流同步：每 20 次點擊才打一次 Supabase，避免過度頻繁的請求
  if (hitCount % 20 === 0) {
    saveGameResult('chicken', { totalHits: hitCount });
    pushProgressToCloud();
  }
}

function spawnFloatingText(e) {
  const stage = document.getElementById('chicken-stage');
  const rect = stage.getBoundingClientRect();
  const text = document.createElement('div');
  text.className = 'floating-text';
  text.textContent = PRESSURE_WORDS[Math.floor(Math.random() * PRESSURE_WORDS.length)];
  const x = (e.clientX || rect.left + rect.width / 2) - rect.left + (Math.random() * 40 - 20);
  const y = (e.clientY || rect.top + rect.height / 2) - rect.top;
  text.style.left = x + 'px';
  text.style.top = y + 'px';
  stage.appendChild(text);
  setTimeout(() => text.remove(), 1000);
}

async function saveGameResult(gameId, recordDetail) {
  try {
    await supabaseClient.from('game_results').insert({
      user_id: currentUser?.id || null,
      guest_id: currentUser ? null : getGuestId(),
      game_id: gameId,
      record_detail: recordDetail,
    });
  } catch (err) { console.warn('Game result sync failed (non-blocking):', err); }
}

function getStyleDefs() {
  const t = i18nChicken[currentLang];
  return [
    { id: 'default', label: t.styleDefault, unlockCondition: null },
    { id: 'muscle', label: t.styleMuscle, unlockCondition: (p) => p.chicken.hits >= 1000, unlockText: t.unlockMuscle },
  ];
}

function renderStyleRow() {
  const progress = getProgress();
  const t = i18nChicken[currentLang];
  const row = document.getElementById('style-row');
  row.innerHTML = getStyleDefs().map(s => {
    const unlocked = progress.chicken.stylesUnlocked.includes(s.id);
    const cls = 'style-chip' + (s.id === currentStyle ? ' active' : '') + (!unlocked ? ' locked' : '');
    return `<button class="${cls}" onclick="onStyleClick('${s.id}')">${s.label} ${!unlocked ? '🔒' : ''}</button>`;
  }).join('');
  document.getElementById('progress-text').textContent = t.hitCounter(progress.chicken.hits);
}

function onStyleClick(styleId) {
  const progress = getProgress();
  const t = i18nChicken[currentLang];
  const styleDef = getStyleDefs().find(s => s.id === styleId);
  const unlocked = progress.chicken.stylesUnlocked.includes(styleId);
  if (unlocked) { switchToStyle(styleId); return; }
  alert(t.lockedHint(styleDef.unlockText));
}

function switchToStyle(styleId) {
  currentStyle = styleId;
  document.getElementById('chicken-default').classList.toggle('hidden', styleId !== 'default');
  document.getElementById('chicken-muscle').classList.toggle('hidden', styleId !== 'muscle');
  renderStyleRow();
}

function checkUnlocks() {
  const progress = getProgress();
  getStyleDefs().forEach(s => {
    if (s.unlockCondition && s.unlockCondition(progress) && !progress.chicken.stylesUnlocked.includes(s.id)) {
      unlockStyle('chicken', s.id);
    }
  });
  renderStyleRow();
}

function showProgressModal() {
  const p = getProgress().chicken;
  const t = i18nChicken[currentLang];
  alert(t.progressModal(p.hits, p.stylesUnlocked.length, getStyleDefs().length));
}

window.addEventListener('beforeunload', () => {
  if (hitCount % 20 !== 0 && hitCount > 0) saveGameResult('chicken', { totalHits: hitCount });
});

/* ---------------- 登入狀態判斷 + 頭像顯示 ---------------- */
async function initAuthUI() {
  if (sessionStorage.getItem('quizdrop_just_logged_out') === '1') {
    sessionStorage.removeItem('quizdrop_just_logged_out');
    document.getElementById('qt-auth-buttons').classList.remove('hidden');
    document.getElementById('qt-user-chip-wrap').classList.add('hidden');
    currentUser = null;
    return;
  }

  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session?.user) {
    currentUser = session.user;
    showLoggedInUI(session.user);
    await syncProgressOnLogin(session.user.id);
  }
  supabaseClient.auth.onAuthStateChange((event, newSession) => {
    if (newSession?.user) {
      showLoggedInUI(newSession.user);
      currentUser = newSession.user;
      syncProgressOnLogin(newSession.user.id);
    } else {
      document.getElementById('qt-auth-buttons').classList.remove('hidden');
      document.getElementById('qt-user-chip-wrap').classList.add('hidden');
      currentUser = null;
    }
  });
}

function mergeProgress(localP, remoteP) {
  if (!remoteP) return localP;
  return {
    timing: {
      wins: Math.max(localP.timing.wins, remoteP.timing?.wins || 0),
      plays: Math.max(localP.timing.plays, remoteP.timing?.plays || 0),
      stylesUnlocked: Array.from(new Set([...(localP.timing.stylesUnlocked || []), ...(remoteP.timing?.stylesUnlocked || [])])),
    },
    chicken: {
      hits: Math.max(localP.chicken.hits, remoteP.chicken?.hits || 0),
      plays: Math.max(localP.chicken.plays, remoteP.chicken?.plays || 0),
      stylesUnlocked: Array.from(new Set([...(localP.chicken.stylesUnlocked || []), ...(remoteP.chicken?.stylesUnlocked || [])])),
    },
    bubble: {
      totalPopped: Math.max(localP.bubble.totalPopped, remoteP.bubble?.totalPopped || 0),
      fastestSheetMs: minIgnoreNull(localP.bubble.fastestSheetMs, remoteP.bubble?.fastestSheetMs),
      stylesUnlocked: Array.from(new Set([...(localP.bubble.stylesUnlocked || []), ...(remoteP.bubble?.stylesUnlocked || [])])),
    },
  };
}

function minIgnoreNull(a, b) {
  if (a == null) return b ?? null;
  if (b == null) return a;
  return Math.min(a, b);
}

async function syncProgressOnLogin(userId) {
  try {
    const { data, error } = await supabaseClient.from('game_progress').select('progress_data').eq('user_id', userId).single();
    const remoteP = (!error && data) ? data.progress_data : null;
    const localP = getProgress();
    const merged = mergeProgress(localP, remoteP);
    saveProgress(merged);
    await supabaseClient.from('game_progress').upsert({ user_id: userId, progress_data: merged, updated_at: new Date().toISOString() });
    if (typeof renderStyleRow === 'function') renderStyleRow();
  } catch (err) {
    console.warn('進度同步失敗（不影響當前遊玩，僅本機進度可能未跨裝置更新）:', err);
  }
}

async function pushProgressToCloud() {
  if (!currentUser) return;
  try {
    const current = getProgress();
    await supabaseClient.from('game_progress').upsert({ user_id: currentUser.id, progress_data: current, updated_at: new Date().toISOString() });
  } catch (err) {
    console.warn('進度雲端同步失敗（不影響本機遊玩）:', err);
  }
}

async function showLoggedInUI(user) {
  document.getElementById('qt-auth-buttons').classList.add('hidden');
  document.getElementById('qt-user-chip-wrap').classList.remove('hidden');

  let nickname = user.email?.split('@')[0] || '用戶';
  try {
    const { data: userRow } = await supabaseClient.from('users').select('display_name').eq('id', user.id).single();
    if (userRow?.display_name) nickname = userRow.display_name;
  } catch (err) {
    console.warn('讀取暱稱失敗，改用 email 帳號名顯示:', err);
  }

  document.getElementById('qt-username-display').textContent = nickname;
  document.getElementById('qt-avatar-initial').textContent = nickname.charAt(0).toUpperCase();
}

function toggleUserDropdown() {
  document.getElementById('qt-dropdown').classList.toggle('show');
}
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('qt-user-chip-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('qt-dropdown')?.classList.remove('show');
  }
});
function handleLogoutGames() {
  if (confirm(i18nChicken[currentLang].confirmLogout)) {
    supabaseClient.auth.signOut().then(() => {
      sessionStorage.setItem('quizdrop_just_logged_out', '1');
      localStorage.removeItem(PROGRESS_KEY);
      window.location.reload();
    });
  }
}

let currentLang = 'zh';
function setLang(l) {
  currentLang = l;
  document.querySelectorAll('[data-lang-btn]').forEach(b => b.classList.toggle('active', b.dataset.langBtn === l));
  localStorage.setItem('quizdrop_lang', l);
  const t = i18nChicken[l];
  document.querySelector('.game-title').textContent = t.gameTitle;
  document.querySelector('.game-sub').textContent = t.gameSub;
  document.querySelector('.back').textContent = t.back;
  document.querySelector('.tb-btn').textContent = t.progress;
  const loginBtn = document.querySelector('.qt-login');
  const signupBtn = document.querySelector('.qt-signup');
  if (loginBtn) loginBtn.textContent = t.login;
  if (signupBtn) signupBtn.textContent = t.signup;
  document.querySelector('#qt-dropdown button:not(.danger)').textContent = t.profile;
  document.querySelector('#qt-dropdown button.danger').textContent = t.logout;

  document.getElementById('hit-counter').textContent = t.hitCounter(hitCount);
  renderStyleRow();
}
(function initLangFromStorage() {
  const saved = localStorage.getItem('quizdrop_lang') || 'zh';
  setLang(saved);
})();

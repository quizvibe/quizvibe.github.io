let lang='zh',current=0,answers=[],selected=null,started=false;
function detectLang(){const n=navigator.language||'zh';return n.startsWith('ja')?'ja':n.startsWith('en')?'en':'zh';}
function setLang(l){lang=l;document.body.classList.toggle('lang-ja',l==='ja');document.querySelectorAll('.lang-btn').forEach((b,i)=>b.classList.toggle('active',['zh','ja','en'][i]===l));updateStatic();if(started)renderQ();}
function updateStatic(){const t=i18n[lang];document.getElementById('hero-title').textContent=t.title;document.getElementById('hero-sub').textContent=t.sub;document.getElementById('btn-start-label').textContent=t.start;document.getElementById('notice-label').textContent=t.notice;document.getElementById('home-link-label').textContent=t.home;if(started){document.getElementById('share-label').textContent=t.shareLabel;document.getElementById('btn-copy-label').textContent=t.copy;document.getElementById('btn-retry-label').textContent=t.retry;}}
function startQuiz(){started=true;document.getElementById('start-screen').style.display='none';document.getElementById('progress-wrap').style.display='block';document.getElementById('quiz-card').style.display='block';renderQ();}
function renderQ(){const qs=questions[lang],q=qs[current],t=i18n[lang];document.getElementById('q-num').textContent=t.qLabel(current+1,qs.length);document.getElementById('q-text').textContent=q.text;const opts=document.getElementById('options');opts.innerHTML='';q.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='opt'+(answers[current]===i?' selected':'');b.innerHTML=`<span class="opt-icon">${o.icon}</span><span>${o.text}</span>`;b.onclick=()=>selectOpt(i,b);opts.appendChild(b);});selected=answers[current]!==undefined?answers[current]:null;document.getElementById('btn-next').textContent=current===qs.length-1?t.finish:t.next;updateBtn();updateProg();}
function selectOpt(i,b){document.querySelectorAll('.opt').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');selected=i;answers[current]=i;updateBtn();}
function updateBtn(){document.getElementById('btn-next').classList.toggle('active',selected!==null);}
function updateProg(){const total=questions[lang].length;document.getElementById('progress-fill').style.width=(current/total*100)+'%';document.getElementById('progress-label').textContent=i18n[lang].pLabel(current,total);}
function nextQ(){if(selected===null)return;if(current<questions[lang].length-1){current++;selected=answers[current]!==undefined?answers[current]:null;renderQ();}else showResult();}
function calcWinner(){const s={ancient:0,medieval:0,renaissance:0,enlighten:0,industrial:0,modern:0,future:0};answers.forEach((ai,qi)=>{const sc=questions[lang][qi].opts[ai].scores;for(const k in sc)s[k]=(s[k]||0)+sc[k];});return Object.entries(s).sort((a,b)=>b[1]-a[1])[0][0];}
function showResult(){document.getElementById('quiz-card').style.display='none';const w=calcWinner(),r=results[lang][w],t=i18n[lang];document.getElementById('r-emoji').textContent=r.emoji;document.getElementById('r-title').textContent=r.title;document.getElementById('r-subtitle').textContent=r.subtitle;document.getElementById('r-desc').textContent=r.desc;document.getElementById('r-traits').innerHTML=r.traits.map(tr=>`<span class="trait">${tr}</span>`).join('');document.getElementById('share-label').textContent=t.shareLabel;document.getElementById('btn-copy-label').textContent=t.copy;document.getElementById('btn-retry-label').textContent=t.retry;document.getElementById('result-card').style.display='block';document.getElementById('progress-fill').style.width='100%';document.getElementById('progress-label').textContent=t.pLabel(questions[lang].length,questions[lang].length);document.getElementById('progress-wrap').style.display='block';}
function getShare(){const w=calcWinner(),r=results[lang][w];return{text:i18n[lang].shareText(r.emoji,r.title,r.subtitle),url:window.location.href};}
function shareTwitter(){const{text,url}=getShare();window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`,'_blank');}
function shareLine(){const{text,url}=getShare();window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`,'_blank');}
function shareFacebook(){const{url}=getShare();window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`,'_blank');}
function copyResult(){const{text,url}=getShare();navigator.clipboard.writeText(text+'\n'+url).then(()=>showToast(i18n[lang].copied));}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function retry(){current=0;answers=[];selected=null;document.getElementById('result-card').style.display='none';document.getElementById('quiz-card').style.display='block';renderQ();}
lang=detectLang();document.body.classList.toggle('lang-ja',lang==='ja');document.querySelectorAll('.lang-btn').forEach((b,i)=>b.classList.toggle('active',['zh','ja','en'][i]===lang));updateStatic();

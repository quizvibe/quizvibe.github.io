<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我要出題 - QuizDrop</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; }
  body { background: #faf7f2; color: #1f1f1f; min-height: 100vh; padding-bottom: 60px; }

  .topbar { height: 60px; background: #fff; border-bottom: 1px solid #ececec; display: flex; align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 20; }
  .back-btn { color: #777; font-size: 14px; text-decoration: none; display: flex; align-items: center; gap: 5px; }
  .logo { font-weight: 900; font-size: 18px; margin-left: auto; }
  .logo .drop { color: #ff5da2; }

  .wrap { max-width: 680px; margin: 0 auto; padding: 36px 20px; }

  /* ===== Locked state (paywall) ===== */
  .lock-card {
    background: #fff; border-radius: 24px; padding: 48px 32px; text-align: center;
    box-shadow: 0 8px 30px -10px rgba(0,0,0,0.08); border: 1px solid #f0f0f0;
  }
  .lock-emoji { font-size: 56px; margin-bottom: 18px; display: block; }
  .lock-card h2 { font-size: 22px; font-weight: 900; margin-bottom: 10px; }
  .lock-card p { color: #888; font-size: 14.5px; line-height: 1.7; margin-bottom: 28px; }
  .price-tag {
    display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(120deg,#fff0f5,#fff7ed);
    border: 1.5px solid #ffd1de; border-radius: 99px; padding: 10px 22px; font-size: 14px; font-weight: 700;
    color: #ff5da2; margin-bottom: 28px;
  }
  .btn-unlock {
    background: linear-gradient(120deg,#ff5da2,#ff8a5c); color: #fff; border: none; border-radius: 14px;
    padding: 16px 36px; font-size: 16px; font-weight: 800; cursor: pointer; transition: transform .2s;
    box-shadow: 0 8px 24px -6px rgba(255,93,162,.4);
  }
  .btn-unlock:hover { transform: translateY(-2px); }
  .unlock-timer { margin-top: 16px; font-size: 12.5px; color: #aaa; }

  /* ===== Ad placeholder modal ===== */
  .ad-overlay {
    position: fixed; inset: 0; background: rgba(20,20,20,0.6); z-index: 200;
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .ad-overlay.show { display: flex; }
  .ad-box { background: #fff; border-radius: 20px; padding: 32px; max-width: 360px; width: 100%; text-align: center; }
  .ad-placeholder {
    background: repeating-linear-gradient(45deg, #f0f0f0, #f0f0f0 10px, #e8e8e8 10px, #e8e8e8 20px);
    border-radius: 14px; height: 200px; display: flex; align-items: center; justify-content: center;
    color: #999; font-size: 13px; font-weight: 700; margin-bottom: 18px;
  }
  .ad-progress-bar { height: 6px; background: #f0f0f0; border-radius: 99px; overflow: hidden; margin-bottom: 14px; }
  .ad-progress-fill { height: 100%; background: linear-gradient(90deg,#ff5da2,#ff8a5c); width: 0%; transition: width .1s linear; }
  .ad-status { font-size: 13px; color: #888; margin-bottom: 16px; }
  .ad-counter { font-size: 13px; color: #ff5da2; font-weight: 700; margin-bottom: 16px; }
  .btn-ad-next {
    width: 100%; padding: 13px; border-radius: 12px; background: #1f1f1f; color: #fff; font-weight: 700;
    border: none; cursor: pointer; font-size: 14px; opacity: 0.3; pointer-events: none; transition: opacity .2s;
  }
  .btn-ad-next.ready { opacity: 1; pointer-events: all; }

  /* ===== Creator form ===== */
  #creator-form { display: none; }
  .section-card { background: #fff; border-radius: 20px; padding: 28px 24px; margin-bottom: 20px; border: 1px solid #f0f0f0; }
  .section-title { font-size: 15px; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .field-label { font-size: 12.5px; font-weight: 700; color: #999; margin-bottom: 6px; display: block; }
  .input-field, textarea.input-field {
    width: 100%; padding: 12px 16px; border-radius: 12px; border: 1.5px solid #ececec;
    font-size: 14px; margin-bottom: 14px; outline: none; transition: border-color .2s; font-family: inherit;
  }
  .input-field:focus { border-color: #ff8aae; }
  textarea.input-field { resize: vertical; }

  .result-block { background: #fafafa; border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 1px solid #f0f0f0; }
  .result-block-title { font-size: 13px; font-weight: 800; color: #ff5da2; margin-bottom: 10px; }

  .question-block { background: #fafafa; border-radius: 16px; padding: 18px; margin-bottom: 14px; border: 1px solid #f0f0f0; position: relative; }
  .question-num { font-size: 12.5px; font-weight: 800; color: #999; margin-bottom: 10px; }
  .option-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .option-row .input-field { margin-bottom: 0; flex: 1; }
  .option-row select { padding: 10px 12px; border-radius: 10px; border: 1.5px solid #ececec; font-size: 13px; background: #fff; font-family: inherit; flex-shrink: 0; width: 130px; }
  .btn-remove-q {
    position: absolute; top: 14px; right: 14px; width: 26px; height: 26px; border-radius: 50%;
    background: #ffeaea; color: #d83b3b; border: none; cursor: pointer; font-size: 13px; font-weight: 700;
  }

  .btn-add-q {
    width: 100%; padding: 14px; border-radius: 14px; background: #fff; border: 1.5px dashed #ffb3cb;
    color: #ff5da2; font-weight: 700; font-size: 14px; cursor: pointer; margin-bottom: 24px; transition: all .2s;
  }
  .btn-add-q:hover { background: #fff5f8; }
  .btn-add-q:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-publish {
    width: 100%; padding: 16px; border-radius: 14px; background: linear-gradient(120deg,#ff5da2,#ff8a5c);
    color: #fff; font-weight: 800; font-size: 16px; border: none; cursor: pointer; transition: opacity .2s;
  }
  .btn-publish:hover { opacity: 0.9; }
  .btn-publish:disabled { opacity: 0.5; cursor: not-allowed; }

  .form-msg { font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; display: none; }
  .form-msg.error { background: #ffeaea; color: #d83b3b; display: block; }
  .form-msg.success { background: #eaffea; color: #2da44e; display: block; }

  /* ===== Success / share screen ===== */
  #success-screen { display: none; text-align: center; padding: 40px 0; }
  .success-emoji { font-size: 64px; margin-bottom: 16px; display: block; }
  #success-screen h2 { font-size: 22px; font-weight: 900; margin-bottom: 10px; }
  .share-url-box {
    background: #fafafa; border: 1.5px solid #ececec; border-radius: 14px; padding: 14px 18px;
    font-size: 13.5px; color: #555; word-break: break-all; margin: 20px 0; text-align: left;
  }
  .btn-copy-url {
    background: #1f1f1f; color: #fff; border: none; border-radius: 12px; padding: 13px 28px;
    font-weight: 700; cursor: pointer; font-size: 14px; margin-right: 10px;
  }
  .btn-go-quiz {
    background: linear-gradient(120deg,#ff5da2,#ff8a5c); color: #fff; border: none; border-radius: 12px;
    padding: 13px 28px; font-weight: 700; cursor: pointer; font-size: 14px;
  }

  .login-required { text-align: center; padding: 80px 20px; }
  .login-required .emoji { font-size: 56px; margin-bottom: 16px; display: block; }
  .login-required h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
  .login-required p { color: #999; font-size: 14px; margin-bottom: 24px; }
  .login-required a {
    display: inline-block; padding: 13px 32px; border-radius: 99px;
    background: linear-gradient(120deg,#ff5da2,#ff8a5c); color: #fff; font-weight: 800;
    text-decoration: none; font-size: 14.5px;
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">← QuizDrop</a>
  <div class="logo">Quiz<span class="drop">Drop</span></div>
</div>

<div class="wrap">

  <!-- 未登入：要求先登入 -->
  <div id="login-required-view" class="login-required hidden">
    <span class="emoji">🔒</span>
    <h2>請先登入</h2>
    <p>登入後才能創作你的專屬心理測驗</p>
    <a href="index.html">回首頁登入 →</a>
  </div>

  <!-- 已登入但尚未解鎖：付費牆 -->
  <div id="lock-view" class="hidden">
    <div class="lock-card">
      <span class="lock-emoji">🚀</span>
      <h2>創作你的專屬心理測驗</h2>
      <p>設計題目、自訂結果，發布後立刻取得專屬連結，<br>分享給朋友一起玩！</p>
      <div class="price-tag">🎬 看 2 段廣告，解鎖 2 小時無限出題權限</div>
      <br>
      <button class="btn-unlock" onclick="startAdFlow()">看廣告，立即解鎖 →</button>
      <p class="unlock-timer" id="unlock-timer-text"></p>
    </div>
  </div>

  <!-- 已解鎖：出題表單 -->
  <div id="creator-view" class="hidden">
    <div class="form-msg" id="top-msg"></div>

    <div class="section-card">
      <div class="section-title">📝 測驗基本資訊</div>
      <label class="field-label">測驗名稱</label>
      <input type="text" class="input-field" id="quiz-title" placeholder="例如：你前世是什麼動物？" maxlength="60" />
      <label class="field-label">測驗簡介</label>
      <textarea class="input-field" id="quiz-desc" rows="2" placeholder="簡單介紹一下這個測驗在測什麼" maxlength="150"></textarea>
    </div>

    <div class="section-card">
      <div class="section-title">🏆 設定 4 個結果</div>
      <div id="results-container"></div>
    </div>

    <div class="section-card">
      <div class="section-title">❓ 設計題目（5～10 題）</div>
      <div id="questions-container"></div>
      <button class="btn-add-q" id="btn-add-question" onclick="addQuestion()">+ 新增題目</button>
    </div>

    <button class="btn-publish" id="btn-publish" onclick="publishQuiz()">🚀 發布測驗</button>
  </div>

  <!-- 發布成功畫面 -->
  <div id="success-screen">
    <span class="success-emoji">🎉</span>
    <h2>測驗發布成功！</h2>
    <p style="color:#888;font-size:14px;">把這個連結分享給朋友，讓他們也來玩玩看</p>
    <div class="share-url-box" id="share-url-display"></div>
    <button class="btn-copy-url" onclick="copyShareUrl()">📋 複製連結</button>
    <button class="btn-go-quiz" onclick="goToMyQuiz()">立即查看 →</button>
  </div>

</div>

<!-- 廣告占位視窗 -->
<div class="ad-overlay" id="ad-overlay">
  <div class="ad-box">
    <div class="ad-counter" id="ad-counter">廣告 1 / 2</div>
    <div class="ad-placeholder">📺 廣告播放中...</div>
    <div class="ad-progress-bar"><div class="ad-progress-fill" id="ad-progress-fill"></div></div>
    <div class="ad-status" id="ad-status">請耐心等待...</div>
    <button class="btn-ad-next" id="btn-ad-next" onclick="nextAdStep()">繼續</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xsflpzozgdgbtrtdzdlj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzZmxwem96Z2RnYnRydGR6ZGxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTMyMzUsImV4cCI6MjA5NzE4OTIzNX0.Uyi5dYa73h0JJ9KwT2bP0C79wV_H-PoYneiR5xsbT6I';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const UNLOCK_STORAGE_KEY = 'quizdrop_creator_unlock_until';
const UNLOCK_DURATION_MS = 2 * 60 * 60 * 1000; // 2 小時
const TOTAL_ADS = 2;
const AD_DURATION_MS = 3000; // 每段「廣告」模擬播放 3 秒（正式上線後可換成真實 AdSense 互動式廣告的回呼）

let currentUser = null;
let resultCount = 4;
let questionCount = 0;
const MIN_QUESTIONS = 5;
const MAX_QUESTIONS = 10;

/* ============================================================ */
/* 1. 初始化：檢查登入狀態與解鎖狀態                                */
/* ============================================================ */
async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();

  if (!session) {
    document.getElementById('login-required-view').classList.remove('hidden');
    return;
  }
  currentUser = session.user;

  if (isUnlocked()) {
    showCreatorForm();
  } else {
    document.getElementById('lock-view').classList.remove('hidden');
  }
}
init();

function isUnlocked() {
  const until = localStorage.getItem(UNLOCK_STORAGE_KEY);
  if (!until) return false;
  return Date.now() < parseInt(until, 10);
}

function showCreatorForm() {
  document.getElementById('lock-view').classList.add('hidden');
  document.getElementById('creator-view').classList.remove('hidden');
  initResultBlocks();
  // 預設先給 5 題起手
  for (let i = 0; i < MIN_QUESTIONS; i++) addQuestion();
  updateUnlockTimerDisplay();
}

function updateUnlockTimerDisplay() {
  const until = localStorage.getItem(UNLOCK_STORAGE_KEY);
  if (!until) return;
  const remainMs = parseInt(until, 10) - Date.now();
  if (remainMs <= 0) return;
  const remainMin = Math.ceil(remainMs / 60000);
  const msg = document.createElement('div');
  msg.className = 'form-msg success';
  msg.style.display = 'block';
  msg.textContent = `✅ 出題權限剩餘 ${remainMin} 分鐘`;
  document.getElementById('creator-view').prepend(msg);
}

/* ============================================================ */
/* 2. 廣告解鎖流程（Placeholder，正式上線後換成 AdSense 互動廣告）   */
/* ============================================================ */
let currentAdStep = 0;

function startAdFlow() {
  currentAdStep = 0;
  document.getElementById('ad-overlay').classList.add('show');
  playAdStep();
}

function playAdStep() {
  currentAdStep++;
  document.getElementById('ad-counter').textContent = `廣告 ${currentAdStep} / ${TOTAL_ADS}`;
  document.getElementById('ad-status').textContent = '請耐心等待...';
  document.getElementById('btn-ad-next').classList.remove('ready');
  document.getElementById('btn-ad-next').textContent = '請等待廣告播放完畢';

  const fill = document.getElementById('ad-progress-fill');
  fill.style.width = '0%';

  let elapsed = 0;
  const interval = setInterval(() => {
    elapsed += 100;
    const pct = Math.min(100, (elapsed / AD_DURATION_MS) * 100);
    fill.style.width = pct + '%';
    if (elapsed >= AD_DURATION_MS) {
      clearInterval(interval);
      document.getElementById('ad-status').textContent = '廣告播放完畢！';
      document.getElementById('btn-ad-next').classList.add('ready');
      document.getElementById('btn-ad-next').textContent = currentAdStep < TOTAL_ADS ? '下一段廣告 →' : '完成解鎖 →';
    }
  }, 100);
}

function nextAdStep() {
  if (currentAdStep < TOTAL_ADS) {
    playAdStep();
  } else {
    // 全部廣告看完，正式解鎖
    const unlockUntil = Date.now() + UNLOCK_DURATION_MS;
    localStorage.setItem(UNLOCK_STORAGE_KEY, unlockUntil.toString());
    document.getElementById('ad-overlay').classList.remove('show');
    document.getElementById('lock-view').classList.add('hidden');
    showCreatorForm();
  }
}

/* ============================================================ */
/* 3. 結果區塊（固定 4 個）                                         */
/* ============================================================ */
function initResultBlocks() {
  const container = document.getElementById('results-container');
  container.innerHTML = '';
  for (let i = 1; i <= resultCount; i++) {
    const block = document.createElement('div');
    block.className = 'result-block';
    block.innerHTML = `
      <div class="result-block-title">結果 ${i}</div>
      <label class="field-label">結果名稱</label>
      <input type="text" class="input-field result-name" placeholder="例如：貓系戀人" maxlength="30" />
      <label class="field-label">結果敘述</label>
      <textarea class="input-field result-desc" rows="2" placeholder="毒舌、有趣地描述這個結果的特質" maxlength="300"></textarea>
    `;
    container.appendChild(block);
  }
}

/* ============================================================ */
/* 4. 動態新增題目                                                   */
/* ============================================================ */
function addQuestion() {
  if (questionCount >= MAX_QUESTIONS) return;
  questionCount++;
  const qIndex = questionCount;

  const block = document.createElement('div');
  block.className = 'question-block';
  block.dataset.qindex = qIndex;
  block.innerHTML = `
    <button class="btn-remove-q" onclick="removeQuestion(this)">✕</button>
    <div class="question-num">題目 ${qIndex}</div>
    <input type="text" class="input-field q-text" placeholder="輸入題目文字" maxlength="100" />
    ${[1,2,3,4].map(optNum => `
      <div class="option-row">
        <input type="text" class="input-field opt-text" placeholder="選項 ${optNum}" maxlength="60" />
        <select class="opt-result-select">
          <option value="1">加分給結果 1</option>
          <option value="2">加分給結果 2</option>
          <option value="3">加分給結果 3</option>
          <option value="4">加分給結果 4</option>
        </select>
      </div>
    `).join('')}
  `;
  document.getElementById('questions-container').appendChild(block);
  renumberQuestions();
  updateAddButtonState();
}

function removeQuestion(btn) {
  if (questionCount <= MIN_QUESTIONS) {
    alert(`至少需要保留 ${MIN_QUESTIONS} 題`);
    return;
  }
  btn.closest('.question-block').remove();
  questionCount--;
  renumberQuestions();
  updateAddButtonState();
}

function renumberQuestions() {
  const blocks = document.querySelectorAll('.question-block');
  blocks.forEach((b, i) => {
    b.querySelector('.question-num').textContent = `題目 ${i + 1}`;
  });
}

function updateAddButtonState() {
  const btn = document.getElementById('btn-add-question');
  btn.disabled = questionCount >= MAX_QUESTIONS;
  btn.textContent = questionCount >= MAX_QUESTIONS ? `已達最多 ${MAX_QUESTIONS} 題` : '+ 新增題目';
}

/* ============================================================ */
/* 5. XSS 防護：簡單文字過濾（移除危險字元，避免注入腳本）            */
/* ============================================================ */
function sanitizeText(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str.trim();
  return div.innerHTML; // 透過瀏覽器內建跳脫機制，移除 <script> 等危險標籤
}

/* ============================================================ */
/* 6. 發布測驗：打包成 JSONB 寫入 Supabase                          */
/* ============================================================ */
async function publishQuiz() {
  const msgEl = document.getElementById('top-msg');
  msgEl.style.display = 'none';

  const title = sanitizeText(document.getElementById('quiz-title').value);
  const desc = sanitizeText(document.getElementById('quiz-desc').value);

  if (!title) {
    showTopMsg('請輸入測驗名稱', 'error');
    return;
  }

  // 蒐集 4 個結果
  const resultBlocks = document.querySelectorAll('.result-block');
  const results = [];
  for (let i = 0; i < resultBlocks.length; i++) {
    const name = sanitizeText(resultBlocks[i].querySelector('.result-name').value);
    const rdesc = sanitizeText(resultBlocks[i].querySelector('.result-desc').value);
    if (!name) {
      showTopMsg(`請填寫結果 ${i + 1} 的名稱`, 'error');
      return;
    }
    results.push({ id: String(i + 1), label: name, desc: rdesc || '（創作者沒有留下更多描述）' });
  }

  // 蒐集題目與選項
  const questionBlocks = document.querySelectorAll('.question-block');
  if (questionBlocks.length < MIN_QUESTIONS) {
    showTopMsg(`至少需要 ${MIN_QUESTIONS} 題`, 'error');
    return;
  }

  const questions = [];
  for (let i = 0; i < questionBlocks.length; i++) {
    const qb = questionBlocks[i];
    const qText = sanitizeText(qb.querySelector('.q-text').value);
    if (!qText) {
      showTopMsg(`請填寫題目 ${i + 1} 的文字`, 'error');
      return;
    }

    const optionRows = qb.querySelectorAll('.option-row');
    const options = [];
    for (let j = 0; j < optionRows.length; j++) {
      const optText = sanitizeText(optionRows[j].querySelector('.opt-text').value);
      const resultNum = optionRows[j].querySelector('.opt-result-select').value;
      if (!optText) {
        showTopMsg(`請填寫題目 ${i + 1} 的所有選項`, 'error');
        return;
      }
      // UGC 測驗使用「標籤計次法」：每個選項直接對應到某一個結果 ID，選中就給該結果 +1 分
      options.push({ id: String.fromCharCode(97 + j), text: optText, scores: { [resultNum]: 1 } });
    }
    questions.push({ id: i + 1, text: qText, options });
  }

  const btn = document.getElementById('btn-publish');
  btn.disabled = true;
  btn.textContent = '發布中...';

  try {
    const { data, error } = await supabaseClient.from('quizzes').insert({
      creator_id: currentUser.id,
      title: title,
      description: desc || '一個由 QuizDrop 社群成員創作的心理測驗',
      is_official: false,
      scoring_type: 'tag', // 標籤計次法，跟官方測驗的維度法（dimension）區分
      questions: questions,
      results: { scoring_note: '計算每個結果累積的分數，取最高分的結果（同分則隨機挑一個）', results: results },
      is_public: true,
    }).select('id').single();

    if (error) throw error;

    showSuccessScreen(data.id);
  } catch (err) {
    console.error('Publish error:', err);
    showTopMsg('發布失敗：' + (err.message || '請再試一次'), 'error');
    btn.disabled = false;
    btn.textContent = '🚀 發布測驗';
  }
}

function showTopMsg(text, type) {
  const msgEl = document.getElementById('top-msg');
  msgEl.textContent = text;
  msgEl.className = 'form-msg ' + type;
  msgEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

let publishedQuizId = null;

function showSuccessScreen(quizId) {
  publishedQuizId = quizId;
  document.getElementById('creator-view').classList.add('hidden');
  document.getElementById('success-screen').style.display = 'block';

  const shareUrl = `${window.location.origin}/quiz.html?id=${quizId}`;
  document.getElementById('share-url-display').textContent = shareUrl;
}

function copyShareUrl() {
  const shareUrl = `${window.location.origin}/quiz.html?id=${publishedQuizId}`;
  navigator.clipboard.writeText(shareUrl).then(() => alert('連結已複製！'));
}

function goToMyQuiz() {
  window.location.href = `quiz.html?id=${publishedQuizId}`;
}
</script>
</body>
</html>

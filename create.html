<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我要出題 - QuizDrop</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; }
  body { background: #f7f2e9; color: #4a3f35; min-height: 100vh; padding-bottom: 60px; }
  .hidden { display: none !important; }

  .topbar { height: 60px; background: #fffdf8; border-bottom: 1px solid #ece4d4; display: flex; align-items: center; padding: 0 20px; gap: 12px; position: sticky; top: 0; z-index: 20; }
  .back-btn { color: #9c8f7e; font-size: 14px; text-decoration: none; display: flex; align-items: center; gap: 5px; }
  .spacer { flex: 1; }

  .qt-lang-pill { display: flex; gap: 3px; background: #f1e9da; border-radius: 10px; padding: 3px; }
  .qt-lang-pill button { padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; color: #9c8f7e; border: none; background: none; cursor: pointer; transition: all .2s; }
  .qt-lang-pill button.active { background: #fffdf8; color: #a9633a; box-shadow: 0 1px 4px rgba(80,60,30,0.1); }

  .qt-btn { padding: 7px 13px; border-radius: 4px; font-size: 12.5px; font-weight: 700; border: 1.5px solid #d9cbb3; background: #fffdf8; cursor: pointer; color: #4a3f35; }
  .qt-btn.qt-signup { background: #4a3f35; color: #fff; border: none; }

  .qt-user-wrap { position: relative; }
  .qt-user-chip { display: flex; align-items: center; gap: 7px; background: #f1e9da; border-radius: 10px; padding: 5px 12px 5px 5px; cursor: pointer; font-size: 12.5px; font-weight: 600; color: #4a3f35; }
  .qt-avatar { width: 24px; height: 24px; border-radius: 50%; background: #a9633a; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 800; }
  .qt-dropdown {
    position: absolute; top: 100%; right: 0; margin-top: 8px; background: #fffdf8;
    border: 1px solid #ece4d4; border-radius: 12px; min-width: 160px;
    box-shadow: 0 12px 32px -8px rgba(80,60,30,0.15); overflow: hidden; z-index: 200; display: none;
  }
  .qt-dropdown.show { display: block; }
  .qt-dropdown button { width: 100%; text-align: left; padding: 12px 16px; background: none; border: none; color: #4a3f35; font-size: 13.5px; cursor: pointer; transition: background .15s; font-family: inherit; }
  .qt-dropdown button:hover { background: #f7f2e9; }
  .qt-dropdown button.danger { color: #b14a35; }
  .logo .drop { color: #a9633a; }

  .wrap { max-width: 680px; margin: 0 auto; padding: 36px 20px; }

  .slot-bar {
    background: #fffdf8; border: 1.5px solid #d9cbb3; border-radius: 16px; padding: 16px 20px;
    margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .slot-bar-info { font-size: 13.5px; color: #6b5d4d; }
  .slot-bar-info b { color: #a9633a; font-size: 15px; }
  .slot-dots { display: flex; gap: 5px; }
  .slot-dot { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid #d9cbb3; }
  .slot-dot.filled { background: #a9633a; border-color: #a9633a; }
  .slot-dot.locked { background: #f1e9da; border-color: #e0d4bd; }

  .lock-card {
    background: #fffdf8; border-radius: 20px; padding: 48px 32px; text-align: center;
    box-shadow: 0 8px 30px -10px rgba(80,60,30,0.1); border: 1.5px solid #d9cbb3;
  }
  .lock-emoji { font-size: 56px; margin-bottom: 18px; display: block; }
  .lock-card h2 { font-size: 22px; font-weight: 900; margin-bottom: 10px; color: #4a3f35; }
  .lock-card p { color: #9c8f7e; font-size: 14.5px; line-height: 1.7; margin-bottom: 28px; }
  .price-tag {
    display: inline-flex; align-items: center; gap: 8px; background: #f1e9da;
    border: 1.5px solid #d9cbb3; border-radius: 10px; padding: 10px 22px; font-size: 14px; font-weight: 700;
    color: #a9633a; margin-bottom: 28px;
  }
  .btn-unlock {
    background: #4a3f35; color: #fff; border: none; border-radius: 4px;
    padding: 16px 36px; font-size: 16px; font-weight: 800; cursor: pointer; transition: opacity .2s;
  }
  .btn-unlock:hover { opacity: 0.9; }

  .ad-overlay {
    position: fixed; inset: 0; background: rgba(60,45,30,0.6); z-index: 200;
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .ad-overlay.show { display: flex; }
  .ad-box { background: #fffdf8; border-radius: 20px; padding: 32px; max-width: 360px; width: 100%; text-align: center; }
  .ad-placeholder {
    background: repeating-linear-gradient(45deg, #f1e9da, #f1e9da 10px, #ece0ce 10px, #ece0ce 20px);
    border-radius: 14px; height: 200px; display: flex; align-items: center; justify-content: center;
    color: #9c8f7e; font-size: 13px; font-weight: 700; margin-bottom: 18px;
  }
  .ad-progress-bar { height: 6px; background: #f1e9da; border-radius: 99px; overflow: hidden; margin-bottom: 14px; }
  .ad-progress-fill { height: 100%; background: #a9633a; width: 0%; transition: width .1s linear; }
  .ad-status { font-size: 13px; color: #9c8f7e; margin-bottom: 16px; }
  .btn-ad-next {
    width: 100%; padding: 13px; border-radius: 4px; background: #4a3f35; color: #fff; font-weight: 700;
    border: none; cursor: pointer; font-size: 14px; opacity: 0.3; pointer-events: none; transition: opacity .2s;
  }
  .btn-ad-next.ready { opacity: 1; pointer-events: all; }

  .pay-box { background: #fffdf8; border-radius: 20px; padding: 32px; max-width: 360px; width: 100%; text-align: center; }
  .pay-box h3 { font-size: 18px; font-weight: 900; margin-bottom: 8px; color: #4a3f35; }
  .pay-box p { font-size: 13.5px; color: #9c8f7e; margin-bottom: 20px; line-height: 1.6; }
  .pay-price { font-size: 32px; font-weight: 900; color: #a9633a; margin-bottom: 20px; }
  .pay-note { font-size: 11.5px; color: #b5a890; margin-top: 12px; }

  #creator-form { display: none; }
  .section-card { background: #fffdf8; border-radius: 18px; padding: 28px 24px; margin-bottom: 20px; border: 1.5px solid #d9cbb3; }
  .section-title { font-size: 15px; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: #4a3f35; }
  .field-label { font-size: 12.5px; font-weight: 700; color: #9c8f7e; margin-bottom: 6px; display: block; }
  .char-count { font-size: 11px; color: #b5a890; text-align: right; margin-top: -10px; margin-bottom: 10px; }
  .input-field, textarea.input-field {
    width: 100%; padding: 12px 16px; border-radius: 10px; border: 1.5px solid #d9cbb3;
    font-size: 14px; margin-bottom: 6px; outline: none; transition: border-color .2s; font-family: inherit;
    background: #fffdf8; color: #4a3f35;
  }
  .input-field:focus { border-color: #a9633a; }
  textarea.input-field { resize: vertical; }

  .result-block { background: #f7f2e9; border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 1px solid #ece4d4; }
  .result-block-title { font-size: 13px; font-weight: 800; color: #a9633a; margin-bottom: 10px; }

  .question-block { background: #f7f2e9; border-radius: 16px; padding: 18px; margin-bottom: 14px; border: 1px solid #ece4d4; position: relative; }
  .question-num { font-size: 12.5px; font-weight: 800; color: #9c8f7e; margin-bottom: 10px; }
  .option-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
  .option-row .input-field { margin-bottom: 0; flex: 1; }
  .opt-result-multiselect { display: flex; flex-wrap: wrap; gap: 4px; width: 150px; flex-shrink: 0; padding-top: 2px; }
  .opt-result-chip {
    padding: 5px 9px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer;
    border: 1.5px solid #d9cbb3; background: #fffdf8; color: #9c8f7e; transition: all .15s; user-select: none;
  }
  .opt-result-chip.selected { background: #a9633a; border-color: #a9633a; color: #fff; }
  .opt-result-chip.disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-remove-q {
    position: absolute; top: 14px; right: 14px; width: 26px; height: 26px; border-radius: 50%;
    background: #f6e0d8; color: #b14a35; border: none; cursor: pointer; font-size: 13px; font-weight: 700;
  }

  .btn-add-q {
    width: 100%; padding: 14px; border-radius: 10px; background: #fffdf8; border: 1.5px dashed #c99a6b;
    color: #a9633a; font-weight: 700; font-size: 14px; cursor: pointer; margin-bottom: 24px; transition: all .2s;
  }
  .btn-add-q:hover { background: #f7f2e9; }
  .btn-add-q:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-publish {
    width: 100%; padding: 16px; border-radius: 4px; background: #4a3f35;
    color: #fff; font-weight: 800; font-size: 16px; border: none; cursor: pointer; transition: opacity .2s;
  }
  .btn-publish:hover { opacity: 0.9; }
  .btn-publish:disabled { opacity: 0.5; cursor: not-allowed; }

  .form-msg { font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; display: none; }
  .form-msg.error { background: #f6e0d8; color: #b14a35; display: block; }
  .form-msg.success { background: #e2ecdc; color: #4a7a3a; display: block; }

  #success-screen { display: none; text-align: center; padding: 40px 0; }
  .success-emoji { font-size: 64px; margin-bottom: 16px; display: block; }
  #success-screen h2 { font-size: 22px; font-weight: 900; margin-bottom: 10px; color: #4a3f35; }
  .share-url-box {
    background: #f7f2e9; border: 1.5px solid #d9cbb3; border-radius: 14px; padding: 14px 18px;
    font-size: 13.5px; color: #6b5d4d; word-break: break-all; margin: 20px 0; text-align: left;
  }
  .btn-copy-url {
    background: #4a3f35; color: #fff; border: none; border-radius: 4px; padding: 13px 28px;
    font-weight: 700; cursor: pointer; font-size: 14px; margin-right: 10px;
  }
  .btn-go-quiz {
    background: none; color: #4a3f35; border: none; border-bottom: 2px solid #a9633a;
    padding: 13px 4px; font-weight: 700; cursor: pointer; font-size: 14px;
  }

  .login-required { text-align: center; padding: 80px 20px; }
  .login-required .emoji { font-size: 56px; margin-bottom: 16px; display: block; }
  .login-required h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; color: #4a3f35; }
  .login-required p { color: #9c8f7e; font-size: 14px; margin-bottom: 24px; }
  .login-required a {
    display: inline-block; padding: 13px 32px; border-radius: 4px;
    background: #4a3f35; color: #fff; font-weight: 800; text-decoration: none; font-size: 14.5px;
  }

  .my-quizzes-list { margin-bottom: 24px; }
  .slot-card {
    background: #fffdf8; border: 1.5px solid #d9cbb3; border-radius: 14px; padding: 16px 18px;
    margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .slot-card-info { flex: 1; min-width: 0; }
  .slot-card-info h4 { font-size: 14px; font-weight: 700; color: #4a3f35; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .slot-card-info p { font-size: 11.5px; color: #b5a890; }
  .slot-card-empty { color: #b5a890; font-size: 13px; font-style: italic; }
  .slot-card-btns { display: flex; gap: 6px; flex-shrink: 0; }
  .slot-card-btns button { padding: 7px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1.5px solid #d9cbb3; background: #fffdf8; color: #6b5d4d; }
  .slot-card-disabled { opacity: 0.55; }
  .slot-card-disabled .slot-card-btns button { cursor: not-allowed; }
  .slot-card-btns button.danger { color: #b14a35; border-color: #e0b8a8; }
  .slot-card-btns button.primary { background: #4a3f35; color: #fff; border: none; }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn" id="back-link">← QuizDrop</a>
  <div class="spacer"></div>
  <div class="qt-lang-pill">
    <button class="active" onclick="setLang('zh')" data-lang-btn="zh">中</button>
    <button onclick="setLang('ja')" data-lang-btn="ja">日</button>
    <button onclick="setLang('en')" data-lang-btn="en">EN</button>
  </div>
  <div id="qt-auth-buttons" style="display:flex; gap:8px;">
    <button class="qt-btn qt-login" onclick="window.location.href='index.html'">登入</button>
    <button class="qt-btn qt-signup" onclick="window.location.href='index.html'">註冊</button>

      <span id="qt-username-display">用戶</span>
    </div>
    <div class="qt-dropdown" id="qt-dropdown">
      <button onclick="window.location.href='profile.html'">👤 個人頁面</button>

</div>

<div class="wrap">

  <div id="login-required-view" class="login-required hidden">
    <span class="emoji">🔒</span>
    <h2 id="login-required-title">請先登入</h2>
    <p id="login-required-desc">加入會員即可免費創作 1 個專屬心理測驗</p>
    <a href="index.html" id="login-required-link">回首頁登入 →</a>
  </div>

  <div id="dashboard-view" class="hidden">
    <div class="slot-bar">
      <div class="slot-bar-info"><span id="slot-bar-prefix">已解鎖</span> <b id="slot-count-text">1 / 10</b> <span id="slot-bar-suffix">個創作額度</span></div>
      <div class="slot-dots" id="slot-dots"></div>
    </div>
    <div class="my-quizzes-list" id="my-quizzes-list"></div>
  </div>

  <div id="lock-view" class="hidden">
    <div class="lock-card">
      <span class="lock-emoji" id="lock-emoji">🚀</span>
      <h2 id="lock-title">多人創作功能即將推出</h2>
      <p id="lock-desc">敬請期待後續更新！</p>
      <div class="price-tag" id="lock-price-tag">🚧 開發中</div>
      <br>
      <button class="btn-unlock" id="btn-unlock-action" disabled>敬請期待</button>
      <br><br>
      <button class="back-btn" onclick="showDashboard()" style="border:none;background:none;cursor:pointer;">← 返回</button>
    </div>
  </div>

  <div id="creator-view" class="hidden">
    <div class="form-msg" id="top-msg"></div>

    <div class="section-card">
      <div class="section-title" id="section-title-basic">📝 測驗基本資訊</div>
      <label class="field-label" id="label-quiz-title">測驗名稱</label>
      <input type="text" class="input-field" id="quiz-title" placeholder="例如：你前世是什麼動物？" maxlength="30" oninput="updateCharCount(this, 'title-count', 30)" />
      <div class="char-count" id="title-count">0 / 30</div>
      <label class="field-label" id="label-quiz-desc">測驗簡介</label>
      <textarea class="input-field" id="quiz-desc" rows="2" placeholder="簡單介紹一下這個測驗在測什麼" maxlength="100" oninput="updateCharCount(this, 'desc-count', 100)"></textarea>
      <div class="char-count" id="desc-count">0 / 100</div>
    </div>

    <div class="section-card">
      <div class="section-title" id="section-title-results">🏆 設定結果（最少 4 個，最多 8 個）</div>
      <div id="results-container"></div>
      <button class="btn-add-q" id="btn-add-result" onclick="addResult()">+ 新增結果</button>
    </div>

    <div class="section-card">
      <div class="section-title" id="section-title-questions">❓ 設計題目（最少 5 題，最多 10 題）</div>
      <div id="questions-container"></div>
      <button class="btn-add-q" id="btn-add-question" onclick="addQuestion()">+ 新增題目</button>
    </div>

    <button class="btn-publish" id="btn-publish" onclick="publishQuiz()">🚀 發布測驗</button>
  </div>

  <div id="success-screen">
    <span class="success-emoji">🎉</span>
    <h2 id="success-title">測驗發布成功！</h2>
    <p style="color:#9c8f7e;font-size:14px;" id="success-desc">把這個連結分享給朋友，讓他們也來玩玩看</p>
    <div class="share-url-box" id="share-url-display"></div>
    <button class="btn-copy-url" onclick="copyShareUrl()" id="btn-copy-url-text">📋 複製連結</button>
    <button class="btn-go-quiz" onclick="goToMyQuiz()" id="btn-go-quiz-text">立即查看 →</button>
  </div>

</div>
</div>

<script>
const SUPABASE_URL = 'https://xsflpzozgdgbtrtdzdlj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzZmxwem96Z2RnYnRydGR6ZGxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTMyMzUsImV4cCI6MjA5NzE4OTIzNX0.Uyi5dYa73h0JJ9KwT2bP0C79wV_H-PoYneiR5xsbT6I';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const MAX_SLOTS = 10;
const FREE_AD_UNLOCK_UNTIL = 5;
const MIN_RESULTS = 4, MAX_RESULTS = 8;
const MIN_QUESTIONS = 5, MAX_QUESTIONS = 10;
const MIN_OPTIONS = 4, MAX_OPTIONS = 6;
const MAX_RESULTS_PER_OPTION = 2;
const TITLE_MAX = 30, DESC_MAX = 100, QTEXT_MAX = 30, OPTTEXT_MAX = 30;

let currentUser = null;
let mySlotsUnlocked = 1;
let myQuizzes = [];
let targetSlotIndex = null;
let resultCount = MIN_RESULTS;
let questionCount = 0;

async function init() {
  const session = await new Promise((resolve) => {
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        resolve(session);
      } else {
        const { data: listener } = supabaseClient.auth.onAuthStateChange((event, newSession) => {
          listener.subscription.unsubscribe();
          resolve(newSession);
        });
        setTimeout(() => resolve(null), 800);
      }
    });
  });

  if (!session) {
    document.getElementById('login-required-view').classList.remove('hidden');
    setBackLink('home');
    return;
  }
  currentUser = session.user;

  await loadUserSlots();
  await loadMyQuizzes();
  showDashboard();
}

async function loadUserSlots() {
  try {
    const { data, error } = await supabaseClient.from('users').select('quiz_slots_unlocked').eq('id', currentUser.id).single();
    if (error) throw error;
    mySlotsUnlocked = data?.quiz_slots_unlocked || 1;
  } catch (err) {
    console.warn('讀取額度失敗，使用預設值1:', err);
    mySlotsUnlocked = 1;
  }
}

async function loadMyQuizzes() {
  try {
    const { data, error } = await supabaseClient.from('quizzes').select('id, title, slot_index').eq('creator_id', currentUser.id).order('slot_index');
    if (error) throw error;
    myQuizzes = data || [];
  } catch (err) {
    console.warn('讀取我的測驗失敗:', err);
    myQuizzes = [];
  }
}

function showDashboard() {
  document.getElementById('login-required-view').classList.add('hidden');
  document.getElementById('lock-view').classList.add('hidden');
  document.getElementById('creator-view').classList.add('hidden');
  document.getElementById('success-screen').style.display = 'none';
  document.getElementById('dashboard-view').classList.remove('hidden');
  setBackLink('home');

  document.getElementById('slot-count-text').textContent = `${mySlotsUnlocked} / ${MAX_SLOTS}`;

  const dotsEl = document.getElementById('slot-dots');
  dotsEl.innerHTML = '';
  for (let i = 1; i <= MAX_SLOTS; i++) {
    const dot = document.createElement('div');
    dot.className = 'slot-dot' + (i <= mySlotsUnlocked ? ' filled' : ' locked');
    dotsEl.appendChild(dot);
  }

  const listEl = document.getElementById('my-quizzes-list');
  let html = '';
  for (let i = 1; i <= MAX_SLOTS; i++) {
    const quiz = myQuizzes.find(q => q.slot_index === i);
    const unlocked = i <= mySlotsUnlocked;

    if (!unlocked) {
      html += `
        <div class="slot-card slot-card-disabled">
          <div class="slot-card-info"><span class="slot-card-empty">🔒 額度 ${i}（多人創作即將推出）</span></div>
          <div class="slot-card-btns"><button class="primary" disabled>敬請期待</button></div>
        </div>`;
    } else if (!quiz) {
      html += `
        <div class="slot-card">
          <div class="slot-card-info"><span class="slot-card-empty">✨ 額度 ${i}：尚未建立測驗</span></div>
          <div class="slot-card-btns"><button class="primary" onclick="goCreateInSlot(${i})">開始創作</button></div>
        </div>`;
    } else {
      html += `
        <div class="slot-card">
          <div class="slot-card-info"><h4>${escapeAttr(quiz.title)}</h4><p>額度 ${i}</p></div>
          <div class="slot-card-btns">
            <button onclick="window.location.href='quiz.html?id=${quiz.id}'">查看</button>
            <button class="danger" onclick="deleteAndRecreate(${i}, '${quiz.id}')">刪除重建</button>
          </div>
        </div>`;
    }
  }

const AD_DURATION_MS = 3000;

function startAdFlow() {
  document.getElementById('ad-overlay').classList.add('show');
  document.getElementById('ad-status-title').textContent = '廣告播放中...';
  document.getElementById('btn-ad-next').classList.remove('ready');
  document.getElementById('btn-ad-next').textContent = '請等待廣告播放完畢';

  const fill = document.getElementById('ad-progress-fill');
  fill.style.width = '0%';

  let elapsed = 0;
  const interval = setInterval(() => {
    elapsed += 100;
    const pct = Math.min(100, (elapsed / AD_DURATION_MS) * 100);
    fill.style.width = pct + '%';
    if (elapsed >= AD_DURATION_MS) {
      clearInterval(interval);
      document.getElementById('ad-status-title').textContent = '廣告播放完畢！';
      document.getElementById('btn-ad-next').classList.add('ready');
    }
  }, 100);
}

async function onAdFinished() {

  await grantSlotUnlock(targetSlotIndex);
}

async function grantSlotUnlock(slotIndex) {
  mySlotsUnlocked = Math.max(mySlotsUnlocked, slotIndex);
  try {
    await supabaseClient.from('users').update({ quiz_slots_unlocked: mySlotsUnlocked }).eq('id', currentUser.id);
  } catch (err) {
    console.warn('更新額度失敗（不影響當前操作，但下次登入可能需要重新確認）:', err);
  }
  goCreateInSlot(slotIndex);
}

function showCreatorForm() {
  document.getElementById('dashboard-view').classList.add('hidden');
  document.getElementById('lock-view').classList.add('hidden');
  document.getElementById('creator-view').classList.remove('hidden');
  setBackLink('dashboard');
  resultCount = MIN_RESULTS;
  questionCount = 0;
  document.getElementById('quiz-title').value = '';
  document.getElementById('quiz-desc').value = '';
  document.getElementById('questions-container').innerHTML = '';
  initResultBlocks();
  for (let i = 0; i < MIN_QUESTIONS; i++) addQuestion();
  updateCharCount(document.getElementById('quiz-title'), 'title-count', TITLE_MAX);
  updateCharCount(document.getElementById('quiz-desc'), 'desc-count', DESC_MAX);
}

function updateCharCount(el, countId, max) {
  document.getElementById(countId).textContent = `${el.value.length} / ${max}`;
}

function initResultBlocks() {
  renderResultBlocks();
}

function renderResultBlocks() {
  const container = document.getElementById('results-container');
  const existingValues = Array.from(container.querySelectorAll('.result-block')).map(b => ({
    name: b.querySelector('.result-name').value,
    desc: b.querySelector('.result-desc').value,
  }));

  container.innerHTML = '';
  for (let i = 1; i <= resultCount; i++) {
    const prev = existingValues[i - 1] || { name: '', desc: '' };
    const block = document.createElement('div');
    block.className = 'result-block';
    block.innerHTML = `
      <div class="result-block-title">結果 ${i} ${i > MIN_RESULTS ? `<button type="button" onclick="removeResult(${i})" style="float:right;background:none;border:none;color:#b14a35;cursor:pointer;font-size:12px;">移除</button>` : ''}</div>
      <label class="field-label">結果名稱</label>
      <input type="text" class="input-field result-name" placeholder="例如：貓系戀人" maxlength="${TITLE_MAX}" value="${escapeAttr(prev.name)}" />
      <label class="field-label">結果敘述</label>
      <textarea class="input-field result-desc" rows="2" placeholder="毒舌、有趣地描述這個結果的特質" maxlength="300">${escapeAttr(prev.desc)}</textarea>
    `;
    container.appendChild(block);
  }
  updateResultButtonState();
  syncAllOptionMultiselects();
}

function addResult() {
  if (resultCount >= MAX_RESULTS) return;
  resultCount++;
  renderResultBlocks();
}

function removeResult(idx) {
  if (resultCount <= MIN_RESULTS) return;
  resultCount--;
  renderResultBlocks();
}

function updateResultButtonState() {
  const btn = document.getElementById('btn-add-result');
  btn.disabled = resultCount >= MAX_RESULTS;
  btn.textContent = resultCount >= MAX_RESULTS ? `已達最多 ${MAX_RESULTS} 個結果` : '+ 新增結果';
}

function escapeAttr(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function syncAllOptionMultiselects() {
  document.querySelectorAll('.opt-result-multiselect').forEach(wrap => {
    const selected = JSON.parse(wrap.dataset.selected || '[]').filter(n => n <= resultCount);
    renderMultiselectChips(wrap, selected);
  });
}

function renderMultiselectChips(wrap, selected) {
  wrap.dataset.selected = JSON.stringify(selected);
  wrap.innerHTML = '';
  for (let i = 1; i <= resultCount; i++) {
    const chip = document.createElement('div');
    const isSelected = selected.includes(i);
    const isDisabled = !isSelected && selected.length >= MAX_RESULTS_PER_OPTION;
    chip.className = 'opt-result-chip' + (isSelected ? ' selected' : '') + (isDisabled ? ' disabled' : '');
    chip.textContent = String(i);
    chip.onclick = () => toggleResultChip(wrap, i);
    wrap.appendChild(chip);
  }
}

function toggleResultChip(wrap, resultNum) {
  let selected = JSON.parse(wrap.dataset.selected || '[]');
  if (selected.includes(resultNum)) {
    selected = selected.filter(n => n !== resultNum);
  } else {
    if (selected.length >= MAX_RESULTS_PER_OPTION) return;
    selected.push(resultNum);
  }
  renderMultiselectChips(wrap, selected);
}

function addQuestion() {
  if (questionCount >= MAX_QUESTIONS) return;
  questionCount++;
  const qIndex = questionCount;

  const block = document.createElement('div');
  block.className = 'question-block';
  block.dataset.qindex = qIndex;

  const optionsHtml = Array.from({ length: MIN_OPTIONS }, (_, idx) => buildOptionRowHtml(idx + 1)).join('');

  block.innerHTML = `
    <button class="btn-remove-q" onclick="removeQuestion(this)" title="移除這題">✕</button>
    <div class="question-num">題目 ${qIndex}</div>
    <input type="text" class="input-field q-text" placeholder="輸入題目文字" maxlength="${QTEXT_MAX}" oninput="updateQuestionCharCount(this)" />
    <div class="char-count q-char-count">0 / ${QTEXT_MAX}</div>
    <div class="options-wrap">${optionsHtml}</div>
    <button type="button" class="btn-add-q btn-add-option" style="margin-bottom:0;padding:9px;font-size:12.5px;" onclick="addOptionToQuestion(this)">+ 新增選項</button>
  `;
  document.getElementById('questions-container').appendChild(block);
  // 新增題目時，預設帶的選項只有空殼容器，需要立即渲染加分結果的選擇 chip
  block.querySelectorAll('.opt-result-multiselect').forEach(wrap => renderMultiselectChips(wrap, []));
  renumberQuestions();
  updateQuestionButtonState();
}

function buildOptionRowHtml(optNum) {
  return `
    <div class="option-row">
      <input type="text" class="input-field opt-text" placeholder="選項 ${optNum}" maxlength="${OPTTEXT_MAX}" />
      <div class="opt-result-multiselect" data-selected="[]"></div>
    </div>
  `;
}

function addOptionToQuestion(btn) {
  const block = btn.closest('.question-block');
  const optionsWrap = block.querySelector('.options-wrap');
  const currentCount = optionsWrap.querySelectorAll('.option-row').length;
  if (currentCount >= MAX_OPTIONS) {
    alert(`每題最多 ${MAX_OPTIONS} 個選項`);
    return;
  }
  const div = document.createElement('div');
  div.innerHTML = buildOptionRowHtml(currentCount + 1);
  const newRow = div.firstElementChild;
  optionsWrap.appendChild(newRow);
  renderMultiselectChips(newRow.querySelector('.opt-result-multiselect'), []);
  updateRemoveOptionButtons(block);
}

function updateRemoveOptionButtons(block) {
  const addBtn = block.querySelector('.btn-add-option');
  const count = block.querySelectorAll('.option-row').length;
  addBtn.disabled = count >= MAX_OPTIONS;
  addBtn.textContent = count >= MAX_OPTIONS ? `已達最多 ${MAX_OPTIONS} 個選項` : '+ 新增選項';
}

function removeQuestion(btn) {
  if (questionCount <= MIN_QUESTIONS) {
    alert(`至少需要保留 ${MIN_QUESTIONS} 題`);
    return;
  }
  btn.closest('.question-block').remove();
  questionCount--;
  renumberQuestions();
  updateQuestionButtonState();
}

function renumberQuestions() {
  const blocks = document.querySelectorAll('.question-block');
  blocks.forEach((b, i) => { b.querySelector('.question-num').textContent = `題目 ${i + 1}`; });
}

function updateQuestionButtonState() {
  const btn = document.getElementById('btn-add-question');
  btn.disabled = questionCount >= MAX_QUESTIONS;
  btn.textContent = questionCount >= MAX_QUESTIONS ? `已達最多 ${MAX_QUESTIONS} 題` : '+ 新增題目';
}

function updateQuestionCharCount(input) {
  const block = input.closest('.question-block');
  block.querySelector('.q-char-count').textContent = `${input.value.length} / ${QTEXT_MAX}`;
}

function sanitizeText(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str.trim();
  return div.innerHTML;
}

async function publishQuiz() {
  const msgEl = document.getElementById('top-msg');
  msgEl.style.display = 'none';

  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    showTopMsg('登入狀態已失效，請重新登入後再發布', 'error');
    highlightError(document.getElementById('top-msg'));
    setTimeout(() => { window.location.href = 'index.html'; }, 1800);
    return;
  }
  currentUser = session.user;

  const title = sanitizeText(document.getElementById('quiz-title').value);
  const desc = sanitizeText(document.getElementById('quiz-desc').value);

  if (!title) {
    showTopMsg('請輸入測驗名稱', 'error');
    highlightError(document.getElementById('quiz-title'));
    return;
  }
  if (title.length > TITLE_MAX) {
    showTopMsg(`測驗名稱不能超過 ${TITLE_MAX} 個字`, 'error');
    highlightError(document.getElementById('quiz-title'));
    return;
  }

  const resultBlocks = document.querySelectorAll('.result-block');
  if (resultBlocks.length < MIN_RESULTS) {
    showTopMsg(`至少需要設定 ${MIN_RESULTS} 個結果`, 'error');
    highlightError(document.getElementById('section-title-results'));
    return;
  }
  const results = [];
  for (let i = 0; i < resultBlocks.length; i++) {
    const name = sanitizeText(resultBlocks[i].querySelector('.result-name').value);
    const rdesc = sanitizeText(resultBlocks[i].querySelector('.result-desc').value);
    if (!name) { showTopMsg(`請填寫結果 ${i + 1} 的名稱`, 'error'); highlightError(resultBlocks[i]); return; }
    if (!rdesc) { showTopMsg(`請填寫結果 ${i + 1} 的敘述`, 'error'); highlightError(resultBlocks[i]); return; }
    if (name.length > TITLE_MAX) { showTopMsg(`結果 ${i + 1} 的名稱不能超過 ${TITLE_MAX} 個字`, 'error'); return; }
    results.push({ id: String(i + 1), label: name, desc: rdesc });
  }

  const questionBlocks = document.querySelectorAll('.question-block');
  if (questionBlocks.length < MIN_QUESTIONS) {
    showTopMsg(`題目數量不足，至少需要 ${MIN_QUESTIONS} 題`, 'error');
    highlightError(document.getElementById('section-title-questions'));
    return;
  }

  const questions = [];
  for (let i = 0; i < questionBlocks.length; i++) {
    const qb = questionBlocks[i];
    const qText = sanitizeText(qb.querySelector('.q-text').value);
    if (!qText) {
      showTopMsg(`請填寫題目 ${i + 1} 的文字`, 'error');
      highlightError(qb);
      return;
    }
    if (qText.length > QTEXT_MAX) {
      showTopMsg(`題目 ${i + 1} 的文字不能超過 ${QTEXT_MAX} 個字`, 'error');
      return;
    }

    const optionRows = qb.querySelectorAll('.option-row');
    if (optionRows.length < MIN_OPTIONS) {
      showTopMsg(`題目 ${i + 1} 至少需要 ${MIN_OPTIONS} 個選項`, 'error');
      return;
    }

    const options = [];
    const resultIdsUsedInThisQuestion = new Set();

    for (let j = 0; j < optionRows.length; j++) {
      const optText = sanitizeText(optionRows[j].querySelector('.opt-text').value);
      if (!optText) {
        showTopMsg(`請填寫題目 ${i + 1} 的所有選項`, 'error');
        highlightError(qb);
        return;
      }
      if (optText.length > OPTTEXT_MAX) {
        showTopMsg(`題目 ${i + 1} 的選項文字不能超過 ${OPTTEXT_MAX} 個字`, 'error');
        highlightError(qb);
        return;
      }

      const selectedResults = JSON.parse(optionRows[j].querySelector('.opt-result-multiselect').dataset.selected || '[]');
      if (selectedResults.length === 0) {
        showTopMsg(`題目 ${i + 1} 的選項「${optText}」至少要選擇 1 個加分結果`, 'error');
        highlightError(qb);
        return;
      }
      selectedResults.forEach(r => resultIdsUsedInThisQuestion.add(r));

      const scores = {};
      selectedResults.forEach(r => { scores[r] = 1; });
      options.push({ id: String.fromCharCode(97 + j), text: optText, scores });
    }

    if (resultIdsUsedInThisQuestion.size === 1) {
      showTopMsg(`題目 ${i + 1} 的所有選項都加分給同一個結果，請至少分散到 2 個不同結果`, 'error');
      qb.style.border = '1.5px solid #b14a35';
      highlightError(qb);
      setTimeout(() => { qb.style.border = ''; }, 3000);
      return;
    }

    questions.push({ id: i + 1, text: qText, options });
  }

  const btn = document.getElementById('btn-publish');
  btn.disabled = true;
  btn.textContent = '發布中...';

  try {
    const { data, error } = await supabaseClient.from('quizzes').insert({
      creator_id: currentUser.id,
      slot_index: targetSlotIndex,
      title: title,
      description: desc || '一個由 QuizDrop 社群成員創作的心理測驗',
      is_official: false,
      scoring_type: 'tag',
      questions: questions,
      results: { scoring_note: '計算每個結果累積的分數，取最高分的結果（同分則隨機挑一個）', results: results },
      is_public: true,
    }).select('id').single();

    if (error) throw error;

    showSuccessScreen(data.id);
  } catch (err) {
    console.error('Publish error:', err.message, err);
    showTopMsg('發布失敗：' + (err.message || '請再試一次'), 'error');
    btn.disabled = false;
    btn.textContent = '🚀 發布測驗';
  }
}

// 共用的「滾動到錯誤位置 + 紅框強調 3 秒」輔助函式，確保使用者能一眼看出問題在哪
function highlightError(el) {
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  const prevOutline = el.style.outline;
  const prevOutlineOffset = el.style.outlineOffset;
  el.style.outline = '2.5px solid #b14a35';
  el.style.outlineOffset = '3px';
  setTimeout(() => { el.style.outline = prevOutline; el.style.outlineOffset = prevOutlineOffset; }, 3000);
}

    sectionBasic: '📝 Quiz Basics', labelQuizTitle: 'Quiz title', labelQuizDesc: 'Quiz description',
    sectionResults: '🏆 Set up Results (4–8 results)', btnAddResult: '+ Add result',
    sectionQuestions: '❓ Design Questions (5–10 questions)', btnAddQuestion: '+ Add question',
    btnPublish: '🚀 Publish Quiz',
    successTitle: 'Quiz published successfully!', successDesc: 'Share this link with friends so they can play too',
    btnCopyUrl: '📋 Copy link', btnGoQuiz: 'View now →',
  },
};
let currentLang = 'zh';

function setLang(l) {
  currentLang = l;
  document.querySelectorAll('[data-lang-btn]').forEach(b => b.classList.toggle('active', b.dataset.langBtn === l));
  localStorage.setItem('quizdrop_lang', l);
  const t = i18nCreate[l];

  const setText = (id, text) => {
    const el = document.getElementById(id);
    if (el) el.textContent = text;
  };
  const setPlaceholder = (id, text) => {
    const el = document.getElementById(id);
    if (el) el.placeholder = text;
  };

  const loginBtn = document.querySelector('.qt-login');
  const signupBtn = document.querySelector('.qt-signup');
  if (loginBtn) loginBtn.textContent = t.login;
  if (signupBtn) signupBtn.textContent = t.signup;
  const dropdown = document.getElementById('qt-dropdown');
  if (dropdown) {
    const profileBtn = dropdown.querySelector('button:not(.danger)');
    const logoutBtn = dropdown.querySelector('button.danger');
    if (profileBtn) profileBtn.textContent = t.profile;
    if (logoutBtn) logoutBtn.textContent = t.logout;
  }

  setText('login-required-title', t.loginRequiredTitle);
  setText('login-required-desc', t.loginRequiredDesc);
  setText('login-required-link', t.loginRequiredLink);
  setText('slot-bar-prefix', t.slotBarPrefix);
  setText('slot-bar-suffix', t.slotBarSuffix);
  setText('section-title-basic', t.sectionBasic);
  setText('label-quiz-title', t.labelQuizTitle);
  setText('label-quiz-desc', t.labelQuizDesc);
  setText('section-title-results', t.sectionResults);
  setText('btn-add-result', t.btnAddResult);
  setText('section-title-questions', t.sectionQuestions);
  setText('btn-add-question', t.btnAddQuestion);
  setText('btn-publish', t.btnPublish);
  setText('success-title', t.successTitle);
  setText('success-desc', t.successDesc);
  setText('btn-copy-url-text', t.btnCopyUrl);
  setText('btn-go-quiz-text', t.btnGoQuiz);

  // 重新套用目前畫面對應的返回連結文字（不切換畫面本身，只更新文字語言）
  const isOnDashboardFlow = !document.getElementById('dashboard-view').classList.contains('hidden')
    || !document.getElementById('lock-view').classList.contains('hidden')
    || !document.getElementById('creator-view').classList.contains('hidden');
  setBackLink(isOnDashboardFlow ? 'dashboard' : 'home');
}

(function initLangFromStorage() {
  const saved = localStorage.getItem('quizdrop_lang') || 'zh';
  setLang(saved);
})();

initAuthUI();
init(); // 必須放在最後執行，因為 init() 內部可能呼叫 setBackLink，而 setBackLink 依賴 currentLang 與 i18nCreate 已宣告完成
</script>
</body>
</html>

  const shareLabelEl = document.getElementById('share-label');
  if (shareLabelEl) shareLabelEl.textContent = t.shareLabel;
  const prevEl = document.getElementById('btn-prev');
  if (prevEl) prevEl.textContent = t.prev;

  // 如果正在作答中，重新渲染當前題目
  const quizCard = document.getElementById('quiz-card');
  if (quizCard && !quizCard.classList.contains('hidden')) renderQ();
  // 如果正在看結果，重新渲染結果
  const resultCard = document.getElementById('result-card');
  if (resultCard && resultCard.style.display === 'block' && finalResult) renderResultTexts(finalResult);
}

const QUIZ_ID = '00000000-0000-0000-0000-000000000006'; // 對應 SQL 裡插入的官方測驗 ID（測驗六）
const ACTIVE_DIMS = ['K', 'Z', 'T']; // 會互相配對的三個維度；S 是「放養/低調」維度，不參與配對

// 多語系取值：資料庫的文字欄位是 { zh, ja, en } 物件；
// 如果是舊格式的純字串（尚未翻譯的測驗），直接回傳原字串，確保向下相容
function L(field) {
  if (field == null) return '';
  if (typeof field === 'string') return field;
  return field[currentLang] || field.zh || '';
}

let quizData = null;   // { questions, results }
let finalResult = null; // 提前宣告：applyLangToPage 切換語言時需要用到
let finalScores = null;
let quizTitle = '';
let current = 0;
let answers = [];      // 存每題選的 option 物件
let selected = null;
let currentUser = null;

/* ============================================================ */
/* 1. 從 Supabase 載入測驗題目與結果定義                          */
/* ============================================================ */
async function loadQuiz() {
  try {
    const { data: { session } } = await supabaseClient.auth.getSession();
    currentUser = session?.user || null;

    await updateTopbarAuthState();

    const { data, error } = await supabaseClient
      .from('quizzes')
      .select('title, description, questions, results')
      .eq('id', QUIZ_ID)
      .single();

    if (error) throw error;

    quizData = {
      questions: data.questions,
      results: data.results.results,
      titleI18n: data.results.title_i18n || data.title,       // 多語系標題（舊測驗沒有這欄，就用純字串 title）
      descI18n: data.results.description_i18n || data.description,
    };
    quizTitle = data.title;

    document.getElementById('loading').classList.add('hidden');
    applyLangToPage(); // 資料載入完成後，把當前語言套用到畫面

    // 檢查網址是否帶有 ?result=xxx 參數，代表是從個人頁面點過來「重溫結果」
    const urlParams = new URLSearchParams(window.location.search);
    const resultIdFromUrl = urlParams.get('result');

    if (resultIdFromUrl) {
      const savedResult = quizData.results.find(r => r.id === resultIdFromUrl);
      if (savedResult) {
        showSavedResult(savedResult);
        return;
      }
    }

    document.getElementById('start-screen').classList.remove('hidden');
  } catch (err) {
    document.getElementById('loading').textContent = i18n[currentLang].loadFail + ' (' + err.message + ')';
    console.error(err);
  }
}
loadQuiz();

function toggleUserDropdown() {
  document.getElementById('qt-dropdown').classList.toggle('show');
}

// 點擊頁面其他地方時自動收起下拉選單
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('qt-user-chip-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('qt-dropdown')?.classList.remove('show');
  }
});

function handleQuizPageLogout() {
  if (confirm('要登出嗎？')) {
    supabaseClient.auth.signOut().then(() => {
      window.location.href = 'index.html';
    });
  }
}

// 把結果的文字渲染到畫面上（抽成共用函式，切換語言時可以重新呼叫）
function renderResultTexts(result) {
  document.getElementById('r-emoji').textContent = result.emoji;
  document.getElementById('r-title').textContent = L(result.label);
  document.getElementById('r-subtitle').textContent = L(result.subtitle);
  document.getElementById('r-desc').textContent = L(result.desc);
  const traitList = L(result.traits) || [];
  document.getElementById('r-traits').innerHTML = (Array.isArray(traitList) ? traitList : [])
    .map(t => `<span class="trait">${escapeText(t)}</span>`).join('');
}

// 直接顯示已存的結果（從個人頁面點「重溫結果」過來時使用），不重新計分、不重複存檔
function showSavedResult(result) {
  finalResult = result; // 記起來，切換語言時才能重新渲染
  renderResultTexts(result);

  const statusEl = document.getElementById('save-status');
  statusEl.className = 'save-status saved';
  statusEl.textContent = i18n[currentLang].oldResult;

  document.getElementById('result-card').style.display = 'block';
}

async function updateTopbarAuthState() {
  if (!currentUser) return;

  document.getElementById('qt-auth-buttons').classList.add('hidden');
  document.getElementById('qt-user-chip-wrap').classList.remove('hidden');

  let displayName = currentUser.email.split('@')[0];
  try {
    const { data } = await supabaseClient.from('users').select('display_name').eq('id', currentUser.id).single();
    if (data?.display_name) displayName = data.display_name;
  } catch (e) {}

  document.getElementById('qt-username-display').textContent = displayName;
  document.getElementById('qt-avatar-initial').textContent = displayName.charAt(0).toUpperCase();
}

/* ============================================================ */
/* 2. 測驗流程                                                     */
/* ============================================================ */
function startQuiz() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('progress-wrap').classList.remove('hidden');
  document.getElementById('quiz-card').classList.remove('hidden');
  renderDots();
  renderQ();
}

function renderDots() {
  const qs = quizData.questions;
  const wrap = document.getElementById('step-dots');
  wrap.innerHTML = qs.map((q, i) => {
    let cls = 'step-dot';
    if (i === current) cls += ' current';
    else if (answers[i]) cls += ' answered';
    else if (i > current) cls += ' locked'; // 不能超前偷看未作答的題目
    return `<button class="${cls}" data-idx="${i}" onclick="jumpTo(${i})">${i + 1}</button>`;
  }).join('');
}

function jumpTo(idx) {
  // 只能跳到「已經回答過的題目」或「目前這一題」，不能跳到未作答的未來題目
  if (idx > current && !answers[idx]) return;
  if (idx === current) return;
  current = idx;
  selected = answers[current] || null;
  renderQ();
}

function renderQ() {
  const qs = quizData.questions;
  const q = qs[current];
  const t = i18n[currentLang];

  document.getElementById('q-num').textContent = t.qLabel(current + 1, qs.length);
  document.getElementById('q-text').textContent = L(q.text);
  document.getElementById('unanswered-warning').classList.remove('show');

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach((o) => {
    const btn = document.createElement('button');
    btn.className = 'opt' + (answers[current]?.id === o.id ? ' selected' : '');
    btn.textContent = escapeText(L(o.text));
    btn.onclick = () => selectOpt(o, btn);
    opts.appendChild(btn);
  });

  selected = answers[current] || null;

  const isLastQuestion = current === qs.length - 1;
  const nextBtn = document.getElementById('btn-next');
  if (isLastQuestion) {
    nextBtn.classList.remove('hidden');
    nextBtn.textContent = t.finish;
  } else {
    nextBtn.classList.add('hidden');
  }

  document.getElementById('btn-prev').disabled = current === 0;
  updateNextBtn();
  renderDots();
}

function escapeText(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.textContent;
}

function selectOpt(option, btn) {
  document.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selected = option;
  answers[current] = option;
  document.getElementById('unanswered-warning').classList.remove('show');
  updateNextBtn();
  renderDots();

  const total = quizData.questions.length;
  if (current < total - 1) {
    // 自動跳下一題，短暫延遲讓使用者看到選中的視覺反饋
    setTimeout(() => {
      current++;
      selected = answers[current] || null;
      renderQ();
    }, 280);
  }
  // 最後一題不自動跳轉，使用者需要點擊「查看診斷結果」按鈕才會送出
}

function updateNextBtn() {
  document.getElementById('btn-next').classList.toggle('active', selected !== null);
}

function prevQ() {
  if (current === 0) return;
  current--;
  selected = answers[current] || null;
  renderQ();
}

function nextQ() {
  if (selected === null) {
    document.getElementById('unanswered-warning').classList.add('show');
    return;
  }
  const total = quizData.questions.length;
  if (current < total - 1) {
    current++;
    selected = answers[current] || null;
    renderQ();
  } else {
    // 最後一題，確認所有題目都回答過才能送出
    const unansweredIdx = quizData.questions.findIndex((_, i) => !answers[i]);
    if (unansweredIdx !== -1) {
      current = unansweredIdx;
      selected = null;
      renderQ();
      document.getElementById('unanswered-warning').classList.add('show');
      return;
    }
    showResult();
  }
}

/* ============================================================ */
/* 3. 計分邏輯：依照 Gemini 規劃的維度法 + 8種結果映射              */
/* ============================================================ */
function calcScores() {
  const dims = { K: 0, Z: 0, T: 0, S: 0 };
  answers.forEach(opt => {
    for (const k in opt.scores) dims[k] = (dims[k] || 0) + opt.scores[k];
  });
  return dims;
}

function matchResult(dims) {
  const allVals = Object.values(dims);
  const activeVals = ACTIVE_DIMS.map(d => dims[d]);
  const maxActive = Math.max(...activeVals);

  // 情況一：K/Z/T 三個維度都偏低 → S（佛系放養心）自然最高 → 均低結果
  if (maxActive <= 4) {
    return quizData.results.find(r => r.id === 'ALL_LOW');
  }

  // 情況二：四個維度分數都很接近、沒有明顯落差 → 均高結果
  const spread = Math.max(...allVals) - Math.min(...allVals);
  if (spread <= 2) {
    return quizData.results.find(r => r.id === 'ALL_HIGH');
  }

  // 情況三：K/Z/T 排序，找出第一名與第二名
  const sortedActive = [...ACTIVE_DIMS].sort((a, b) => dims[b] - dims[a]);
  const top1 = sortedActive[0], second = sortedActive[1];

  // 第一名遙遙領先、第二名也偏低 → 單一維度獨大
  if (dims[top1] - dims[second] >= 4 && dims[second] <= 4) {
    return quizData.results.find(r => r.id === top1 + '_SOLO');
  }

  // 其餘情況 → 前兩名組成配對結果
  const pairKey = [top1, second].sort().join('');
  const found = quizData.results.find(r => r.top_dims && [...r.top_dims].sort().join('') === pairKey);
  return found || quizData.results.find(r => r.id === 'ALL_HIGH'); // fallback
}

async function showResult() {
  document.getElementById('quiz-card').classList.add('hidden');
  document.getElementById('progress-wrap').classList.add('hidden');

  finalScores = calcScores();
  finalResult = matchResult(finalScores);

  renderResultTexts(finalResult);

  document.getElementById('result-card').style.display = 'block';
  document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'start' });

  // 存入資料庫（只有登入者才存）
  await saveResultIfLoggedIn();
}

/* ============================================================ */
/* 4. 存結果到 quiz_results（登入者才存，訪客顯示提示）             */
/* ============================================================ */
async function saveResultIfLoggedIn() {
  const statusEl = document.getElementById('save-status');
  const t = i18n[currentLang];

  if (!currentUser) {
    statusEl.className = 'save-status guest';
    statusEl.textContent = t.guestMsg;
    return;
  }

  try {
    const { error } = await supabaseClient
      .from('quiz_results')
      .upsert({
        user_id: currentUser.id,
        quiz_id: QUIZ_ID,
        result_label: finalResult.id,
        // 存中文標題：個人頁面的紀錄列表統一顯示中文，避免使用者用英文玩完、
        // 之後切回中文看紀錄時出現看不懂的英文標題
        result_title: (typeof finalResult.label === 'string') ? finalResult.label : finalResult.label.zh,
        scores: finalScores,
        played_at: new Date().toISOString(),
      }, { onConflict: 'user_id,quiz_id' });
    if (error) throw error;

    statusEl.className = 'save-status saved';
    statusEl.textContent = t.savedMsg;
  } catch (err) {
    statusEl.className = 'save-status guest';
    statusEl.textContent = t.failMsg;
    console.error(err);
  }
}

/* ============================================================ */
/* 5. 分享功能                                                     */
/* ============================================================ */
function getShareText() {
  const t = i18n[currentLang];
  return {
    text: t.shareText(finalResult.emoji, L(finalResult.label), L(finalResult.subtitle)),
    url: window.location.href
  };
}

function shareTwitter() {
  const { text, url } = getShareText();
  const shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
  window.open(shareUrl, '_blank', 'noopener,noreferrer');
}
function shareLine() {
  const { text, url } = getShareText();
  const shareUrl = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;
  window.open(shareUrl, '_blank', 'noopener,noreferrer');
}
// 偵測是否在 LINE / Threads / Instagram / Facebook 等 App 內建瀏覽器（WebView）中
// 這類環境常會封鎖 window.open 開新視窗的行為，需要改用同頁跳轉
function isInAppWebView() {
  const ua = navigator.userAgent || '';
  return /Line\/|FBAN|FBAV|Instagram|Threads/i.test(ua);
}

function shareFacebook() {
  const { text, url } = getShareText();
  navigator.clipboard.writeText(text + '\n' + url).then(() => {
    showToast('結果已複製！貼到 Facebook 貼文裡分享吧 📋', 4000);
    const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`;
    setTimeout(() => {
      if (isInAppWebView()) {
        // App 內建瀏覽器通常會封鎖 window.open，改用同頁跳轉確保真的會開啟
        window.location.href = fbUrl;
      } else {
        window.open(fbUrl, '_blank', 'noopener,noreferrer');
      }
    }, 1200);
  }).catch(() => {
    // 如果連複製都失敗（部分 WebView 限制 clipboard API），至少還是要嘗試跳轉分享頁
    const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`;
    if (isInAppWebView()) {
      window.location.href = fbUrl;
    } else {
      window.open(fbUrl, '_blank', 'noopener,noreferrer');
    }
  });
}
function copyResult() {
  const { text, url } = getShareText();
  navigator.clipboard.writeText(text + '\n' + url).then(() => showToast('已複製！'));
}
function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function retry() {
  current = 0; answers = []; selected = null;
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('quiz-card').classList.remove('hidden');
  document.getElementById('progress-wrap').classList.remove('hidden');
  renderQ();
}
</script>

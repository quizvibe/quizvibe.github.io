<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黃金秒數盲數挑戰 - QuizDrop</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; }
  html { overflow-y: scroll; }
  body { background: #f9f6f0; color: #2d2d2d; min-height: 100vh; padding-bottom: 60px; }
  .hidden { display: none !important; }

  /* ===== 純 CSS 七段顯示器數字（不依賴任何外部字體檔案） ===== */
  .seg-digit { position: relative; display: inline-block; width: 0.55em; height: 1em; margin: 0 0.05em; }
  .seg-digit .seg { position: absolute; background: currentColor; opacity: 0.12; transition: opacity .08s; }
  .seg-digit .seg.on { opacity: 1; }
  .seg-digit .seg-a { top: 0; left: 12%; width: 76%; height: 12%; clip-path: polygon(10% 0,90% 0,100% 50%,90% 100%,10% 100%,0% 50%); }
  .seg-digit .seg-b { top: 4%; right: 0; width: 14%; height: 44%; clip-path: polygon(0 10%,100% 0,100% 90%,0 100%,50% 50%); }
  .seg-digit .seg-c { bottom: 4%; right: 0; width: 14%; height: 44%; clip-path: polygon(0 0,100% 10%,100% 100%,0 90%,50% 50%); }
  .seg-digit .seg-d { bottom: 0; left: 12%; width: 76%; height: 12%; clip-path: polygon(10% 0,90% 0,100% 50%,90% 100%,10% 100%,0% 50%); }
  .seg-digit .seg-e { bottom: 4%; left: 0; width: 14%; height: 44%; clip-path: polygon(0 0,100% 10%,100% 90%,0 100%,50% 50%); }
  .seg-digit .seg-f { top: 4%; left: 0; width: 14%; height: 44%; clip-path: polygon(0 10%,100% 0,100% 100%,0 90%,50% 50%); }
  .seg-digit .seg-g { top: 44%; left: 12%; width: 76%; height: 12%; clip-path: polygon(10% 0,90% 0,100% 50%,90% 100%,10% 100%,0% 50%); }

  .seg-colon { position: relative; display: inline-block; width: 0.2em; height: 1em; vertical-align: top; }
  .seg-colon .dot { position: absolute; left: 50%; width: 16%; height: 12%; background: currentColor; border-radius: 50%; transform: translateX(-50%); }
  .seg-colon .dot.top { top: 28%; }
  .seg-colon .dot.bottom { top: 60%; }

  .topbar { height: 58px; background: #fff; border-bottom: 1px solid #ececec; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 50; }
  .back { color: #888; font-size: 13px; text-decoration: none; }
  .spacer { flex: 1; }
  .tb-btn { padding: 7px 14px; border-radius: 99px; font-size: 12.5px; font-weight: 700; border: 1.5px solid #ececec; background: #fff; cursor: pointer; }

  .wrap { max-width: 480px; margin: 0 auto; padding: 24px 20px; text-align: center; }
  .game-title { font-size: 21px; font-weight: 900; margin-bottom: 4px; }
  .game-sub { color: #999; font-size: 13px; margin-bottom: 18px; line-height: 1.6; }

  .game-stage { position: relative; width: 100%; aspect-ratio: 1 / 1; max-width: 480px; margin: 0 auto 24px; border-radius: 18px; overflow: hidden; }
  .game-stage-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; display: block; }

  .mode-row-overlay { position: absolute; top: 3%; right: 3%; display: flex; gap: 5px; z-index: 5; }
  .mode-chip { padding: 4px 11px; border-radius: 4px; font-size: 11px; font-weight: 800; cursor: pointer; border: 2px solid #2d2d2d; background: #f5d547; color: #2d2d2d; transform: rotate(-2deg); }
  .mode-chip.active { background: #ff8a3d; }

  .board-screen-overlay {
    position: absolute; top: 12%; left: 25%; width: 70%; height: 26%; z-index: 2;
    display: flex; align-items: center; justify-content: center;
    font-size: 9.9vw; color: #fff; line-height: 1;
  }
  /* 中心點：水平右移約10%寬度、垂直下移約12.5%高度（以畫面邊長計算） */
  .board-screen-overlay { transform: translate(10%, 12.5%); }
  .board-digit-overlay.flash { color: #ff3b3b; }

  .target-overlay {
    position: absolute; top: 63%; left: 3%; width: 36%; height: 18%; z-index: 2;
    display: flex; align-items: center; justify-content: center;
    font-size: 8.1vw; color: #d83b3b; line-height: 1;
  }
  /* 縮小5%、往右下移動約1/8~1/9邊長 */
  .target-overlay { transform: translate(12%, 11%); }

  .hand-img-overlay { position: absolute; bottom: -4%; right: -10%; width: 60%; z-index: 4; transition: transform .09s; pointer-events: none; transform-origin: bottom right; }
  .hand-img-overlay.pressing { transform: translateY(3%) rotate(-3deg) scale(0.97); }

  .impact-img-overlay { position: absolute; bottom: 26%; right: 26%; width: 28%; z-index: 4; pointer-events: none; opacity: 0; }
  .impact-img-overlay.show { animation: impactPopOverlay .35s ease-out forwards; }
  @keyframes impactPopOverlay { 0% { opacity: 1; transform: scale(0.6); } 100% { opacity: 0; transform: scale(1.5); } }

  .main-btn-overlay {
    position: absolute; bottom: 13%; right: 25%; width: 25%; height: 15%; z-index: 3;
    border-radius: 50%; border: 4px solid #1a1a1a; font-size: 2.6vw; font-weight: 900; color: #fff;
    cursor: pointer; box-shadow: 0 6px 0 rgba(0,0,0,0.3); transition: all .08s;
    transform: perspective(280px) rotateX(35deg);
  }
  .main-btn-overlay:active, .main-btn-overlay.pressed { transform: perspective(280px) rotateX(35deg) translateY(5px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
  .main-btn-overlay.state-start { background: #2ecc71; }
  .main-btn-overlay.state-stop { background: #ff3b3b; }
  .main-btn-overlay.state-ready { background: #ccc; }

  .result-panel { margin-top: 24px; background: #fff; border: 2px solid #ececec; border-radius: 16px; padding: 20px; display: none; text-align: left; }
  .result-panel.show { display: block; }
  .result-diff { font-size: 30px; font-weight: 900; margin-bottom: 8px; text-align: center; }
  .result-diff.win { color: #2da44e; }
  .result-diff.lose { color: #d83b3b; }
  .result-text { font-size: 13.5px; line-height: 1.7; color: #555; margin-bottom: 14px; }
  .result-btns { display: flex; gap: 8px; }
  .result-btns button { flex: 1; padding: 11px; border-radius: 10px; font-weight: 700; font-size: 13px; border: none; cursor: pointer; }
  .btn-copy-result { background: #1f1f1f; color: #fff; }

  .recent-list { margin-top: 20px; text-align: left; }
  .recent-title { font-size: 12px; font-weight: 800; color: #999; margin-bottom: 8px; }
  .recent-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f3f3f3; font-size: 12.5px; color: #666; }
  .recent-row .recent-diff.win { color: #2da44e; font-weight: 700; }
  .recent-row .recent-diff.lose { color: #d83b3b; font-weight: 700; }

  .style-row { display: flex; gap: 10px; justify-content: center; margin-top: 22px; flex-wrap: wrap; }
  .style-chip { padding: 8px 16px; border-radius: 99px; font-size: 12.5px; font-weight: 700; border: 1.5px solid #ececec; background: #fff; cursor: pointer; }
  .style-chip.active { border-color: #ff5da2; color: #ff5da2; background: #fff0f5; }
  .style-chip.locked { opacity: .55; }

  .content-footer-slot { margin-top: 22px; padding: 16px; background: #fafafa; border: 1px dashed #ddd; border-radius: 12px; font-size: 11.5px; color: #bbb; text-align: center; }
  .ad-banner-fixed-game { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: rgba(255,255,255,.96); backdrop-filter: blur(8px); border-top: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #bbb; z-index: 40; }
  @media (min-width: 768px) { .ad-banner-fixed-game { display: none; } body { padding-bottom: 0; } }
</style>
</head>
<body>

<div class="topbar">
  <a href="games.html" class="back">← 糞Game大廳</a>
  <div class="spacer"></div>
  <button class="tb-btn" onclick="showProgressModal()">📊 本關進度</button>
</div>

<div class="wrap">
  <div class="game-title">⏱️ 黃金秒數盲數挑戰</div>
  <div class="game-sub">記住思考泡泡裡的目標秒數，10秒後畫面會隱藏，靠你的生物鐘盲數按停！</div>

  <div class="game-stage">
    <img class="game-stage-bg" src="game-bg.png" alt="">

    <div class="mode-row-overlay">
      <button class="mode-chip active" id="mode-easy" onclick="setMode('easy')">EASY</button>
      <button class="mode-chip" id="mode-hard" onclick="setMode('hard')">HARD</button>

    <div class="board-screen-overlay" id="board-screen-overlay">

    <div class="target-overlay">
      <span class="seg-digit" id="t1"></span><span class="seg-digit" id="t2"></span><span class="seg-colon" id="target-dot-wrap"><span class="dot top"></span><span class="dot bottom"></span></span><span class="seg-digit" id="t3"></span><span class="seg-digit" id="t4"></span>
    </div>

    <img class="impact-img-overlay" id="impact-img" src="hand-impact.png" alt="">
    <img class="hand-img-overlay" id="hand-img" src="hand-clean.png" alt="">

    <button class="main-btn-overlay state-start" id="main-btn" onclick="onMainBtnClick()">START</button>
  </div>

  <div class="result-panel" id="result-panel">
    <div class="result-diff" id="result-diff"></div>
    <div class="result-text" id="result-text"></div>

      <button class="btn-copy-result" onclick="copyResultText()">📋 複製發Threads</button>
    </div>
  </div>

  <div class="recent-list" id="recent-list-wrap">
    <div class="recent-title">📋 最近 5 次紀錄</div>
    <div id="recent-list"></div>
  </div>

  <div class="style-row" id="style-row"></div>

  <div class="content-footer-slot">廣告版位</div>
</div>

<div class="ad-banner-fixed-game">廣告版位</div>

<script>
const SUPABASE_URL = 'https://xsflpzozgdgbtrtdzdlj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzZmxwem96Z2RnYnRydGR6ZGxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTMyMzUsImV4cCI6MjA5NzE4OTIzNX0.Uyi5dYa73h0JJ9KwT2bP0C79wV_H-PoYneiR5xsbT6I';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;
supabaseClient.auth.getSession().then(({ data: { session } }) => { currentUser = session?.user || null; });

function getGuestId() {
  let gid = localStorage.getItem('quizdrop_guest_id');
  if (!gid) { gid = 'guest_' + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('quizdrop_guest_id', gid); }
  return gid;
}

const AudioEngine = (() => {
  let ctx = null;
  function getCtx() { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); if (ctx.state === 'suspended') ctx.resume(); return ctx; }
  function playSuccess() {
    const c = getCtx(); const now = c.currentTime;
    [523.25, 783.99].forEach((freq, i) => {
      const osc = c.createOscillator(); const gain = c.createGain();
      osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now + i * 0.1);
      gain.gain.setValueAtTime(0.2, now + i * 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.3);
      osc.connect(gain).connect(c.destination); osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.3);
    });
  }
  function playFail() {
    const c = getCtx(); const now = c.currentTime;
    const osc = c.createOscillator(); const gain = c.createGain();
    osc.type = 'triangle'; osc.frequency.setValueAtTime(300, now);
    osc.frequency.exponentialRampToValueAtTime(120, now + 0.4);
    gain.gain.setValueAtTime(0.18, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
    osc.connect(gain).connect(c.destination); osc.start(now); osc.stop(now + 0.45);
  }
  function playTick() {
    const c = getCtx(); const now = c.currentTime;
    const osc = c.createOscillator(); const gain = c.createGain();
    osc.type = 'square'; osc.frequency.setValueAtTime(1200, now);
    gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    osc.connect(gain).connect(c.destination); osc.start(now); osc.stop(now + 0.08);
  }
  return { playSuccess, playFail, playTick };
})();

const PROGRESS_KEY = 'quizdrop_game_progress';
function getProgress() {
  const raw = localStorage.getItem(PROGRESS_KEY);
  return raw ? JSON.parse(raw) : {
    timing: { wins: 0, plays: 0, stylesUnlocked: ['default'] },
    chicken: { hits: 0, plays: 0, stylesUnlocked: ['default'] },
    bubble: { totalPopped: 0, fastestSheetMs: null, stylesUnlocked: ['default'] },
  };
}
function saveProgress(p) { localStorage.setItem(PROGRESS_KEY, JSON.stringify(p)); }
function unlockStyle(gameId, styleName) {
  const p = getProgress();
  if (!p[gameId].stylesUnlocked.includes(styleName)) { p[gameId].stylesUnlocked.push(styleName); saveProgress(p); }
}

function showAdUnlockModal(onComplete) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(20,20,20,.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:20px;padding:28px;max-width:320px;width:100%;text-align:center;font-family:'Noto Sans TC',sans-serif;">
      <div style="font-size:13px;color:#999;margin-bottom:12px;font-weight:700;" id="adm-counter">廣告播放中...</div>
      <div style="background:repeating-linear-gradient(45deg,#f0f0f0,#f0f0f0 10px,#e8e8e8 10px,#e8e8e8 20px);border-radius:12px;height:140px;display:flex;align-items:center;justify-content:center;color:#999;font-size:13px;margin-bottom:14px;">📺 模擬廣告</div>
      <div style="height:6px;background:#f0f0f0;border-radius:99px;overflow:hidden;margin-bottom:14px;"><div id="adm-fill" style="height:100%;background:linear-gradient(90deg,#ff5da2,#ff8a5c);width:0%;transition:width .1s linear;"></div></div>
      <button id="adm-btn" disabled style="width:100%;padding:12px;border-radius:10px;background:#1f1f1f;color:#fff;border:none;font-weight:700;opacity:.3;cursor:not-allowed;">請等待...</button>
    </div>`;
  document.body.appendChild(overlay);
  let elapsed = 0; const duration = 3000;
  const fill = overlay.querySelector('#adm-fill'); const btn = overlay.querySelector('#adm-btn');
  const interval = setInterval(() => {
    elapsed += 100; fill.style.width = Math.min(100, (elapsed / duration) * 100) + '%';
    if (elapsed >= duration) {
      clearInterval(interval); btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer';
      btn.textContent = '完成，解鎖風格 →'; overlay.querySelector('#adm-counter').textContent = '廣告播放完畢！';
    }
  }, 100);
  btn.onclick = () => { document.body.removeChild(overlay); onComplete(); };
}

let targetSeconds = 0;
let startTime = 0;
let timerInterval = null;
let gameState = 'idle';
let lastWholeSecond = -1;
let mode = 'easy';

function setMode(m) {
  if (gameState === 'running') return;
  mode = m;
  document.getElementById('mode-easy').classList.toggle('active', m === 'easy');
  document.getElementById('mode-hard').classList.toggle('active', m === 'hard');
  generateNewTarget();
}

function generateNewTarget() {
  if (mode === 'easy') {
    targetSeconds = Math.floor(15 + Math.random() * 6);
  } else {
    targetSeconds = Math.round((15 + Math.random() * 5) * 100) / 100;
  }
  const targetStr = mode === 'easy' ? targetSeconds.toFixed(0).padStart(2, ' ') : targetSeconds.toFixed(2);
  // 整秒模式只顯示前兩位（秒數），小數點模式顯示完整 4 位數字
  const cleanTarget = mode === 'easy'
    ? String(targetSeconds).padStart(2, '0') + '--'
    : String(Math.floor(targetSeconds)).padStart(2, '0') + String(Math.round((targetSeconds % 1) * 100)).padStart(2, '0');
  setTargetDigits(cleanTarget);
  document.getElementById('target-dot-wrap').style.display = mode === 'easy' ? 'none' : 'inline-block';
  resetBoard();
}

function resetBoard() {
  setDigits('----');
  document.querySelectorAll('.board-digit-overlay').forEach(d => d.classList.remove('flash'));
}

// 七段顯示器數字對照表：每個數字對應 a~g 七段中哪幾段要點亮
const SEG_MAP = {
  '0': ['a','b','c','d','e','f'],
  '1': ['b','c'],
  '2': ['a','b','g','e','d'],
  '3': ['a','b','g','c','d'],
  '4': ['f','g','b','c'],
  '5': ['a','f','g','c','d'],
  '6': ['a','f','g','e','c','d'],
  '7': ['a','b','c'],
  '8': ['a','b','c','d','e','f','g'],
  '9': ['a','b','c','d','f','g'],
  '-': [],
};

function renderSegDigit(el, char) {
  const segs = SEG_MAP[char] || [];
  el.innerHTML = ['a','b','c','d','e','f','g'].map(s =>
    `<span class="seg seg-${s}${segs.includes(s) ? ' on' : ''}"></span>`
  ).join('');
}

function setDigits(clean) {
  renderSegDigit(document.getElementById('d1'), clean[0] || '-');
  renderSegDigit(document.getElementById('d2'), clean[1] || '-');
  renderSegDigit(document.getElementById('d3'), clean[2] || '-');
  renderSegDigit(document.getElementById('d4'), clean[3] || '-');
}

function setTargetDigits(clean) {
  renderSegDigit(document.getElementById('t1'), clean[0] || '-');
  renderSegDigit(document.getElementById('t2'), clean[1] || '-');
  renderSegDigit(document.getElementById('t3'), clean[2] || '-');
  renderSegDigit(document.getElementById('t4'), clean[3] || '-');
}

function onMainBtnClick() {
  triggerPressAnimation();
  if (gameState === 'idle') startTiming();
  else if (gameState === 'running') stopTiming();
  else if (gameState === 'finished') resetForNewRound();
}

function triggerPressAnimation() {
  const hand = document.getElementById('hand-img');
  const btn = document.getElementById('main-btn');
  const impact = document.getElementById('impact-img');
  hand.classList.add('pressing');
  btn.classList.add('pressed');
  impact.classList.remove('show');
  void impact.offsetWidth;
  impact.classList.add('show');
  setTimeout(() => { hand.classList.remove('pressing'); btn.classList.remove('pressed'); }, 140);
}

function startTiming() {
  gameState = 'running';
  lastWholeSecond = -1;
  document.getElementById('result-panel').classList.remove('show');

  const btn = document.getElementById('main-btn');
  btn.classList.remove('state-start');
  btn.classList.add('state-stop');
  btn.textContent = 'STOP';

  startTime = performance.now();
  timerInterval = setInterval(updateTimerDisplay, 30);
}

function getElapsed() { return (performance.now() - startTime) / 1000; }

function updateTimerDisplay() {
  const elapsed = getElapsed();
  const wholeSecond = Math.floor(elapsed);

  if (elapsed >= 10) {
    setDigits('----');
  } else {
    const secStr = String(wholeSecond).padStart(2, '0');
    const centiValue = Math.round((elapsed - wholeSecond) * 100);
    const centiStr = String(centiValue).padStart(2, '0');
    setDigits(secStr + centiStr);

    if (wholeSecond !== lastWholeSecond) {
      lastWholeSecond = wholeSecond;
      AudioEngine.playTick();
      flashDigits();
    }
  }
}

function flashDigits() {
  const digits = document.querySelectorAll('.board-digit-overlay');
  digits.forEach(d => d.classList.add('flash'));
  setTimeout(() => digits.forEach(d => d.classList.remove('flash')), 150);
}

function stopTiming() {
  clearInterval(timerInterval);
  const actual = getElapsed();
  gameState = 'finished';

  const btn = document.getElementById('main-btn');
  btn.classList.remove('state-stop');
  btn.classList.add('state-ready');
  btn.textContent = 'AGAIN';

  const finalSec = Math.floor(actual);
  const finalCenti = Math.round((actual - finalSec) * 100);
  setDigits(String(finalSec).padStart(2, '0') + String(finalCenti).padStart(2, '0'));

  const diff = Math.abs(actual - targetSeconds);
  const isWin = diff <= 0.3;
  if (isWin) AudioEngine.playSuccess(); else AudioEngine.playFail();

  const progress = getProgress();
  progress.timing.plays++;
  if (isWin) progress.timing.wins++;
  saveProgress(progress);
  checkUnlocks();

  showResultPanel(diff, actual, isWin);
  pushRecentResult(targetSeconds, actual, diff, isWin);
  saveGameResult('timing', { target: targetSeconds, actual: Math.round(actual * 100) / 100, diff: Math.round(diff * 100) / 100, win: isWin, mode });
}

function resetForNewRound() {
  gameState = 'idle';
  const btn = document.getElementById('main-btn');
  btn.classList.remove('state-ready');
  btn.classList.add('state-start');
  btn.textContent = 'START';
  document.getElementById('result-panel').classList.remove('show');
  generateNewTarget();
}

async function saveGameResult(gameId, recordDetail) {
  try {
    await supabaseClient.from('game_results').insert({
      user_id: currentUser?.id || null,
      guest_id: currentUser ? null : getGuestId(),
      game_id: gameId,
      record_detail: recordDetail,
    });
  } catch (err) { console.warn('Game result sync failed (non-blocking):', err); }
}

let lastResultText = '';

function showResultPanel(diff, actual, isWin) {
  const targetStr = mode === 'easy' ? targetSeconds.toFixed(0) : targetSeconds.toFixed(2);
  const actualStr = actual.toFixed(2);

  const diffEl = document.getElementById('result-diff');
  diffEl.textContent = (actual > targetSeconds ? '+' : '-') + diff.toFixed(2) + ' 秒';
  diffEl.className = 'result-diff ' + (isWin ? 'win' : 'lose');

  let text;
  if (diff <= 0.05) {
    text = '恭喜！你的大腦是瑞士瓦特製錶級人體時鐘！超越全網 99% 的通靈人類，快截圖去 Threads 逼你朋友下跪！';
  } else if (diff <= 0.3) {
    text = `差一點！你的生物鐘慢/快了 ${diff.toFixed(2)} 秒。大概是今天冰美式喝不夠，或者單純是手抖。再試一次，你離神不遠了。`;
  } else {
    text = `差太遠了吧！指定 ${targetStr} 秒你 ${actualStr} 秒就按？你的人生是不是也勝在速度？建議去檢查一下心律不整，快分享出去讓朋友笑你！`;
  }
  document.getElementById('result-text').textContent = text;
  lastResultText = `⏱️ QuizDrop黃金秒數挑戰\n目標：${targetStr}秒，我按了：${actualStr}秒\n${text}`;
  document.getElementById('result-panel').classList.add('show');
}

function copyResultText() {
  navigator.clipboard.writeText(lastResultText).then(() => alert('已複製！貼到 Threads 分享吧'));
}

const RECENT_KEY = 'quizdrop_timing_recent';
function pushRecentResult(target, actual, diff, isWin) {
  let recent = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
  recent.unshift({ target, actual: Math.round(actual * 100) / 100, diff: Math.round(diff * 100) / 100, isWin, mode });
  recent = recent.slice(0, 5);
  localStorage.setItem(RECENT_KEY, JSON.stringify(recent));
  renderRecentList();
}

function renderRecentList() {
  const recent = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
  const listEl = document.getElementById('recent-list');
  if (recent.length === 0) {
    listEl.innerHTML = '<div style="font-size:12.5px;color:#bbb;">還沒有紀錄，快來挑戰第一次！</div>';
    return;
  }
  listEl.innerHTML = recent.map(r => {
    const targetStr = r.mode === 'easy' ? r.target.toFixed(0) : r.target.toFixed(2);
    return `
      <div class="recent-row">
        <span>目標 ${targetStr}s → 按了 ${r.actual.toFixed(2)}s</span>
        <span class="recent-diff ${r.isWin ? 'win' : 'lose'}">${r.isWin ? '✓' : '✗'} 差 ${r.diff.toFixed(2)}s</span>
      </div>
    `;
  }).join('');
}

let currentStyle = 'default';
const STYLE_DEFS = [
  { id: 'default', label: '🎌 標準風格', unlockCondition: null },
  { id: 'manga', label: '📓 線條無色', unlockCondition: (p) => p.timing.wins >= 5, unlockText: '累積 5 次勝利解鎖' },
  { id: 'crayon', label: '🖍️ 蠟筆塗鴉', unlockCondition: (p) => p.timing.plays >= 15, unlockText: '遊玩 15 次或看廣告解鎖' },
];

function renderStyleRow() {
  const progress = getProgress();
  const row = document.getElementById('style-row');
  row.innerHTML = STYLE_DEFS.map(s => {
    const unlocked = progress.timing.stylesUnlocked.includes(s.id);
    const cls = 'style-chip' + (s.id === currentStyle ? ' active' : '') + (!unlocked ? ' locked' : '');
    return `<button class="${cls}" onclick="onStyleClick('${s.id}')">${s.label} ${!unlocked ? '🔒' : ''}</button>`;
  }).join('');
}

function onStyleClick(styleId) {
  const progress = getProgress();
  const styleDef = STYLE_DEFS.find(s => s.id === styleId);
  const unlocked = progress.timing.stylesUnlocked.includes(styleId);
  if (unlocked) { currentStyle = styleId; renderStyleRow(); return; }
  if (confirm(`此風格尚未解鎖（${styleDef.unlockText}）\n要看一段廣告直接解鎖嗎？`)) {
    showAdUnlockModal(() => { unlockStyle('timing', styleId); currentStyle = styleId; renderStyleRow(); });
  }
}

function checkUnlocks() {
  const progress = getProgress();
  STYLE_DEFS.forEach(s => {
    if (s.unlockCondition && s.unlockCondition(progress) && !progress.timing.stylesUnlocked.includes(s.id)) {
      unlockStyle('timing', s.id);
    }
  });
  renderStyleRow();
}

function showProgressModal() {
  const p = getProgress().timing;
  alert(`📊 黃金秒數盲數挑戰\n\n累積勝利：${p.wins} 次\n累積遊玩：${p.plays} 次\n已解鎖風格：${p.stylesUnlocked.length} / ${STYLE_DEFS.length}`);
}

generateNewTarget();
renderStyleRow();
renderRecentList();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糞Game大廳 - QuizDrop</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; }
  body { background: #f9f6f0; color: #2d2d2d; min-height: 100vh; }
  .hidden { display: none !important; }

  .topbar { height: 58px; background: #fff; border-bottom: 1px solid #ececec; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 50; }
  .back { color: #888; font-size: 13px; text-decoration: none; }
  .spacer { flex: 1; }
  .qt-right { display: flex; align-items: center; gap: 10px; }

  .qt-lang-pill { display: flex; gap: 3px; background: #f5f5f5; border-radius: 99px; padding: 3px; }
  .qt-lang-pill button { padding: 4px 9px; border-radius: 99px; font-size: 11.5px; font-weight: 600; color: #999; border: none; background: none; cursor: pointer; transition: all .2s; }
  .qt-lang-pill button.active { background: #fff; color: #ff5da2; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

  .qt-btn { padding: 7px 13px; border-radius: 99px; font-size: 12.5px; font-weight: 700; border: 1.5px solid #ececec; background: #fff; cursor: pointer; }
  .qt-btn.qt-signup { background: linear-gradient(120deg,#ff5da2,#ff8a5c); color: #fff; border: none; }

  .qt-user-wrap { position: relative; }
  .qt-user-chip { display: flex; align-items: center; gap: 7px; background: #f6f6f6; border-radius: 99px; padding: 5px 12px 5px 5px; cursor: pointer; font-size: 12.5px; font-weight: 600; }
  .qt-avatar { width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(120deg,#ff5da2,#ff8a5c); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 800; }
  .qt-dropdown {
    position: absolute; top: 100%; right: 0; margin-top: 8px; background: #fff;
    border: 1px solid #f0f0f0; border-radius: 14px; min-width: 160px;
    box-shadow: 0 12px 32px -8px rgba(0,0,0,0.12); overflow: hidden; z-index: 200; display: none;
  }
  .qt-dropdown.show { display: block; }
  .qt-dropdown button { width: 100%; text-align: left; padding: 12px 16px; background: none; border: none; color: #2d2d2d; font-size: 13.5px; cursor: pointer; transition: background .15s; font-family: inherit; }
  .qt-dropdown button:hover { background: #f8f8f8; }
  .qt-dropdown button.danger { color: #d83b3b; }

  .wrap { max-width: 600px; margin: 0 auto; padding: 36px 20px; text-align: center; }
  .hero-title { font-size: 26px; font-weight: 900; margin-bottom: 8px; }
  .hero-sub { color: #999; font-size: 14px; margin-bottom: 32px; }

  .game-grid { display: grid; gap: 16px; }
  .game-card {
    background: #fff; border: 1px solid #f0f0f0; border-radius: 20px; padding: 22px;
    display: flex; align-items: center; gap: 16px; text-align: left; cursor: pointer;
    transition: transform .2s, box-shadow .2s; text-decoration: none; color: inherit;
  }
  .game-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px -10px rgba(0,0,0,.1); }
  .game-emoji { font-size: 40px; flex-shrink: 0; }
  .game-info h3 { font-size: 16.5px; font-weight: 800; margin-bottom: 4px; }
  .game-info p { font-size: 13px; color: #999; line-height: 1.5; }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back">← QuizDrop</a>
  <div class="spacer"></div>
  <div class="qt-right">
    <div class="qt-lang-pill">
      <button class="active" onclick="setLang('zh')" data-lang-btn="zh">中</button>
      <button onclick="setLang('ja')" data-lang-btn="ja">日</button>
      <button onclick="setLang('en')" data-lang-btn="en">EN</button>
    </div>
    <div id="qt-auth-buttons" style="display:flex; gap:8px;">
      <button class="qt-btn qt-login" onclick="window.location.href='index.html'">登入</button>
      <button class="qt-btn qt-signup" onclick="window.location.href='index.html'">註冊</button>
    </div>
    <div id="qt-user-chip-wrap" class="hidden qt-user-wrap">
      <div class="qt-user-chip" onclick="toggleUserDropdown()">
        <div class="qt-avatar" id="qt-avatar-initial">U</div>
        <span id="qt-username-display">用戶</span>
      </div>
      <div class="qt-dropdown" id="qt-dropdown">
        <button onclick="window.location.href='profile.html'">👤 個人頁面</button>
        <button class="danger" onclick="handleLogoutGames()">🚪 登出</button>
      </div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="hero-title" id="hero-title">🎮 糞Game大廳</div>
  <div class="hero-sub" id="hero-sub">解壓專用小遊戲，瘋狂玩到爽為止</div>
  <div class="game-grid" id="game-grid"></div>
</div>

<script>
const SUPABASE_URL = 'https://xsflpzozgdgbtrtdzdlj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzZmxwem96Z2RnYnRydGR6ZGxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTMyMzUsImV4cCI6MjA5NzE4OTIzNX0.Uyi5dYa73h0JJ9KwT2bP0C79wV_H-PoYneiR5xsbT6I';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 陣列物件管理遊戲清單，未來新增遊戲只需要在這裡加一筆資料
const GAMES_LIST = [
  { id: 'timing', title: '黃金秒數盲數挑戰', desc: '考驗你的生物鐘，盲數到目標秒數', emoji: '⏱️', url: 'game-timing.html' },
  { id: 'chicken', title: '社畜超度：尖叫雞進化論', desc: '瘋狂點擊洩憤，累積你的暴擊次數', emoji: '🐔', url: 'game-chicken.html' },
  { id: 'bubble', title: '強迫症救星：無限捏泡泡紙', desc: '捏到爽為止，比比看誰手速最快', emoji: '🫧', url: 'game-bubble.html' },
];

document.getElementById('game-grid').innerHTML = GAMES_LIST.map(g => `
  <a href="${g.url}" class="game-card">
    <div class="game-emoji">${g.emoji}</div>
    <div class="game-info">
      <h3>${g.title}</h3>
      <p>${g.desc}</p>
    </div>
  </a>
`).join('');

/* ---------------- 登入狀態判斷 + 頭像顯示 ---------------- */
async function initAuthUI() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session?.user) {
    showLoggedInUI(session.user);
  }
  supabaseClient.auth.onAuthStateChange((event, newSession) => {
    if (newSession?.user) {
      showLoggedInUI(newSession.user);
    } else {
      document.getElementById('qt-auth-buttons').classList.remove('hidden');
      document.getElementById('qt-user-chip-wrap').classList.add('hidden');
    }
  });
}

function showLoggedInUI(user) {
  document.getElementById('qt-auth-buttons').classList.add('hidden');
  document.getElementById('qt-user-chip-wrap').classList.remove('hidden');
  const nickname = user.user_metadata?.nickname || user.email?.split('@')[0] || '用戶';
  document.getElementById('qt-username-display').textContent = nickname;
  document.getElementById('qt-avatar-initial').textContent = nickname.charAt(0).toUpperCase();
}

function toggleUserDropdown() {
  document.getElementById('qt-dropdown').classList.toggle('show');
}
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('qt-user-chip-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('qt-dropdown')?.classList.remove('show');
  }
});
function handleLogoutGames() {
  if (confirm('要登出嗎？')) {
    supabaseClient.auth.signOut().then(() => { window.location.reload(); });
  }
}

/* ---------------- 語言切換（games.html 固定文字的 i18n） ---------------- */
const i18n = {
  zh: { heroTitle: '🎮 糞Game大廳', heroSub: '解壓專用小遊戲，瘋狂玩到爽為止', back: '← QuizDrop', login: '登入', signup: '註冊', profile: '👤 個人頁面', logout: '🚪 登出',
    games: [
      { title: '黃金秒數盲數挑戰', desc: '考驗你的生物鐘，盲數到目標秒數' },
      { title: '社畜超度：尖叫雞進化論', desc: '瘋狂點擊洩憤，累積你的暴擊次數' },
      { title: '強迫症救星：無限捏泡泡紙', desc: '捏到爽為止，比比看誰手速最快' },
    ]
  },
  ja: { heroTitle: '🎮 ストレス解消ゲーム', heroSub: 'スカッとするまで遊ぼう', back: '← QuizDrop', login: 'ログイン', signup: '登録', profile: '👤 プロフィール', logout: '🚪 ログアウト',
    games: [
      { title: 'タイムレース', desc: '体内時計を試そう、目標の秒数で止めよう' },
      { title: '叫び鶏の進化', desc: 'クリックしてストレス発散、累計ヒット数を記録' },
      { title: 'プチプチ無限版', desc: '一枚を割り切ったら新しいシートが出現' },
    ]
  },
  en: { heroTitle: '🎮 Stress Relief Games', heroSub: 'Play until you feel better', back: '← QuizDrop', login: 'Log in', signup: 'Sign up', profile: '👤 Profile', logout: '🚪 Log out',
    games: [
      { title: 'Golden Second Challenge', desc: 'Test your internal clock, stop at the target second' },
      { title: 'Screaming Chicken Evolution', desc: 'Click to release stress, rack up your hit count' },
      { title: 'Infinite Bubble Wrap', desc: 'Pop a full sheet and a fresh one appears instantly' },
    ]
  },
};

let currentLang = 'zh';

function setLang(l) {
  currentLang = l;
  document.querySelectorAll('[data-lang-btn]').forEach(b => b.classList.toggle('active', b.dataset.langBtn === l));
  localStorage.setItem('quizdrop_lang', l);
  applyLang();
}

function applyLang() {
  const t = i18n[currentLang];
  document.getElementById('hero-title').textContent = t.heroTitle;
  document.getElementById('hero-sub').textContent = t.heroSub;
  document.querySelector('.back').textContent = t.back;
  const loginBtn = document.querySelector('.qt-login');
  const signupBtn = document.querySelector('.qt-signup');
  if (loginBtn) loginBtn.textContent = t.login;
  if (signupBtn) signupBtn.textContent = t.signup;
  document.querySelector('#qt-dropdown button:not(.danger)').textContent = t.profile;
  document.querySelector('#qt-dropdown button.danger').textContent = t.logout;

  document.getElementById('game-grid').innerHTML = GAMES_LIST.map((g, i) => `
    <a href="${g.url}" class="game-card">
      <div class="game-emoji">${g.emoji}</div>
      <div class="game-info">
        <h3>${t.games[i].title}</h3>
        <p>${t.games[i].desc}</p>
      </div>
    </a>
  `).join('');
}

// 頁面載入時，讀取之前儲存的語言偏好（必須放在所有函式宣告之後執行，避免時序錯誤）
(function initLangFromStorage() {
  const saved = localStorage.getItem('quizdrop_lang');
  if (saved && saved !== 'zh') {
    setLang(saved);
  }
})();

initAuthUI();
</script>
</body>
</html>

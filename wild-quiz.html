<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
  :root {
    --bg:#1a0d24; --bg2:#251231; --card:#30163e;
    --accent:#ff3d71; --accent2:#ff9100; --gold:#f5c842;
    --text:#f5f0ff; --muted:#9486b8; --radius:18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; }
  body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 60px; }

  .top-link { width: 100%; max-width: 560px; margin-bottom: 8px; }
  .top-link a { color: var(--muted); font-size: 13px; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
  .top-link a:hover { color: var(--accent2); }

  .hero { text-align: center; padding: 24px 16px 28px; max-width: 600px; }
  .hero-emoji { font-size: 52px; display: block; margin-bottom: 14px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
  .hero h1 { font-size: clamp(18px, 4.6vw, 26px); font-weight: 900; line-height: 1.4; background: linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom: 10px; }
  .hero p { color: var(--muted); font-size: 14px; line-height: 1.7; }

  .progress-wrap { width: 100%; max-width: 560px; margin: 20px auto 0; }
  .progress-bar { height: 4px; background: var(--card); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,var(--accent),var(--accent2)); border-radius: 99px; transition: width .4s ease; width: 0%; }
  .progress-label { font-size: 12px; color: var(--muted); margin-top: 6px; text-align: right; }

  .quiz-card { background: var(--card); border: 1px solid rgba(124,77,255,0.18); border-radius: var(--radius); padding: 30px 26px; max-width: 560px; width: 100%; margin-top: 24px; }
  .q-num { font-size: 12px; color: var(--accent2); font-weight: 600; letter-spacing: .06em; margin-bottom: 10px; }
  .q-text { font-size: 17px; font-weight: 700; line-height: 1.6; margin-bottom: 22px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt { background: var(--bg2); border: 1.5px solid rgba(124,77,255,0.12); border-radius: 14px; padding: 15px 18px; cursor: pointer; font-size: 14.5px; line-height: 1.6; transition: all .18s; text-align: left; color: var(--text); font-family: inherit; }
  .opt:hover { border-color: var(--accent); background: rgba(124,77,255,0.1); transform: translateX(4px); }
  .opt.selected { border-color: var(--accent); background: rgba(124,77,255,0.18); transform: translateX(4px); }

  .btn-next { background: linear-gradient(135deg,var(--accent),var(--accent2)); color: #fff; border: none; border-radius: 14px; padding: 15px 36px; font-size: 15.5px; font-weight: 700; cursor: pointer; margin-top: 22px; width: 100%; transition: opacity .2s, transform .2s; font-family: inherit; opacity: .35; pointer-events: none; }
  .btn-next.active { opacity: 1; pointer-events: all; }
  .btn-next.active:hover { transform: translateY(-2px); }

  .result-card { background: var(--card); border: 1px solid rgba(124,77,255,0.25); border-radius: var(--radius); padding: 38px 26px; max-width: 560px; width: 100%; margin-top: 24px; text-align: center; display: none; }
  .result-emoji { font-size: 72px; display: block; margin-bottom: 14px; }
  .result-title { font-size: 25px; font-weight: 900; background: linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom: 6px; }
  .result-subtitle { color: var(--gold); font-size: 13.5px; font-weight: 600; margin-bottom: 20px; }
  .result-desc { color: var(--muted); font-size: 14.5px; line-height: 1.85; margin-bottom: 22px; text-align: left; }
  .trait-wrap { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 24px; }
  .trait { background: rgba(124,77,255,0.15); border: 1px solid rgba(124,77,255,0.3); color: var(--accent2); font-size: 12.5px; padding: 5px 14px; border-radius: 99px; font-weight: 500; }

  .save-status { font-size: 12.5px; padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; }
  .save-status.saved { background: rgba(124,77,255,0.12); color: var(--accent2); }
  .save-status.guest { background: rgba(245,200,66,0.1); color: var(--gold); }

  .share-title { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .share-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 16px; }
  .share-btn { border: none; border-radius: 12px; padding: 12px 10px; font-size: 13.5px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity .2s, transform .2s; font-family: inherit; }
  .share-btn:hover { opacity: .85; transform: translateY(-2px); }
  .btn-twitter { background: #000; color: #fff; }
  .btn-line { background: #06C755; color: #fff; }
  .btn-fb { background: #1877F2; color: #fff; }
  .btn-copy { background: var(--bg2); color: var(--text); border: 1.5px solid rgba(124,77,255,0.3); }
  .btn-retry { background: linear-gradient(135deg,var(--accent),var(--accent2)); color: #fff; border: none; border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; width: 100%; transition: opacity .2s; }

  #start-screen { max-width: 560px; width: 100%; margin-top: 22px; text-align: center; }
  .btn-start { background: linear-gradient(135deg,var(--accent),var(--accent2)); color: #fff; border: none; border-radius: 16px; padding: 18px 48px; font-size: 16.5px; font-weight: 800; cursor: pointer; font-family: inherit; transition: transform .2s; box-shadow: 0 10px 32px -6px rgba(124,77,255,.45); }
  .btn-start:hover { transform: translateY(-3px); }
  .notice { color: var(--muted); font-size: 13px; margin-top: 14px; }

  .hidden { display: none !important; }

  .lang-bar { position: fixed; top: 14px; right: 16px; display: flex; gap: 6px; z-index: 999; }
  .lang-btn { background: var(--card); border: 1px solid rgba(124,77,255,0.3); color: var(--muted); border-radius: 8px; padding: 5px 12px; font-size: 13px; cursor: pointer; transition: all .18s; font-family: inherit; }
  .lang-btn.active { background: rgba(124,77,255,0.22); border-color: var(--accent2); color: var(--accent2); }

  .hero-emoji-wrap { width: 80px; height: 80px; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; }

  .step-dots { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 6px; }
  .step-dot {
    width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid rgba(124,77,255,0.25);
    background: var(--bg2); color: var(--muted); font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .2s;
  }
  .step-dot.answered { background: rgba(124,77,255,0.18); border-color: var(--accent); color: var(--accent2); }
  .step-dot.current { background: linear-gradient(135deg,var(--accent),var(--accent2)); border-color: transparent; color: #fff; transform: scale(1.15); }
  .step-dot.locked { opacity: 0.35; cursor: not-allowed; }
  .step-dot:hover:not(.locked) { transform: scale(1.1); }

  .nav-row { display: flex; gap: 10px; margin-top: 22px; }
  .btn-prev {
    background: var(--bg2); color: var(--muted); border: 1.5px solid rgba(124,77,255,0.2);
    border-radius: 14px; padding: 15px 22px; font-size: 14.5px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all .2s; flex-shrink: 0;
  }
  .btn-prev:hover { color: var(--text); border-color: var(--accent); }
  .btn-prev:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-row .btn-next { margin-top: 0; flex: 1; }

  .unanswered-warning {
    background: rgba(245,200,66,0.12); color: var(--gold); font-size: 13px;
    padding: 10px 14px; border-radius: 10px; margin-top: 14px; text-align: center; display: none;
  }
  .unanswered-warning.show { display: block; }
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--accent); color: #fff; padding: 10px 24px; border-radius: 99px; font-size: 14px; font-weight: 500; opacity: 0; transition: all .3s; pointer-events: none; z-index: 9999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .home-link { margin-top: 22px; text-align: center; }
  .home-link a { color: var(--muted); font-size: 13px; text-decoration: none; border-bottom: 1px solid rgba(124,77,255,0.3); padding-bottom: 2px; }


  /* Persistent top bar with auth state */
  .quiz-topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 58px;
    background: rgba(18,13,26,0.88); backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(124,77,255,0.15); z-index: 100;
    display: flex; align-items: center; padding: 0 16px; gap: 10px;
  }
  .quiz-topbar .back { color: var(--muted); font-size: 13px; text-decoration: none; display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .quiz-topbar .back:hover { color: var(--accent2); }
  .quiz-topbar .spacer { flex: 1; }
  .qt-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .qt-lang-pill { display: flex; gap: 3px; background: rgba(124,77,255,0.1); border-radius: 99px; padding: 3px; }
  .qt-lang-pill button { padding: 4px 9px; border-radius: 99px; font-size: 11.5px; font-weight: 600; color: var(--muted); border: none; background: none; cursor: pointer; transition: all .2s; }
  .qt-lang-pill button.active { background: var(--card); color: var(--accent2); }
  .qt-btn { padding: 7px 16px; border-radius: 99px; font-weight: 700; font-size: 12.5px; cursor: pointer; border: none; transition: all .2s; }
  .qt-login { background: transparent; color: var(--text); border: 1.5px solid rgba(124,77,255,0.3); }
  .qt-signup { background: linear-gradient(120deg,var(--accent),var(--accent2)); color: #fff; }
  .qt-user-chip { display: flex; align-items: center; gap: 7px; background: rgba(124,77,255,0.12); border-radius: 99px; padding: 5px 12px 5px 5px; cursor: pointer; font-size: 12.5px; font-weight: 600; color: var(--text); transition: background .2s; }
  .qt-user-chip:hover { background: rgba(124,77,255,0.22); }
  .qt-avatar { width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(120deg,var(--accent),var(--accent2)); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 800; flex-shrink: 0; }
  .qt-user-wrap { position: relative; }
  .qt-dropdown {
    position: absolute; top: 100%; right: 0; margin-top: 8px; background: var(--card);
    border: 1px solid rgba(124,77,255,0.2); border-radius: 14px; min-width: 160px;
    box-shadow: 0 12px 32px -8px rgba(0,0,0,0.3); overflow: hidden; z-index: 200; display: none;
  }
  .qt-dropdown.show { display: block; }
  .qt-dropdown button {
    width: 100%; text-align: left; padding: 12px 16px; background: none; border: none;
    color: var(--text); font-size: 13.5px; cursor: pointer; transition: background .15s; font-family: inherit;
  }
  .qt-dropdown button:hover { background: rgba(124,77,255,0.1); }
  .qt-dropdown button.danger { color: #ff6b6b; }
  body { padding-top: 80px; } /* push content below fixed topbar */
</style>
</head>

<script>
const SUPABASE_URL = 'https://xsflpzozgdgbtrtdzdlj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzZmxwem96Z2RnYnRydGR6ZGxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTMyMzUsImV4cCI6MjA5NzE4OTIzNX0.Uyi5dYa73h0JJ9KwT2bP0C79wV_H-PoYneiR5xsbT6I';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const i18n = {
  zh: {
    backLink: '← 回 QuizDrop 首頁',
    heroTitle: '【全網瘋傳盲盒】測試你在平行宇宙裡的「反骨瘋狂指數」',
    heroSub: '10題荒誕情境題，測出你深藏的瘋狂人格',
    startBtn: '開始診斷 →',
    notice: '共 10 題 · 約 3 分鐘 · 結果僅供娛樂參考',
    qLabel: (c, t) => `問題 ${c} / ${t}`,
    next: '下一題 →',
    finish: '查看診斷結果 ✨',
    prev: '← 上一題',
    warning: '⚠️ 請先選擇一個答案才能繼續',
    shareLabel: '分享你的診斷結果',
    copy: '📋 複製',
    copied: '已複製！',
    retry: '再測一次',
    loading: '載入測驗中...',
    guestMsg: '🔓 登入後系統會自動保存你的測驗紀錄，現在是訪客模式',
    savedMsg: '✅ 已自動保存到你的測驗紀錄',
    failMsg: '⚠️ 結果保存失敗，但你還是可以看診斷結果',
  }
};
let currentLang = 'zh';

function setLang(l) {
  // 目前題庫只有中文版本，但保留切換按鈕架構供未來擴充
  currentLang = l;
  document.querySelectorAll('[data-lang-btn]').forEach(b => b.classList.toggle('active', b.dataset.langBtn === l));
  localStorage.setItem('quizdrop_lang', l); // 跨頁面記住語言選擇
  if (l !== 'zh') {
    showToast('日文/英文版本即將推出，敬請期待！');
    currentLang = 'zh';
    localStorage.setItem('quizdrop_lang', 'zh');
    document.querySelectorAll('[data-lang-btn]').forEach(b => b.classList.toggle('active', b.dataset.langBtn === 'zh'));
  }
}

// 頁面載入時，讀取之前儲存的語言偏好
(function initLangFromStorage() {
  const saved = localStorage.getItem('quizdrop_lang');
  if (saved && saved !== 'zh') {
    // 目前題庫尚未支援日/英文，先固定使用中文，但保留偏好值供之後擴充使用
  }
  document.querySelectorAll('[data-lang-btn]').forEach(b => b.classList.toggle('active', b.dataset.langBtn === currentLang));
})();

const QUIZ_ID = '00000000-0000-0000-0000-000000000005'; // 對應 SQL 裡插入的官方測驗 ID

let quizData = null;   // { questions, results }
let quizTitle = '';
let current = 0;
let answers = [];      // 存每題選的 option 物件
let selected = null;
let currentUser = null;

/* ============================================================ */
/* 1. 從 Supabase 載入測驗題目與結果定義                          */
/* ============================================================ */
async function loadQuiz() {
  try {
    const { data: { session } } = await supabaseClient.auth.getSession();
    currentUser = session?.user || null;

    await updateTopbarAuthState();

    const { data, error } = await supabaseClient
      .from('quizzes')
      .select('title, questions, results')
      .eq('id', QUIZ_ID)
      .single();

    if (error) throw error;

    quizData = { questions: data.questions, results: data.results.results };
    quizTitle = data.title;

    document.getElementById('loading').classList.add('hidden');

    // 檢查網址是否帶有 ?result=xxx 參數，代表是從個人頁面點過來「重溫結果」
    const urlParams = new URLSearchParams(window.location.search);
    const resultIdFromUrl = urlParams.get('result');

    if (resultIdFromUrl) {
      const savedResult = quizData.results.find(r => r.id === resultIdFromUrl);
      if (savedResult) {
        showSavedResult(savedResult);
        return;
      }
    }

    document.getElementById('start-screen').classList.remove('hidden');
  } catch (err) {
    document.getElementById('loading').textContent = '載入測驗失敗，請重新整理頁面 (' + err.message + ')';
    console.error(err);
  }
}
loadQuiz();

function toggleUserDropdown() {
  document.getElementById('qt-dropdown').classList.toggle('show');
}

// 點擊頁面其他地方時自動收起下拉選單
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('qt-user-chip-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('qt-dropdown')?.classList.remove('show');
  }
});

function handleQuizPageLogout() {
  if (confirm('要登出嗎？')) {
    supabaseClient.auth.signOut().then(() => {
      window.location.href = 'index.html';
    });
  }
}

// 直接顯示已存的結果（從個人頁面點「重溫結果」過來時使用），不重新計分、不重複存檔
function showSavedResult(result) {
  document.getElementById('r-emoji').textContent = result.emoji;
  document.getElementById('r-title').textContent = result.label;
  document.getElementById('r-subtitle').textContent = result.subtitle;
  document.getElementById('r-desc').textContent = result.desc;
  document.getElementById('r-traits').innerHTML = result.traits.map(t => `<span class="trait">${escapeText(t)}</span>`).join('');

  const statusEl = document.getElementById('save-status');
  statusEl.className = 'save-status saved';
  statusEl.textContent = '📜 這是你重溫的舊測驗結果';

  document.getElementById('result-card').style.display = 'block';
}

async function updateTopbarAuthState() {
  if (!currentUser) return;

  document.getElementById('qt-auth-buttons').classList.add('hidden');
  document.getElementById('qt-user-chip-wrap').classList.remove('hidden');

  let displayName = currentUser.email.split('@')[0];
  try {
    const { data } = await supabaseClient.from('users').select('display_name').eq('id', currentUser.id).single();
    if (data?.display_name) displayName = data.display_name;
  } catch (e) {}

  document.getElementById('qt-username-display').textContent = displayName;
  document.getElementById('qt-avatar-initial').textContent = displayName.charAt(0).toUpperCase();
}

/* ============================================================ */
/* 2. 測驗流程                                                     */
/* ============================================================ */
function startQuiz() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('progress-wrap').classList.remove('hidden');
  document.getElementById('quiz-card').classList.remove('hidden');
  renderDots();
  renderQ();
}

function renderDots() {
  const qs = quizData.questions;
  const wrap = document.getElementById('step-dots');
  wrap.innerHTML = qs.map((q, i) => {
    let cls = 'step-dot';
    if (i === current) cls += ' current';
    else if (answers[i]) cls += ' answered';
    else if (i > current) cls += ' locked'; // 不能超前偷看未作答的題目
    return `<button class="${cls}" data-idx="${i}" onclick="jumpTo(${i})">${i + 1}</button>`;
  }).join('');
}

function jumpTo(idx) {
  // 只能跳到「已經回答過的題目」或「目前這一題」，不能跳到未作答的未來題目
  if (idx > current && !answers[idx]) return;
  if (idx === current) return;
  current = idx;
  selected = answers[current] || null;
  renderQ();
}

function renderQ() {
  const qs = quizData.questions;
  const q = qs[current];
  const t = i18n[currentLang];

  document.getElementById('q-num').textContent = t.qLabel(current + 1, qs.length);
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('unanswered-warning').classList.remove('show');

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach((o) => {
    const btn = document.createElement('button');
    btn.className = 'opt' + (answers[current]?.id === o.id ? ' selected' : '');
    btn.textContent = escapeText(o.text);
    btn.onclick = () => selectOpt(o, btn);
    opts.appendChild(btn);
  });

  selected = answers[current] || null;

  const isLastQuestion = current === qs.length - 1;
  const nextBtn = document.getElementById('btn-next');
  if (isLastQuestion) {
    nextBtn.classList.remove('hidden');
    nextBtn.textContent = t.finish;
  } else {
    nextBtn.classList.add('hidden');
  }

  document.getElementById('btn-prev').disabled = current === 0;
  updateNextBtn();
  renderDots();
}

function escapeText(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.textContent;
}

function selectOpt(option, btn) {
  document.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selected = option;
  answers[current] = option;
  document.getElementById('unanswered-warning').classList.remove('show');
  updateNextBtn();
  renderDots();

  const total = quizData.questions.length;
  if (current < total - 1) {
    // 自動跳下一題，短暫延遲讓使用者看到選中的視覺反饋
    setTimeout(() => {
      current++;
      selected = answers[current] || null;
      renderQ();
    }, 280);
  }
  // 最後一題不自動跳轉，使用者需要點擊「查看診斷結果」按鈕才會送出
}

function updateNextBtn() {
  document.getElementById('btn-next').classList.toggle('active', selected !== null);
}

function prevQ() {
  if (current === 0) return;
  current--;
  selected = answers[current] || null;
  renderQ();
}

function nextQ() {
  if (selected === null) {
    document.getElementById('unanswered-warning').classList.add('show');
    return;
  }
  const total = quizData.questions.length;
  if (current < total - 1) {
    current++;
    selected = answers[current] || null;
    renderQ();
  } else {
    // 最後一題，確認所有題目都回答過才能送出
    const unansweredIdx = quizData.questions.findIndex((_, i) => !answers[i]);
    if (unansweredIdx !== -1) {
      current = unansweredIdx;
      selected = null;
      renderQ();
      document.getElementById('unanswered-warning').classList.add('show');
      return;
    }
    showResult();
  }
}

/* ============================================================ */
/* 3. 計分邏輯：依照 Gemini 規劃的維度法 + 8種結果映射              */
/* ============================================================ */
function calcScores() {
  const dims = { E: 0, I: 0, O: 0, A: 0 };
  answers.forEach(opt => {
    for (const k in opt.scores) dims[k] = (dims[k] || 0) + opt.scores[k];
  });
  return dims;
}

function matchResult(dims) {
  const entries = Object.entries(dims).sort((a, b) => b[1] - a[1]);
  const allValues = Object.values(dims);
  const allLow = allValues.every(v => v <= 2);
  const allHigh = allValues.every(v => v >= 4);

  if (allHigh) return quizData.results.find(r => r.id === 'ALL_HIGH');
  if (allLow) return quizData.results.find(r => r.id === 'ALL_LOW');

  const top2 = [entries[0][0], entries[1][0]].sort().join('');
  // 找出 top_dims 排序後一致的結果（不分順序）
  const found = quizData.results.find(r => {
    if (!r.top_dims || r.top_dims.length !== 2) return false;
    return [...r.top_dims].sort().join('') === top2;
  });
  return found || quizData.results.find(r => r.id === 'ALL_LOW'); // fallback
}

let finalResult = null;
let finalScores = null;

async function showResult() {
  document.getElementById('quiz-card').classList.add('hidden');
  document.getElementById('progress-wrap').classList.add('hidden');

  finalScores = calcScores();
  finalResult = matchResult(finalScores);

  document.getElementById('r-emoji').textContent = finalResult.emoji;
  document.getElementById('r-title').textContent = finalResult.label;
  document.getElementById('r-subtitle').textContent = finalResult.subtitle;
  document.getElementById('r-desc').textContent = finalResult.desc;
  document.getElementById('r-traits').innerHTML = finalResult.traits.map(t => `<span class="trait">${escapeText(t)}</span>`).join('');

  document.getElementById('result-card').style.display = 'block';
  document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'start' });

  // 存入資料庫（只有登入者才存）
  await saveResultIfLoggedIn();
}

/* ============================================================ */
/* 4. 存結果到 quiz_results（登入者才存，訪客顯示提示）             */
/* ============================================================ */
async function saveResultIfLoggedIn() {
  const statusEl = document.getElementById('save-status');

  if (!currentUser) {
    statusEl.className = 'save-status guest';
    statusEl.textContent = '🔓 登入後系統會自動保存你的測驗紀錄，現在是訪客模式';
    return;
  }

  try {
    const { error } = await supabaseClient
      .from('quiz_results')
      .upsert({
        user_id: currentUser.id,
        quiz_id: QUIZ_ID,
        result_label: finalResult.id,
        result_title: finalResult.label,
        scores: finalScores,
        played_at: new Date().toISOString(),
      }, { onConflict: 'user_id,quiz_id' });
    if (error) throw error;

    statusEl.className = 'save-status saved';
    statusEl.textContent = '✅ 已自動保存到你的測驗紀錄';
  } catch (err) {
    statusEl.className = 'save-status guest';
    statusEl.textContent = '⚠️ 結果保存失敗，但你還是可以看診斷結果';
    console.error(err);
  }
}

/* ============================================================ */
/* 5. 分享功能                                                     */
/* ============================================================ */
function getShareText() {
  return {
    text: `${finalResult.emoji} 我的診斷結果是「${finalResult.label}」(${finalResult.subtitle})\n\n你也來測測你的社交疲勞指數！`,
    url: window.location.href
  };
}

function shareTwitter() {
  const { text, url } = getShareText();
  const shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
  window.open(shareUrl, '_blank', 'noopener,noreferrer');
}
function shareLine() {
  const { text, url } = getShareText();
  const shareUrl = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;
  window.open(shareUrl, '_blank', 'noopener,noreferrer');
}
// 偵測是否在 LINE / Threads / Instagram / Facebook 等 App 內建瀏覽器（WebView）中
// 這類環境常會封鎖 window.open 開新視窗的行為，需要改用同頁跳轉
function isInAppWebView() {
  const ua = navigator.userAgent || '';
  return /Line\/|FBAN|FBAV|Instagram|Threads/i.test(ua);
}

function shareFacebook() {
  const { text, url } = getShareText();
  navigator.clipboard.writeText(text + '\n' + url).then(() => {
    showToast('結果已複製！貼到 Facebook 貼文裡分享吧 📋', 4000);
    const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`;
    setTimeout(() => {
      if (isInAppWebView()) {
        // App 內建瀏覽器通常會封鎖 window.open，改用同頁跳轉確保真的會開啟
        window.location.href = fbUrl;
      } else {
        window.open(fbUrl, '_blank', 'noopener,noreferrer');
      }
    }, 1200);
  }).catch(() => {
    // 如果連複製都失敗（部分 WebView 限制 clipboard API），至少還是要嘗試跳轉分享頁
    const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`;
    if (isInAppWebView()) {
      window.location.href = fbUrl;
    } else {
      window.open(fbUrl, '_blank', 'noopener,noreferrer');
    }
  });
}
function copyResult() {
  const { text, url } = getShareText();
  navigator.clipboard.writeText(text + '\n' + url).then(() => showToast('已複製！'));
}
function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function retry() {
  current = 0; answers = []; selected = null;
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('quiz-card').classList.remove('hidden');
  document.getElementById('progress-wrap').classList.remove('hidden');
  renderQ();
}
</script>

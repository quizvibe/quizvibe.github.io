};

let current = 0;
let answers = [];
let selected = null;

function startQuiz() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('ad-top').style.display = 'block';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('quiz-card').style.display = 'block';
  renderQ();
}

function renderQ() {
  const q = questions[current];
  document.getElementById('q-num').textContent = `問題 ${current + 1} / ${questions.length}`;
  document.getElementById('q-text').textContent = q.text;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt' + (answers[current] === i ? ' selected' : '');
    btn.innerHTML = `<span class="opt-icon">${o.icon}</span><span>${o.text}</span>`;
    btn.onclick = () => selectOpt(i, btn);
    opts.appendChild(btn);
  });

  selected = answers[current] !== undefined ? answers[current] : null;
  updateNextBtn();
  updateProgress();

  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = current === questions.length - 1 ? '查看結果 ✨' : '下一題 →';
}

function selectOpt(i, btn) {
  document.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selected = i;
  answers[current] = i;
  updateNextBtn();
}

function updateNextBtn() {
  const btn = document.getElementById('btn-next');
  btn.classList.toggle('active', selected !== null);
}

function updateProgress() {
  const pct = (current / questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${current} / ${questions.length}`;
}

function nextQ() {
  if (selected === null) return;
  if (current < questions.length - 1) {
    current++;
    selected = answers[current] !== undefined ? answers[current] : null;
    renderQ();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quiz-card').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';

  const scores = { wolf:0, eagle:0, owl:0, dolphin:0, lion:0, fox:0, cat:0 };
  answers.forEach((ai, qi) => {
    const s = questions[qi].opts[ai].scores;
    for (const k in s) scores[k] = (scores[k] || 0) + s[k];
  });

  const winner = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const r = results[winner];

  document.getElementById('r-emoji').textContent = r.emoji;
  document.getElementById('r-title').textContent = r.title;
  document.getElementById('r-subtitle').textContent = r.subtitle;
  document.getElementById('r-desc').textContent = r.desc;
  const traits = document.getElementById('r-traits');
  traits.innerHTML = r.traits.map(t => `<span class="trait">${t}</span>`).join('');

  const rc = document.getElementById('result-card');
  rc.style.display = 'block';

  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-label').textContent = `${questions.length} / ${questions.length}`;
  document.getElementById('progress-wrap').style.display = 'block';
}

function copyResult() {
  const title = document.getElementById('r-title').textContent;
  const subtitle = document.getElementById('r-subtitle').textContent;
  const text = `✨ 我的靈魂動物是「${title}」(${subtitle})\n\n快來測測你是哪種動物靈魂！`;
  navigator.clipboard.writeText(text).then(() => {
    alert('已複製！快去貼給朋友看 😄');
  });
}

function retry() {
  current = 0;
  answers = [];
  selected = null;
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('quiz-card').style.display = 'block';
  document.getElementById('progress-wrap').style.display = 'block';
  renderQ();
}
</script>
</body>
</html>

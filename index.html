<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizDrop - 找到你今天的那個答案</title>
<meta name="description" content="QuizDrop 心理測驗大廳：暈船診療室、社畜生存戰、隱居邊緣人、靈魂年齡鑑定，還有專屬你的客製化測驗。">
<script src="https://cdn.tailwindcss.com"></script>

<!-- ============================================================ -->
<!--  Supabase JS SDK                                              -->
<!-- ============================================================ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
  * { font-family: 'Noto Sans TC', sans-serif; }
  body.lang-ja * { font-family: 'Noto Sans JP', sans-serif; }
  body { background: #fafaf9; color: #1f1f1f; }

  /* ===================== Sidebar ===================== */
  .sidebar {
    position: fixed; top: 0; left: 0; height: 100vh; width: 280px;
    background: #ffffff; border-right: 1px solid #ececec;
    transform: translateX(-100%);
    transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
    z-index: 60; box-shadow: 0 0 60px rgba(0,0,0,0.08);
    display: flex; flex-direction: column;
  }
  .sidebar.open { transform: translateX(0); }
  .overlay {
    position: fixed; inset: 0; background: rgba(15,15,20,0.35);
    backdrop-filter: blur(2px); z-index: 50; opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .overlay.show { opacity: 1; pointer-events: all; }
  .menu-btn {
    width: 42px; height: 42px; border-radius: 12px; background: #fff;
    border: 1px solid #ececec; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; flex-shrink: 0;
  }
  .menu-btn:hover { border-color: #d4d4d4; transform: scale(1.05); }
  .sidebar-header { padding: 26px 22px 18px; border-bottom: 1px solid #f0f0f0; }
  .sidebar-logo { font-weight: 900; font-size: 21px; letter-spacing: -0.02em; }
  .sidebar-logo .drop { color: #ff5da2; }
  .nav-list { padding: 14px 12px; display: flex; flex-direction: column; gap: 5px; overflow-y: auto; }
  .nav-item {
    position: relative; display: flex; align-items: center; gap: 13px;
    padding: 13px 15px; border-radius: 14px; text-decoration: none;
    color: #2a2a2a; font-weight: 600; font-size: 15px; overflow: hidden;
    isolation: isolate; transition: color 0.25s ease, transform 0.25s ease; cursor: pointer;
    border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item .icon { font-size: 21px; flex-shrink: 0; transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); z-index: 2; }
  .nav-item .label { z-index: 2; transition: color 0.25s ease; }
  .nav-item .sub { z-index: 2; font-size: 10.5px; font-weight: 500; color: #b0b0b0; margin-left: auto; transition: color 0.25s ease; }
  .nav-item::before { content: ""; position: absolute; inset: 0; border-radius: 14px; opacity: 0; z-index: 1; transition: opacity 0.3s ease; }
  .nav-item:hover { transform: translateX(4px); color: #fff; }
  .nav-item:hover .sub { color: rgba(255,255,255,0.85); }
  .nav-item:hover .icon { transform: scale(1.18) rotate(-6deg); }
  .nav-item:hover::before { opacity: 1; }
  .nav-1::before { background: linear-gradient(120deg,#ff5da2,#ff8a5c); box-shadow: 0 8px 24px -6px rgba(255,93,162,0.55); }
  .nav-2::before { background: linear-gradient(120deg,#5b6bff,#00c2ff); box-shadow: 0 8px 24px -6px rgba(91,107,255,0.55); }
  .nav-3::before { background: linear-gradient(120deg,#7c4dff,#b388ff); box-shadow: 0 8px 24px -6px rgba(124,77,255,0.55); }
  .nav-4::before { background: linear-gradient(120deg,#00bfa5,#64ffda); box-shadow: 0 8px 24px -6px rgba(0,191,165,0.55); }
  .nav-5::before { background: linear-gradient(120deg,#ff3d71,#ff9100); box-shadow: 0 8px 24px -6px rgba(255,61,113,0.6); }
  .nav-5 { margin-top: 6px; border: 1.5px dashed #ffd1de; }
  .nav-5 .label::after {
    content: "NEW"; margin-left: 8px; font-size: 9px; font-weight: 800;
    background: #fff0f5; color: #ff3d71; padding: 2px 6px; border-radius: 99px;
    vertical-align: middle; letter-spacing: 0.04em;
  }
  .nav-5:hover .label::after { background: rgba(255,255,255,0.25); color: #fff; }
  .sidebar-footer { margin-top: auto; padding: 18px 22px; border-top: 1px solid #f0f0f0; font-size: 11.5px; color: #b0b0b0; }

  /* ===================== Topbar ===================== */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 64px;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(10px);
    border-bottom: 1px solid #f0f0f0; z-index: 40;
    display: flex; align-items: center; padding: 0 16px; gap: 12px;
  }
  .search-box {
    flex: 1; max-width: 420px; display: flex; align-items: center; gap: 8px;
    background: #f3f3f2; border-radius: 99px; padding: 9px 16px;
    transition: box-shadow 0.2s;
  }
  .search-box:focus-within { box-shadow: 0 0 0 2px #ffd1de; background: #fff; }
  .search-box input { background: none; border: none; outline: none; font-size: 14px; width: 100%; }

  .lang-pill { display: flex; gap: 4px; background: #f3f3f2; border-radius: 99px; padding: 4px; }
  .lang-pill button { padding: 5px 10px; border-radius: 99px; font-size: 12.5px; font-weight: 600; color: #999; border: none; background: none; cursor: pointer; transition: all .2s; }
  .lang-pill button.active { background: #fff; color: #1f1f1f; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

  .btn-auth {
    padding: 9px 18px; border-radius: 99px; font-weight: 700; font-size: 13.5px;
    cursor: pointer; border: none; transition: all .2s; white-space: nowrap;
  }
  .btn-login { background: #fff; color: #1f1f1f; border: 1.5px solid #ececec; }
  .btn-login:hover { border-color: #d4d4d4; }
  .btn-signup { background: linear-gradient(120deg,#ff5da2,#ff8a5c); color: #fff; box-shadow: 0 4px 14px -2px rgba(255,93,162,0.5); }
  .btn-signup:hover { transform: translateY(-1px); box-shadow: 0 6px 18px -2px rgba(255,93,162,0.6); }

  .user-chip {
    display: flex; align-items: center; gap: 8px; background: #f3f3f2;
    border-radius: 99px; padding: 6px 14px 6px 6px; cursor: pointer; font-size: 13.5px; font-weight: 600;
  }
  .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(120deg,#ff5da2,#ff8a5c); display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:800; }

  /* ===================== Hero ===================== */
  .hero { padding: 130px 20px 50px; text-align: center; max-width: 760px; margin: 0 auto; }
  .hero-logo { font-weight: 900; font-size: clamp(40px, 9vw, 64px); letter-spacing: -0.03em; line-height: 1; }
  .hero-logo .drop {
    background: linear-gradient(120deg,#ff5da2,#ff8a5c);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .hero-tagline { color: #888; font-size: 16px; margin-top: 14px; }

  .category-strip { display: flex; gap: 10px; justify-content: center; margin-top: 32px; flex-wrap: wrap; padding: 0 16px; }
  .cat-chip {
    display: flex; align-items: center; gap: 7px; padding: 10px 18px; border-radius: 99px;
    font-size: 13.5px; font-weight: 700; cursor: pointer; border: 1.5px solid #ececec; background: #fff;
    transition: all 0.22s;
  }
  .cat-chip:hover { transform: translateY(-2px); color: #fff; border-color: transparent; }
  .cat-chip[data-cat="1"]:hover { background: linear-gradient(120deg,#ff5da2,#ff8a5c); box-shadow: 0 8px 20px -4px rgba(255,93,162,0.5); }
  .cat-chip[data-cat="2"]:hover { background: linear-gradient(120deg,#5b6bff,#00c2ff); box-shadow: 0 8px 20px -4px rgba(91,107,255,0.5); }
  .cat-chip[data-cat="3"]:hover { background: linear-gradient(120deg,#7c4dff,#b388ff); box-shadow: 0 8px 20px -4px rgba(124,77,255,0.5); }
  .cat-chip[data-cat="4"]:hover { background: linear-gradient(120deg,#00bfa5,#64ffda); box-shadow: 0 8px 20px -4px rgba(0,191,165,0.5); }
  .cat-chip[data-cat="5"]:hover { background: linear-gradient(120deg,#ff3d71,#ff9100); box-shadow: 0 8px 20px -4px rgba(255,61,113,0.55); }

  /* ===================== Quiz Cards ===================== */
  .section-wrap { max-width: 1080px; margin: 0 auto; padding: 36px 20px 80px; }
  .section-title { font-size: 22px; font-weight: 900; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .section-sub { color: #999; font-size: 13.5px; margin-bottom: 22px; }

  .quiz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; }
  .quiz-card {
    background: #fff; border: 1px solid #f0f0f0; border-radius: 20px; padding: 22px;
    cursor: pointer; transition: all 0.25s ease; position: relative; overflow: hidden;
  }
  .quiz-card:hover { transform: translateY(-4px); box-shadow: 0 16px 32px -8px rgba(0,0,0,0.1); border-color: transparent; }
  .quiz-card .badge { display:inline-block; font-size:11px; font-weight:700; padding:3px 10px; border-radius:99px; margin-bottom:12px; }
  .quiz-card .qicon { font-size: 38px; margin-bottom: 10px; display:block; }
  .quiz-card h3 { font-size: 16px; font-weight: 800; line-height: 1.4; margin-bottom: 6px; }
  .quiz-card p { font-size: 12.5px; color: #999; line-height: 1.6; }
  .quiz-card .meta { display:flex; align-items:center; gap:6px; margin-top:14px; font-size:11.5px; color:#bbb; }

  .badge-love { background: #ffeaf3; color: #ff5da2; }
  .badge-work { background: #eaf0ff; color: #5b6bff; }
  .badge-edge { background: #f1eaff; color: #7c4dff; }
  .badge-soul { background: #e3fff9; color: #00a896; }

  /* CTA banner for custom quiz */
  .cta-banner {
    background: linear-gradient(120deg,#ff3d71,#ff9100); border-radius: 24px; padding: 36px 30px;
    color: #fff; display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;
    margin-bottom: 50px;
  }
  .cta-banner h3 { font-size: 20px; font-weight: 900; margin-bottom: 6px; }
  .cta-banner p { font-size: 13px; opacity: 0.9; }
  .cta-btn { background: #fff; color: #ff3d71; font-weight: 800; padding: 12px 24px; border-radius: 99px; font-size: 14px; border: none; cursor: pointer; transition: transform .2s; }
  .cta-btn:hover { transform: scale(1.04); }

  /* ===================== Auth Modal ===================== */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(20,20,20,0.5); backdrop-filter: blur(4px);
    z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box { background: #fff; border-radius: 24px; padding: 36px 30px; max-width: 400px; width: 100%; position: relative; }
  .modal-close { position: absolute; top: 18px; right: 18px; width: 32px; height: 32px; border-radius: 50%; background: #f3f3f2; border:none; cursor: pointer; display:flex; align-items:center; justify-content:center; }
  .modal-title { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: #999; margin-bottom: 24px; }
  .input-field { width: 100%; padding: 13px 16px; border-radius: 12px; border: 1.5px solid #ececec; font-size: 14px; margin-bottom: 12px; outline: none; transition: border-color .2s; }
  .input-field:focus { border-color: #ff8aae; }
  .btn-primary-full { width: 100%; padding: 14px; border-radius: 12px; background: linear-gradient(120deg,#ff5da2,#ff8a5c); color: #fff; font-weight: 800; border: none; cursor: pointer; font-size: 14.5px; transition: opacity .2s; }
  .btn-primary-full:hover { opacity: 0.9; }
  .btn-primary-full:disabled { opacity: 0.5; cursor: not-allowed; }
  .divider { display: flex; align-items: center; gap: 10px; margin: 18px 0; color: #ccc; font-size: 12px; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #f0f0f0; }
  .oauth-row { display: flex; gap: 10px; }
  .oauth-btn { flex: 1; padding: 11px; border-radius: 12px; border: 1.5px solid #ececec; background: #fff; cursor: pointer; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all .2s; }
  .oauth-btn:hover { border-color: #d4d4d4; background: #fafafa; }
  .switch-mode { text-align: center; margin-top: 18px; font-size: 13px; color: #999; }
  .switch-mode button { color: #ff5da2; font-weight: 700; background: none; border: none; cursor: pointer; }
  .form-msg { font-size: 12.5px; padding: 10px 14px; border-radius: 10px; margin-bottom: 12px; display: none; }
  .form-msg.error { background: #ffeaea; color: #d83b3b; display: block; }
  .form-msg.success { background: #eaffea; color: #2da44e; display: block; }

  .demo-spacer-mobile { display: none; }
  @media (max-width: 640px) {
    .search-box { display: none; }
    .lang-pill button { padding: 5px 8px; font-size: 11.5px; }
  }
</style>
</head>
<body>

<!-- ============================================================ -->
<!-- Overlay + Sidebar -->
<!-- ============================================================ -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">Quiz<span class="drop">Drop</span></div>
    <p class="text-xs text-gray-400 mt-1" id="sidebar-tagline">找到你今天的那個答案</p>
  </div>
  <nav class="nav-list">
    <button class="nav-item nav-1" onclick="filterCategory('love')">
      <span class="icon">❤️</span><span class="label">暈船診療室</span><span class="sub">戀愛系</span>
    </button>
    <button class="nav-item nav-2" onclick="filterCategory('work')">
      <span class="icon">🧭</span><span class="label">社畜生存戰</span><span class="sub">職場系</span>
    </button>
    <button class="nav-item nav-3" onclick="filterCategory('edge')">
      <span class="icon">🤝</span><span class="label">隱居邊緣人</span><span class="sub">人際系</span>
    </button>
    <button class="nav-item nav-4" onclick="filterCategory('soul')">
      <span class="icon">⏳</span><span class="label">靈魂年齡鑑定</span><span class="sub">靈魂系</span>
    </button>
    <button class="nav-item nav-5" onclick="openCustomQuiz()">
      <span class="icon">🚀</span><span class="label">客製化</span><span class="sub">創作你的測驗</span>
    </button>
  </nav>
  <div class="sidebar-footer">© 2026 QuizDrop · 測驗純屬娛樂</div>
</aside>

<!-- ============================================================ -->
<!-- Topbar -->
<!-- ============================================================ -->
<div class="topbar">
  <button class="menu-btn" onclick="toggleSidebar()" aria-label="開啟選單">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>

  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search-input" placeholder="搜尋測驗，例如：戀愛、職場、邊緣人..." />
  </div>

  <div class="ml-auto flex items-center gap-3">
    <div class="lang-pill">
      <button class="active" onclick="setLang('zh')" data-lang-btn="zh">中</button>
      <button onclick="setLang('ja')" data-lang-btn="ja">日</button>
      <button onclick="setLang('en')" data-lang-btn="en">EN</button>
    </div>

    <!-- Logged out state -->
    <div id="auth-buttons" class="flex items-center gap-2">
      <button class="btn-auth btn-login" onclick="openAuthModal('login')">登入</button>
      <button class="btn-auth btn-signup" onclick="openAuthModal('signup')">註冊</button>
    </div>

    <!-- Logged in state (hidden by default) -->
    <div id="user-chip-wrap" class="hidden">
      <div class="user-chip" onclick="toggleUserMenu()">
        <div class="user-avatar" id="user-avatar-initial">U</div>
        <span id="user-email-display">user@email.com</span>
      </div>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!-- Hero -->
<!-- ============================================================ -->
<div class="hero">
  <div class="hero-logo">Quiz<span class="drop">Drop</span></div>
  <p class="hero-tagline" id="hero-tagline">找到你今天的那個答案 — 一分鐘心理測驗，看看今天的你是誰</p>

  <div class="category-strip">
    <div class="cat-chip" data-cat="1" onclick="filterCategory('love')">❤️ 暈船診療室</div>
    <div class="cat-chip" data-cat="2" onclick="filterCategory('work')">🧭 社畜生存戰</div>
    <div class="cat-chip" data-cat="3" onclick="filterCategory('edge')">🤝 隱居邊緣人</div>
    <div class="cat-chip" data-cat="4" onclick="filterCategory('soul')">⏳ 靈魂年齡鑑定</div>
    <div class="cat-chip" data-cat="5" onclick="openCustomQuiz()">🚀 客製化</div>
  </div>
</div>

<!-- ============================================================ -->
<!-- Main content -->
<!-- ============================================================ -->
<div class="section-wrap">

  <div class="cta-banner">
    <div>
      <h3>🚀 想創作自己的測驗嗎？</h3>
      <p>免費打造你的專屬心理測驗，最多 10 題、4 種結果，分享給朋友玩！</p>
    </div>
    <button class="cta-btn" onclick="openCustomQuiz()">立即創作 →</button>
  </div>

  <div class="section-title">🔥 熱門測驗</div>
  <div class="section-sub">大家都在玩的，看看你會是哪一種</div>

  <div class="quiz-grid" id="quiz-grid">
    <!-- Quiz cards injected by JS -->
  </div>

</div>

<!-- ============================================================ -->
<!-- Auth Modal -->
<!-- ============================================================ -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeAuthModal()">✕</button>

    <div id="auth-form-wrap">
      <div class="modal-title" id="auth-title">歡迎回來</div>
      <div class="modal-sub" id="auth-subtitle">登入繼續你的測驗紀錄</div>

      <div class="form-msg" id="form-msg"></div>

      <input type="email" class="input-field" id="auth-email" placeholder="Email" />
      <input type="password" class="input-field" id="auth-password" placeholder="密碼（至少6位數）" />

      <button class="btn-primary-full" id="auth-submit-btn" onclick="handleAuthSubmit()">登入</button>

      <div class="divider">或</div>

      <div class="oauth-row">
        <button class="oauth-btn" onclick="handleOAuth('google')">
          <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button class="oauth-btn" onclick="handleOAuth('facebook')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.07C24 5.4 18.6 0 12 0S0 5.4 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.05V9.41c0-3.02 1.79-4.69 4.53-4.69 1.31 0 2.68.24 2.68.24v2.95h-1.5c-1.5 0-1.96.93-1.96 1.89v2.27h3.32l-.53 3.49h-2.79V24C19.62 23.1 24 18.1 24 12.07z"/></svg>
          Facebook
        </button>
        <button class="oauth-btn" onclick="handleOAuth('apple')">

<script>
/* ============================================================ */

/* ============================================================ */

    createAccount: "アカウント作成", signupSub: "登録してテストの旅を記録",
    email: "メール", password: "パスワード（6文字以上）",

    createAccount: "Create account", signupSub: "Sign up to start tracking your quiz journey",

let currentLang = 'zh';

function setLang(l) {
  currentLang = l;
  document.body.classList.toggle('lang-ja', l === 'ja');
  document.querySelectorAll('[data-lang-btn]').forEach(b => b.classList.toggle('active', b.dataset.langBtn === l));

  document.querySelector('.btn-signup').textContent = t.signup;

}

/* ============================================================ */
/*  Sidebar                                                        */
/* ============================================================ */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

/* ============================================================ */
/*  Quiz Cards (demo data — replace with Supabase fetch later)   */
/* ============================================================ */
const quizzes = [
  { id: 'edge-1', cat: 'edge', badge: 'badge-edge', icon: '🏝️', title: '【現代隱居邊緣人】社交疲勞與精神退化診斷', desc: '10題情境題，精準診斷你的社交能量與精神狀態', plays: '12.4k', url: 'edge-quiz.html' },
  { id: 'love-1', cat: 'love', badge: 'badge-love', icon: '💔', title: '你的戀愛死穴是什麼？', desc: '12題揭開你在感情中最致命的弱點', plays: '8.9k', url: 'love-weakness.html' },
  { id: 'soul-1', cat: 'soul', badge: 'badge-soul', icon: '⏳', title: '你是哪個時代的靈魂？', desc: '12題測出你靈魂真正屬於的年代', plays: '6.2k', url: 'soul-era.html' },
  { id: 'edge-2', cat: 'edge', badge: 'badge-edge', icon: '🤝', title: '你的人際關係模式是什麼？', desc: '12題揭開你在人群中的真實樣貌', plays: '5.1k', url: 'relationship-style.html' },

  { id: 'soul-2', cat: 'soul', badge: 'badge-soul', icon: '🔮', title: '你的靈魂深處住著哪種動物？', desc: '12個問題，揭開你內心隱藏的動物靈魂', plays: '15.3k', url: 'index-spirit-animal.html' },
];

const catLabels = {
  love: { zh:'戀愛系', ja:'恋愛系', en:'Love' },
  work: { zh:'職場系', ja:'仕事系', en:'Work' },
  edge: { zh:'人際系', ja:'人間関係系', en:'Social' },
  soul: { zh:'靈魂系', ja:'魂系', en:'Soul' },
};

let activeCategory = null;

function filterCategory(cat) {
  activeCategory = activeCategory === cat ? null : cat;
  renderQuizCards();
  toggleSidebar();
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  document.querySelector('.section-wrap').scrollIntoView({ behavior: 'smooth' });
}

function renderQuizCards() {
  const grid = document.getElementById('quiz-grid');
  const list = activeCategory ? quizzes.filter(q => q.cat === activeCategory) : quizzes;
  grid.innerHTML = list.map(q => `
    <div class="quiz-card" onclick="window.location.href='${q.url}'">
      <span class="badge ${q.badge}">${catLabels[q.cat][currentLang]}</span>
      <span class="qicon">${q.icon}</span>
      <h3>${q.title}</h3>
      <p>${q.desc}</p>
      <div class="meta">👥 ${q.plays} 人測過</div>
    </div>
  `).join('');
}
renderQuizCards();

function openCustomQuiz() {
  alert('客製化測驗創作功能即將推出！敬請期待 🚀');
}

/* ============================================================ */
/*  Auth Modal Logic                                              */
/* ============================================================ */
let authMode = 'login'; // 'login' | 'signup'

function openAuthModal(mode) {
  authMode = mode;
  updateAuthModalUI();
  document.getElementById('auth-modal').classList.add('show');
  document.getElementById('auth-form-wrap').classList.remove('hidden');
  document.getElementById('confirm-msg-wrap').classList.add('hidden');
}

function closeAuthModal() {
  document.getElementById('auth-modal').classList.remove('show');
  document.getElementById('form-msg').style.display = 'none';
  document.getElementById('auth-email').value = '';
  document.getElementById('auth-password').value = '';
}

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'signup' : 'login';
  updateAuthModalUI();
}

function updateAuthModalUI() {
  const t = i18n[currentLang];
  if (authMode === 'login') {
    document.getElementById('auth-title').textContent = t.welcomeBack;
    document.getElementById('auth-subtitle').textContent = t.loginSub;
    document.getElementById('auth-submit-btn').textContent = t.login;
    document.getElementById('switch-text').textContent = t.noAccount;
    document.getElementById('switch-btn').textContent = t.toSignup;
  } else {
    document.getElementById('auth-title').textContent = t.createAccount;
    document.getElementById('auth-subtitle').textContent = t.signupSub;
    document.getElementById('auth-submit-btn').textContent = t.signup;
    document.getElementById('switch-text').textContent = t.haveAccount;
    document.getElementById('switch-btn').textContent = t.toLogin;
  }
  document.getElementById('auth-email').placeholder = t.email;
  document.getElementById('auth-password').placeholder = t.password;
}

function showFormMsg(msg, type) {
  const el = document.getElementById('form-msg');
  el.textContent = msg;
  el.className = 'form-msg ' + type;
}

async function handleAuthSubmit() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;

  if (!email || !password) {
    showFormMsg('請輸入 Email 和密碼', 'error');
    return;
  }
  if (password.length < 6) {
    showFormMsg('密碼至少需要 6 個字元', 'error');
    return;
  }
  if (!supabaseClient) {
    showFormMsg('⚠️ Supabase 尚未連接，請先設定 SUPABASE_URL', 'error');
    return;
  }

  const btn = document.getElementById('auth-submit-btn');
  btn.disabled = true;

  try {
    if (authMode === 'signup') {
      const { data, error } = await supabaseClient.auth.signUp({ email, password });
      if (error) throw error;
      // 顯示確認信提示
      document.getElementById('auth-form-wrap').classList.add('hidden');
      document.getElementById('confirm-msg-wrap').classList.remove('hidden');
    } else {
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) throw error;
      closeAuthModal();
      updateUIForLoggedInUser(data.user);
    }
  } catch (err) {
    showFormMsg(err.message || '發生錯誤，請再試一次', 'error');
  } finally {
    btn.disabled = false;
  }
}

async function handleOAuth(provider) {
  if (!supabaseClient) {
    alert('⚠️ Supabase 尚未連接');
    return;
  }
  const { error } = await supabaseClient.auth.signInWithOAuth({ provider });
  if (error) alert('登入失敗：' + error.message);
}

function updateUIForLoggedInUser(user) {
  document.getElementById('auth-buttons').classList.add('hidden');
  document.getElementById('user-chip-wrap').classList.remove('hidden');
  document.getElementById('user-email-display').textContent = user.email;
  document.getElementById('user-avatar-initial').textContent = user.email.charAt(0).toUpperCase();
}

function toggleUserMenu() {
  if (confirm('要登出嗎？')) {
    supabaseClient.auth.signOut().then(() => {
      document.getElementById('auth-buttons').classList.remove('hidden');
      document.getElementById('user-chip-wrap').classList.add('hidden');
    });
  }
}

/* 檢查既有登入狀態 */
if (supabaseClient) {
  supabaseClient.auth.getSession().then(({ data: { session } }) => {
    if (session) updateUIForLoggedInUser(session.user);
  });
}

/* Search filter (簡單前端搜尋示範) */
document.getElementById('search-input').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  const grid = document.getElementById('quiz-grid');
  const filtered = quizzes.filter(qz =>
    qz.title.toLowerCase().includes(q) || qz.desc.toLowerCase().includes(q)
  );
  if (q === '') { renderQuizCards(); return; }
  grid.innerHTML = filtered.map(qz => `
    <div class="quiz-card" onclick="window.location.href='${qz.url}'">
      <span class="badge ${qz.badge}">${catLabels[qz.cat][currentLang]}</span>
      <span class="qicon">${qz.icon}</span>
      <h3>${qz.title}</h3>
      <p>${qz.desc}</p>
      <div class="meta">👥 ${qz.plays} 人測過</div>
    </div>
  `).join('') || '<p class="text-gray-400 text-sm col-span-full text-center py-10">沒有找到符合的測驗 🥲</p>';
});
</script>

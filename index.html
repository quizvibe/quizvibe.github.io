<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的靈魂深處住著哪種動物？</title>
<meta name="description" content="12題揭開你內心深處的動物靈魂！科學性格測驗，測完可分享結果。">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
  :root {
    --bg:#0e0c1a; --bg2:#17142a; --card:#1e1a35;
    --accent:#9b6dff; --accent2:#ff6db0; --gold:#f5c842;
    --text:#e8e4ff; --muted:#8a82b0; --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 60px;}
  body.lang-ja{font-family:'Noto Sans JP',sans-serif;}

  /* Lang switcher */
  .lang-bar{position:fixed;top:12px;right:16px;display:flex;gap:6px;z-index:999;}
  .lang-btn{background:var(--card);border:1px solid rgba(155,109,255,0.25);color:var(--muted);border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer;transition:all .18s;font-family:inherit;}
  .lang-btn.active{background:rgba(155,109,255,0.18);border-color:var(--accent);color:var(--accent);}
  .lang-btn:hover{border-color:var(--accent);color:var(--text);}

  .hero{text-align:center;padding:56px 16px 32px;max-width:600px;}
  .hero-emoji{font-size:56px;display:block;margin-bottom:16px;animation:float 3s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  .hero h1{font-size:clamp(20px,5vw,30px);font-weight:700;line-height:1.3;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;}
  .hero p{color:var(--muted);font-size:15px;line-height:1.7;}

  .progress-wrap{width:100%;max-width:560px;margin:24px auto 0;}
  .progress-bar{height:4px;background:var(--card);border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s ease;width:0%;}
  .progress-label{font-size:12px;color:var(--muted);margin-top:6px;text-align:right;}

  .quiz-card{background:var(--card);border:1px solid rgba(155,109,255,0.15);border-radius:var(--radius);padding:32px 28px;max-width:560px;width:100%;margin-top:28px;}
  .q-num{font-size:12px;color:var(--accent);font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
  .q-text{font-size:18px;font-weight:600;line-height:1.5;margin-bottom:24px;}
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt{background:var(--bg2);border:1.5px solid rgba(155,109,255,0.1);border-radius:12px;padding:14px 18px;cursor:pointer;font-size:15px;line-height:1.5;transition:all .18s;text-align:left;color:var(--text);display:flex;align-items:center;gap:12px;font-family:inherit;}
  .opt:hover{border-color:var(--accent);background:rgba(155,109,255,0.08);transform:translateX(4px);}
  .opt.selected{border-color:var(--accent);background:rgba(155,109,255,0.15);transform:translateX(4px);}
  .opt-icon{font-size:20px;flex-shrink:0;}
  .btn-next{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;padding:15px 36px;font-size:16px;font-weight:600;cursor:pointer;margin-top:24px;width:100%;transition:opacity .2s,transform .2s;font-family:inherit;opacity:.4;pointer-events:none;}
  .btn-next.active{opacity:1;pointer-events:all;}
  .btn-next.active:hover{transform:translateY(-2px);opacity:.92;}

  /* Result */
  .result-card{background:var(--card);border:1px solid rgba(155,109,255,0.2);border-radius:var(--radius);padding:40px 28px;max-width:560px;width:100%;margin-top:28px;text-align:center;display:none;}
  .result-emoji{font-size:80px;display:block;margin-bottom:16px;}
  .result-title{font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
  .result-subtitle{color:var(--gold);font-size:14px;font-weight:500;margin-bottom:20px;letter-spacing:.05em;}
  .result-desc{color:var(--muted);font-size:15px;line-height:1.75;margin-bottom:24px;text-align:left;}
  .trait-wrap{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:28px;}
  .trait{background:rgba(155,109,255,0.12);border:1px solid rgba(155,109,255,0.25);color:var(--accent);font-size:13px;padding:5px 14px;border-radius:99px;font-weight:500;}

  /* Share buttons */
  .share-title{font-size:13px;color:var(--muted);margin-bottom:12px;}
  .share-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
  .share-btn{border:none;border-radius:12px;padding:12px 10px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s,transform .2s;font-family:inherit;}
  .share-btn:hover{opacity:.85;transform:translateY(-2px);}
  .btn-twitter{background:#000;color:#fff;}
  .btn-line{background:#06C755;color:#fff;}
  .btn-fb{background:#1877F2;color:#fff;}
  .btn-copy{background:var(--bg2);color:var(--text);border:1.5px solid rgba(155,109,255,0.3);}
  .btn-retry{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;padding:13px;font-size:15px;cursor:pointer;font-family:inherit;width:100%;transition:opacity .2s;}
  .btn-retry:hover{opacity:.85;}

  #start-screen{max-width:560px;width:100%;margin-top:28px;text-align:center;}
  .btn-start{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:14px;padding:18px 48px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .2s,opacity .2s;box-shadow:0 8px 32px rgba(155,109,255,.25);}
  .btn-start:hover{transform:translateY(-3px);opacity:.9;}
  .notice{color:var(--muted);font-size:13px;margin-top:14px;}

  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#fff;padding:10px 24px;border-radius:99px;font-size:14px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- Lang switcher -->
<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('zh')">中文</button>
  <button class="lang-btn" onclick="setLang('ja')">日本語</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
</div>

<div class="hero">
  <span class="hero-emoji">🔮</span>
  <h1 id="hero-title"></h1>
  <p id="hero-sub"></p>
</div>

<div id="start-screen">
  <button class="btn-start" onclick="startQuiz()" id="btn-start-label"></button>
  <p class="notice" id="notice-label"></p>
</div>

<div class="progress-wrap" id="progress-wrap" style="display:none">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="progress-label" id="progress-label"></div>
</div>

<div class="quiz-card" id="quiz-card" style="display:none">
  <div class="q-num" id="q-num"></div>
  <div class="q-text" id="q-text"></div>
  <div class="options" id="options"></div>
  <button class="btn-next" id="btn-next" onclick="nextQ()"></button>
</div>

<div class="result-card" id="result-card">
  <span class="result-emoji" id="r-emoji"></span>
  <div class="result-title" id="r-title"></div>
  <div class="result-subtitle" id="r-subtitle"></div>
  <div class="result-desc" id="r-desc"></div>
  <div class="trait-wrap" id="r-traits"></div>
  <p class="share-title" id="share-label"></p>
  <div class="share-grid">
    <button class="share-btn btn-twitter" onclick="shareTwitter()">𝕏 Twitter / X</button>
    <button class="share-btn btn-line" onclick="shareLine()">💬 LINE</button>
    <button class="share-btn btn-fb" onclick="shareFacebook()">📘 Facebook</button>
    <button class="share-btn btn-copy" onclick="copyResult()" id="btn-copy-label">📋 複製</button>
  </div>
  <button class="btn-retry" onclick="retry()" id="btn-retry-label"></button>
</div>

<div class="toast" id="toast"></div>

<script>
const i18n = {
  zh: {
    title: "你的靈魂深處住著哪種動物？",
    sub: "12個問題，揭開你內心隱藏的動物靈魂\n你是孤獨的狼、自由的鷹，還是智慧的貓頭鷹？",
    start: "開始測驗 →",
    notice: "共 12 題 · 約 3 分鐘完成",
    qLabel: (c,t) => `問題 ${c} / ${t}`,
    next: "下一題 →",
    finish: "查看結果 ✨",
    shareLabel: "分享你的結果",
    copy: "📋 複製",
    copied: "已複製！",
    retry: "再測一次",
    progressLabel: (c,t) => `${c} / ${t}`,

  },
  ja: {
    title: "あなたの魂に宿る動物は？",
    sub: "12の質問で、あなたの内なる動物を明かします\nあなたは孤独な狼？自由な鷹？賢いフクロウ？",
    start: "テストを始める →",
    notice: "全12問 · 約3分で完了",
    qLabel: (c,t) => `質問 ${c} / ${t}`,
    next: "次へ →",
    finish: "結果を見る ✨",
    shareLabel: "結果をシェアしよう",
    copy: "📋 コピー",
    copied: "コピーしました！",
    retry: "もう一度やる",
    progressLabel: (c,t) => `${c} / ${t}`,
    shareText: (emoji, title, sub) => `✨ 私のスピリットアニマルは「${emoji} ${title}」(${sub})\n\nあなたも試してみて！`,
  },
  en: {
    title: "What Animal Lives in Your Soul?",
    sub: "12 questions to reveal your inner spirit animal\nAre you a lone wolf, a free eagle, or a wise owl?",
    start: "Start Quiz →",
    notice: "12 questions · About 3 minutes",
    qLabel: (c,t) => `Question ${c} / ${t}`,
    next: "Next →",
    finish: "See Result ✨",
    shareLabel: "Share your result",
    copy: "📋 Copy",
    copied: "Copied!",
    retry: "Try Again",
    progressLabel: (c,t) => `${c} / ${t}`,
    shareText: (emoji, title, sub) => `✨ My spirit animal is "${emoji} ${title}" (${sub})\n\nFind out yours!`,
  }
};

const questions = {
  zh: [
    { text:"週末難得有空，你最想做什麼？", opts:[{icon:"🏔️",text:"一個人去爬山或健行",scores:{wolf:2,eagle:1}},{icon:"🎉",text:"約一大群朋友出去玩",scores:{dolphin:2,lion:1}},{icon:"📚",text:"窩在家裡讀書看電影",scores:{owl:2,cat:1}},{icon:"🌅",text:"漫無目的地四處閒晃",scores:{fox:2,eagle:1}}]},
    { text:"朋友突然跟你說了一個大秘密，你會……", opts:[{icon:"🤐",text:"絕對保密，這是信任的基礎",scores:{wolf:2,owl:1}},{icon:"💬",text:"只告訴最信任的那一個人",scores:{dolphin:1,cat:1}},{icon:"🔍",text:"默默幫他分析狀況，給出建議",scores:{fox:2,owl:1}},{icon:"😂",text:"假裝沒聽見，這跟我沒關係",scores:{cat:2,lion:1}}]},
    { text:"遇到陌生人，你第一個反應是什麼？", opts:[{icon:"😊",text:"主動打招呼，交朋友很有趣",scores:{dolphin:2,lion:1}},{icon:"🧐",text:"觀察一下再決定要不要靠近",scores:{cat:2,fox:1}},{icon:"😶",text:"保持距離，等對方先說話",scores:{wolf:2,owl:1}},{icon:"📊",text:"評估這個人對我有沒有用",scores:{eagle:2,lion:1}}]},
    { text:"你心目中最理想的工作狀態是？", opts:[{icon:"🏢",text:"帶領團隊，有清楚的目標和成就感",scores:{lion:2,eagle:1}},{icon:"🌐",text:"自由接案，我說了算",scores:{eagle:2,fox:1}},{icon:"👥",text:"和一群志同道合的人一起",scores:{dolphin:2,wolf:1}},{icon:"🔬",text:"深入鑽研某個領域，成為專家",scores:{owl:2,cat:1}}]},
    { text:"你吵架後的典型模式是？", opts:[{icon:"🤝",text:"馬上去道歉，不想讓關係僵著",scores:{dolphin:2,wolf:1}},{icon:"🧊",text:"沉默幾天，等自己冷靜後再談",scores:{cat:2,wolf:1}},{icon:"💥",text:"直接說清楚，當下解決",scores:{lion:2,eagle:1}},{icon:"🗂️",text:"把事情分析清楚再溝通",scores:{owl:2,fox:1}}]},
    { text:"如果可以住在任何地方，你會選哪裡？", opts:[{icon:"🏡",text:"有庭院的郊外小屋",scores:{wolf:2,cat:1}},{icon:"🌆",text:"城市核心，什麼都方便",scores:{lion:2,dolphin:1}},{icon:"🏔️",text:"高山上能看星星的地方",scores:{eagle:2,owl:1}},{icon:"🌊",text:"海邊，每天看浪就夠了",scores:{dolphin:2,fox:1}}]},
    { text:"別人形容你最多的一句話是？", opts:[{icon:"💡",text:"「你超聰明，腦子轉得很快」",scores:{fox:2,owl:1}},{icon:"🛡️",text:"「你很可靠，有你我就放心」",scores:{wolf:2,lion:1}},{icon:"☀️",text:"「你超開朗，和你在一起很快樂」",scores:{dolphin:2,lion:1}},{icon:"🔮",text:"「你很神秘，不知道你在想什麼」",scores:{cat:2,owl:1}}]},
    { text:"遇到困難時，你第一步會怎麼做？", opts:[{icon:"🧠",text:"先自己分析，想出幾個方案",scores:{owl:2,fox:1}},{icon:"👥",text:"找人商量，集思廣益",scores:{dolphin:2,wolf:1}},{icon:"⚡",text:"直接行動，邊做邊調整",scores:{eagle:2,lion:1}},{icon:"🌀",text:"先讓自己靜下來，順其自然",scores:{cat:2,wolf:1}}]},
    { text:"朋友需要幫忙，但那天你真的很累……", opts:[{icon:"💪",text:"二話不說，朋友有難就去",scores:{wolf:2,dolphin:1}},{icon:"🤔",text:"先問清楚狀況，能幫就幫",scores:{fox:2,owl:1}},{icon:"😴",text:"老實說今天狀態不好，改天",scores:{cat:2,eagle:1}},{icon:"🙏",text:"硬撐去，但內心有點崩潰",scores:{dolphin:2,lion:1}}]},
    { text:"你最害怕的事情是？", opts:[{icon:"😶‍🌫️",text:"被別人忽視，不被重視",scores:{lion:2,dolphin:1}},{icon:"🔒",text:"失去自由，被規則束縛",scores:{eagle:2,cat:1}},{icon:"😔",text:"背叛朋友或被朋友背叛",scores:{wolf:2,dolphin:1}},{icon:"😰",text:"做了錯誤決定，事後懊悔",scores:{owl:2,fox:1}}]},
    { text:"選一個最吸引你的場景？", opts:[{icon:"🌌",text:"深夜，一個人在星空下",scores:{wolf:2,owl:1}},{icon:"🎭",text:"派對上，站在人群中心",scores:{lion:2,dolphin:1}},{icon:"🌫️",text:"清晨霧中，獨自在山頂",scores:{eagle:2,cat:1}},{icon:"🏖️",text:"和好朋友在海邊嬉鬧",scores:{dolphin:2,fox:1}}]},
    { text:"你對「成功」的定義最接近哪個？", opts:[{icon:"👑",text:"被大家認可，有影響力",scores:{lion:2,eagle:1}},{icon:"🧘",text:"內心平靜，不被外物左右",scores:{wolf:2,cat:1}},{icon:"❤️",text:"身邊有愛我的人，彼此珍惜",scores:{dolphin:2,wolf:1}},{icon:"🔑",text:"找到自己真正想要的，並去做到",scores:{fox:2,owl:1}}]},
  ],
  ja: [
    { text:"休日に時間ができたら、何をしたいですか？", opts:[{icon:"🏔️",text:"一人で山登りやハイキング",scores:{wolf:2,eagle:1}},{icon:"🎉",text:"大勢の友達と遊びに行く",scores:{dolphin:2,lion:1}},{icon:"📚",text:"家で本を読んだり映画を見たり",scores:{owl:2,cat:1}},{icon:"🌅",text:"目的なくぶらぶら散歩",scores:{fox:2,eagle:1}}]},
    { text:"友達が突然秘密を打ち明けてきたら？", opts:[{icon:"🤐",text:"絶対に秘密にする。信頼の証だから",scores:{wolf:2,owl:1}},{icon:"💬",text:"一番信頼できる人だけに話す",scores:{dolphin:1,cat:1}},{icon:"🔍",text:"こっそり状況を分析してアドバイスする",scores:{fox:2,owl:1}},{icon:"😂",text:"聞こえなかったふりをする",scores:{cat:2,lion:1}}]},
    { text:"初対面の人に会ったとき、最初の反応は？", opts:[{icon:"😊",text:"積極的に話しかける。友達作りは楽しい",scores:{dolphin:2,lion:1}},{icon:"🧐",text:"様子を見てから近づくか決める",scores:{cat:2,fox:1}},{icon:"😶",text:"距離を置いて、相手が話すのを待つ",scores:{wolf:2,owl:1}},{icon:"📊",text:"この人が自分に役立つか評価する",scores:{eagle:2,lion:1}}]},
    { text:"理想の働き方は？", opts:[{icon:"🏢",text:"チームをリードして成果を出す",scores:{lion:2,eagle:1}},{icon:"🌐",text:"フリーランスで自分のペースで",scores:{eagle:2,fox:1}},{icon:"👥",text:"気の合う仲間と一緒に",scores:{dolphin:2,wolf:1}},{icon:"🔬",text:"一つの分野を深く極める",scores:{owl:2,cat:1}}]},
    { text:"喧嘩した後の行動パターンは？", opts:[{icon:"🤝",text:"すぐ謝る。関係がこじれるのは嫌",scores:{dolphin:2,wolf:1}},{icon:"🧊",text:"数日沈黙して、落ち着いてから話す",scores:{cat:2,wolf:1}},{icon:"💥",text:"その場ではっきり言って解決する",scores:{lion:2,eagle:1}},{icon:"🗂️",text:"状況を整理してから話し合う",scores:{owl:2,fox:1}}]},
    { text:"どこでも住めるとしたら？", opts:[{icon:"🏡",text:"庭付きの郊外の家",scores:{wolf:2,cat:1}},{icon:"🌆",text:"何でも揃う都市の中心",scores:{lion:2,dolphin:1}},{icon:"🏔️",text:"星が見える山の上",scores:{eagle:2,owl:1}},{icon:"🌊",text:"毎日波を見られる海辺",scores:{dolphin:2,fox:1}}]},
    { text:"よく言われる一言は？", opts:[{icon:"💡",text:"「頭の回転が速いね」",scores:{fox:2,owl:1}},{icon:"🛡️",text:"「頼りになる存在だね」",scores:{wolf:2,lion:1}},{icon:"☀️",text:"「一緒にいると楽しい」",scores:{dolphin:2,lion:1}},{icon:"🔮",text:"「何を考えているか分からない」",scores:{cat:2,owl:1}}]},
    { text:"困難に直面したとき、最初にすることは？", opts:[{icon:"🧠",text:"自分で分析していくつかの案を考える",scores:{owl:2,fox:1}},{icon:"👥",text:"誰かに相談してアイデアを集める",scores:{dolphin:2,wolf:1}},{icon:"⚡",text:"とりあえず行動して調整する",scores:{eagle:2,lion:1}},{icon:"🌀",text:"まず落ち着いて成り行きに任せる",scores:{cat:2,wolf:1}}]},

let lang = 'zh';
let current = 0;
let answers = [];
let selected = null;
let quizStarted = false;

function detectLang() {
  const nav = navigator.language || navigator.userLanguage || 'zh';
  if (nav.startsWith('ja')) return 'ja';
  if (nav.startsWith('en')) return 'en';
  return 'zh';
}

function setLang(l) {
  lang = l;
  document.body.classList.toggle('lang-ja', l === 'ja');
  document.querySelectorAll('.lang-btn').forEach((b,i) => {
    b.classList.toggle('active', ['zh','ja','en'][i] === l);
  });
  updateStaticText();
  if (quizStarted) renderQ();
}

function updateStaticText() {
  const t = i18n[lang];
  document.getElementById('hero-title').textContent = t.title;
  document.getElementById('hero-sub').textContent = t.sub;
  document.getElementById('btn-start-label').textContent = t.start;
  document.getElementById('notice-label').textContent = t.notice;
  if (quizStarted) {
    document.getElementById('btn-next').textContent = current === questions[lang].length - 1 ? t.finish : t.next;
    document.getElementById('share-label').textContent = t.shareLabel;
    document.getElementById('btn-copy-label').textContent = t.copy;
    document.getElementById('btn-retry-label').textContent = t.retry;
  }
}

function startQuiz() {
  quizStarted = true;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('quiz-card').style.display = 'block';
  renderQ();
}

function renderQ() {
  const qs = questions[lang];
  const q = qs[current];
  const t = i18n[lang];
  document.getElementById('q-num').textContent = t.qLabel(current + 1, qs.length);
  document.getElementById('q-text').textContent = q.text;
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt' + (answers[current] === i ? ' selected' : '');
    btn.innerHTML = `<span class="opt-icon">${o.icon}</span><span>${o.text}</span>`;
    btn.onclick = () => selectOpt(i, btn);
    opts.appendChild(btn);
  });
  selected = answers[current] !== undefined ? answers[current] : null;
  document.getElementById('btn-next').textContent = current === qs.length - 1 ? t.finish : t.next;
  updateNextBtn();
  updateProgress();
}

function selectOpt(i, btn) {
  document.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selected = i;
  answers[current] = i;
  updateNextBtn();
}

function updateNextBtn() {
  document.getElementById('btn-next').classList.toggle('active', selected !== null);
}

function updateProgress() {
  const total = questions[lang].length;
  document.getElementById('progress-fill').style.width = (current / total * 100) + '%';
  document.getElementById('progress-label').textContent = i18n[lang].progressLabel(current, total);
}

function nextQ() {
  if (selected === null) return;
  const total = questions[lang].length;
  if (current < total - 1) {
    current++;
    selected = answers[current] !== undefined ? answers[current] : null;
    renderQ();
  } else {
    showResult();
  }
}

function calcResult() {
  const scores = {wolf:0,eagle:0,owl:0,dolphin:0,lion:0,fox:0,cat:0};
  answers.forEach((ai, qi) => {
    const s = questions[lang][qi].opts[ai].scores;
    for (const k in s) scores[k] = (scores[k]||0) + s[k];
  });
  return Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
}

function showResult() {
  document.getElementById('quiz-card').style.display = 'none';
  const winner = calcResult();
  const r = results[lang][winner];
  const t = i18n[lang];
  document.getElementById('r-emoji').textContent = r.emoji;
  document.getElementById('r-title').textContent = r.title;
  document.getElementById('r-subtitle').textContent = r.subtitle;
  document.getElementById('r-desc').textContent = r.desc;
  document.getElementById('r-traits').innerHTML = r.traits.map(tr=>`<span class="trait">${tr}</span>`).join('');
  document.getElementById('share-label').textContent = t.shareLabel;
  document.getElementById('btn-copy-label').textContent = t.copy;
  document.getElementById('btn-retry-label').textContent = t.retry;
  document.getElementById('result-card').style.display = 'block';
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-label').textContent = i18n[lang].progressLabel(questions[lang].length, questions[lang].length);
  document.getElementById('progress-wrap').style.display = 'block';
}

function getShareText() {
  const winner = calcResult();
  const r = results[lang][winner];
  const url = window.location.href;
  return { text: i18n[lang].shareText(r.emoji, r.title, r.subtitle), url };
}

function shareTwitter() {
  const { text, url } = getShareText();
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
}

function shareLine() {
  const { text, url } = getShareText();
  window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`, '_blank');
}

function shareFacebook() {
  const { url } = getShareText();
  window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
}

function copyResult() {
  const { text, url } = getShareText();
  navigator.clipboard.writeText(text + '\n' + url).then(() => showToast(i18n[lang].copied));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function retry() {
  current = 0; answers = []; selected = null;
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('quiz-card').style.display = 'block';
  renderQ();
}

  b.classList.toggle('active', ['zh','ja','en'][i] === lang);
});
updateStaticText();
</script>

supabaseClient.auth.getSession().then(({ data: { session } }) => { currentUser = session?.user || null; });

function getGuestId() {
  let gid = localStorage.getItem('quizdrop_guest_id');
  if (!gid) { gid = 'guest_' + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('quizdrop_guest_id', gid); }
  return gid;
}

const AudioEngine = (() => {
  let ctx = null;
  function getCtx() { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); if (ctx.state === 'suspended') ctx.resume(); return ctx; }
  function playPop() {
    const c = getCtx(); const now = c.currentTime;
    const osc = c.createOscillator(); const gain = c.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(2200 + Math.random() * 400, now);
    osc.frequency.exponentialRampToValueAtTime(800, now + 0.06);
    gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    osc.connect(gain).connect(c.destination); osc.start(now); osc.stop(now + 0.08);
  }
  function playFirecracker() {
    const c = getCtx();
    const burstCount = 3 + Math.floor(Math.random() * 3);
    for (let i = 0; i < burstCount; i++) {
      const delay = Math.random() * 0.15;
      setTimeout(() => {
        const now = c.currentTime;
        const bufferSize = Math.floor(c.sampleRate * 0.08);
        const buffer = c.createBuffer(1, bufferSize, c.sampleRate);
        const data = buffer.getChannelData(0);
        for (let j = 0; j < bufferSize; j++) data[j] = (Math.random() * 2 - 1) * (1 - j / bufferSize);
        const noise = c.createBufferSource();
        noise.buffer = buffer;
        const gain = c.createGain();
        gain.gain.setValueAtTime(0.22, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        noise.connect(gain).connect(c.destination);
        noise.start(now);
      }, delay * 1000);
    }
  }
  return { playPop, playFirecracker };
})();

const PROGRESS_KEY = 'quizdrop_game_progress';
function getProgress() {
  const raw = localStorage.getItem(PROGRESS_KEY);
  return raw ? JSON.parse(raw) : {
    timing: { wins: 0, plays: 0, stylesUnlocked: ['default'] },
    chicken: { hits: 0, plays: 0, stylesUnlocked: ['default'] },
    bubble: { totalPopped: 0, fastestSheetMs: null, stylesUnlocked: ['default'] },
  };
}
function saveProgress(p) { localStorage.setItem(PROGRESS_KEY, JSON.stringify(p)); }
function unlockStyle(gameId, styleName) {
  const p = getProgress();
  if (!p[gameId].stylesUnlocked.includes(styleName)) { p[gameId].stylesUnlocked.push(styleName); saveProgress(p); }
}

function showAdUnlockModal(onComplete) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(20,20,20,.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:20px;padding:28px;max-width:320px;width:100%;text-align:center;font-family:'Noto Sans TC',sans-serif;">
      <div style="font-size:13px;color:#999;margin-bottom:12px;font-weight:700;" id="adm-counter">廣告播放中...</div>
      <div style="background:repeating-linear-gradient(45deg,#f0f0f0,#f0f0f0 10px,#e8e8e8 10px,#e8e8e8 20px);border-radius:12px;height:140px;display:flex;align-items:center;justify-content:center;color:#999;font-size:13px;margin-bottom:14px;">📺 模擬廣告</div>
      <div style="height:6px;background:#f0f0f0;border-radius:99px;overflow:hidden;margin-bottom:14px;"><div id="adm-fill" style="height:100%;background:linear-gradient(90deg,#ff5da2,#ff8a5c);width:0%;transition:width .1s linear;"></div></div>
      <button id="adm-btn" disabled style="width:100%;padding:12px;border-radius:10px;background:#1f1f1f;color:#fff;border:none;font-weight:700;opacity:.3;cursor:not-allowed;">請等待...</button>
    </div>`;
  document.body.appendChild(overlay);
  let elapsed = 0; const duration = 3000;
  const fill = overlay.querySelector('#adm-fill'); const btn = overlay.querySelector('#adm-btn');
  const interval = setInterval(() => {
    elapsed += 100; fill.style.width = Math.min(100, (elapsed / duration) * 100) + '%';
    if (elapsed >= duration) {
      clearInterval(interval); btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer';
      btn.textContent = '完成，解鎖風格 →'; overlay.querySelector('#adm-counter').textContent = '廣告播放完畢！';
    }
  }, 100);
  btn.onclick = () => { document.body.removeChild(overlay); onComplete(); };
}

const GRID_SIZE = 36;
let currentStyle = 'default';
let poppedCount = 0;
let sheetStartTime = 0;
let totalPoppedAllTime = 0;

function renderGrid() {
  const grid = document.getElementById('bubble-grid');
  grid.innerHTML = '';
  const bubbleClass = currentStyle === 'fire' ? 'bubble bubble-fire' : 'bubble bubble-transparent';
  for (let i = 0; i < GRID_SIZE; i++) {
    const b = document.createElement('div');
    b.className = bubbleClass;
    b.dataset.idx = i;
    b.onclick = (e) => popBubble(b, e);
    grid.appendChild(b);
  }
  poppedCount = 0;
  sheetStartTime = performance.now();
  document.getElementById('sheet-complete-banner').classList.remove('show');
}

function popBubble(el, e) {
  if (el.classList.contains('popped')) return;
  el.classList.add('popped');
  poppedCount++;
  totalPoppedAllTime++;

  if (currentStyle === 'fire') {
    AudioEngine.playFirecracker();
    spawnSparks(el);
  } else {
    AudioEngine.playPop();
  }

  document.getElementById('stat-total').textContent = totalPoppedAllTime;

  const progress = getProgress();
  progress.bubble.totalPopped = totalPoppedAllTime;
  saveProgress(progress);
  checkUnlocks();

  if (totalPoppedAllTime % 50 === 0) {
    saveGameResult('bubble', { totalPopped: totalPoppedAllTime });
  }

  if (poppedCount >= GRID_SIZE) {
    const sheetTimeMs = performance.now() - sheetStartTime;
    const progress2 = getProgress();
    if (!progress2.bubble.fastestSheetMs || sheetTimeMs < progress2.bubble.fastestSheetMs) {
      progress2.bubble.fastestSheetMs = Math.round(sheetTimeMs);
      saveProgress(progress2);
      document.getElementById('stat-fastest').textContent = (sheetTimeMs / 1000).toFixed(2);
    }
    document.getElementById('sheet-complete-banner').classList.add('show');
    setTimeout(() => renderGrid(), 600);
  }
}

function spawnSparks(el) {
  const grid = document.getElementById('bubble-grid');
  const rect = el.getBoundingClientRect();
  const gridRect = grid.getBoundingClientRect();
  const x = rect.left - gridRect.left + rect.width / 2;
  const y = rect.top - gridRect.top + rect.height / 2;
  for (let i = 0; i < 6; i++) {
    const spark = document.createElement('div');
    spark.className = 'spark-particle';
    spark.style.left = x + 'px';
    spark.style.top = y + 'px';
    const angle = (Math.PI * 2 * i) / 6;
    const dist = 20 + Math.random() * 15;
    spark.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    spark.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    spark.style.background = ['#ff9100', '#ff5722', '#ffd700'][i % 3];
    grid.appendChild(spark);
    setTimeout(() => spark.remove(), 500);
  }
}

async function saveGameResult(gameId, recordDetail) {
  try {
    await supabaseClient.from('game_results').insert({
      user_id: currentUser?.id || null,
      guest_id: currentUser ? null : getGuestId(),
      game_id: gameId,
      record_detail: recordDetail,
    });
  } catch (err) { console.warn('Game result sync failed (non-blocking):', err); }
}

function getStyleDefs() {
  const t = i18nBubble[currentLang];
  return [
    { id: 'default', label: t.styleDefault, unlockCondition: null },
    { id: 'fire', label: t.styleFire, unlockCondition: (p) => p.bubble.totalPopped >= 500, unlockText: t.unlockFire },
  ];
}

function renderStyleRow() {
  const progress = getProgress();
  const row = document.getElementById('style-row');
  row.innerHTML = getStyleDefs().map(s => {
    const unlocked = progress.bubble.stylesUnlocked.includes(s.id);
    const cls = 'style-chip' + (s.id === currentStyle ? ' active' : '') + (!unlocked ? ' locked' : '');
    return `<button class="${cls}" onclick="onStyleClick('${s.id}')">${s.label} ${!unlocked ? '🔒' : ''}</button>`;
  }).join('');
}

function onStyleClick(styleId) {
  const progress = getProgress();
  const t = i18nBubble[currentLang];
  const styleDef = getStyleDefs().find(s => s.id === styleId);
  const unlocked = progress.bubble.stylesUnlocked.includes(styleId);
  if (unlocked) { switchToStyle(styleId); return; }
  alert(t.lockedHint(styleDef.unlockText));
}

function switchToStyle(styleId) {
  currentStyle = styleId;
  renderGrid();
  renderStyleRow();
}

function checkUnlocks() {
  const progress = getProgress();
  getStyleDefs().forEach(s => {
    if (s.unlockCondition && s.unlockCondition(progress) && !progress.bubble.stylesUnlocked.includes(s.id)) {
      unlockStyle('bubble', s.id);
    }
  });
  renderStyleRow();
}

function showProgressModal() {
  const p = getProgress().bubble;
  const t = i18nBubble[currentLang];
  const fastest = p.fastestSheetMs ? (p.fastestSheetMs / 1000).toFixed(2) + t.secUnit : t.noFastest;
  alert(t.progressModal(p.totalPopped, fastest, p.stylesUnlocked.length, getStyleDefs().length));
}

const initProgress = getProgress();
totalPoppedAllTime = initProgress.bubble.totalPopped;
document.getElementById('stat-total').textContent = totalPoppedAllTime;
if (initProgress.bubble.fastestSheetMs) {
  document.getElementById('stat-fastest').textContent = (initProgress.bubble.fastestSheetMs / 1000).toFixed(2);
}

window.addEventListener('beforeunload', () => {
  if (totalPoppedAllTime % 50 !== 0 && totalPoppedAllTime > 0) saveGameResult('bubble', { totalPopped: totalPoppedAllTime });
});

/* ---------------- 登入狀態判斷 + 頭像顯示 ---------------- */
async function initAuthUI() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session?.user) {
    showLoggedInUI(session.user);
  }
  supabaseClient.auth.onAuthStateChange((event, newSession) => {
    if (newSession?.user) {
      showLoggedInUI(newSession.user);
      currentUser = newSession.user;
    } else {
      document.getElementById('qt-auth-buttons').classList.remove('hidden');
      document.getElementById('qt-user-chip-wrap').classList.add('hidden');
      currentUser = null;
    }
  });
}

async function showLoggedInUI(user) {
  document.getElementById('qt-auth-buttons').classList.add('hidden');
  document.getElementById('qt-user-chip-wrap').classList.remove('hidden');

  let nickname = user.email?.split('@')[0] || '用戶';
  try {
    const { data: userRow } = await supabaseClient.from('users').select('display_name').eq('id', user.id).single();
    if (userRow?.display_name) nickname = userRow.display_name;
  } catch (err) {
    console.warn('讀取暱稱失敗，改用 email 帳號名顯示:', err);
  }

  document.getElementById('qt-username-display').textContent = nickname;
  document.getElementById('qt-avatar-initial').textContent = nickname.charAt(0).toUpperCase();
}

function toggleUserDropdown() {
  document.getElementById('qt-dropdown').classList.toggle('show');
}
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('qt-user-chip-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('qt-dropdown')?.classList.remove('show');
  }
});
function handleLogoutGames() {
  if (confirm(i18nBubble[currentLang].confirmLogout)) {
    supabaseClient.auth.signOut().then(() => { window.location.reload(); });
  }
}

    noFastest: '記録なし', secUnit: '秒',
  },
  en: {
    gameTitle: '🫧 Infinite Bubble Wrap', gameSub: 'Pop a full sheet and a fresh one appears instantly!',
    back: '← Game Lobby', progress: '📊 Progress', login: 'Log in', signup: 'Sign up', profile: '👤 Profile', logout: '🚪 Log out',
    statTotalLabel: 'Total Popped', statFastestLabel: 'Fastest (sec)', sheetComplete: '🎉 Sheet complete! A new one appears~',
    styleDefault: '🫧 Classic Bubbles', styleFire: '🧨 Firecracker Mode', unlockFire: 'Unlock after 500 total pops',
    lockedHint: (text) => `This style is locked (${text}). Keep playing to unlock it!`, confirmLogout: 'Log out?',
    progressModal: (total, fastest, unlocked, totalStyles) => `📊 Infinite Bubble Wrap\n\nTotal popped: ${total}\nFastest sheet: ${fastest}\nStyles unlocked: ${unlocked} / ${totalStyles}`,
    noFastest: 'No record yet', secUnit: 's',
  },
};
let currentLang = 'zh';
function setLang(l) {
  currentLang = l;
  document.querySelectorAll('[data-lang-btn]').forEach(b => b.classList.toggle('active', b.dataset.langBtn === l));
  localStorage.setItem('quizdrop_lang', l);
  const t = i18nBubble[l];
  document.querySelector('.game-title').textContent = t.gameTitle;
  document.querySelector('.game-sub').textContent = t.gameSub;
  document.querySelector('.back').textContent = t.back;
  document.querySelector('.tb-btn').textContent = t.progress;
  const loginBtn = document.querySelector('.qt-login');
  const signupBtn = document.querySelector('.qt-signup');
  if (loginBtn) loginBtn.textContent = t.login;
  if (signupBtn) signupBtn.textContent = t.signup;
  document.querySelector('#qt-dropdown button:not(.danger)').textContent = t.profile;
  document.querySelector('#qt-dropdown button.danger').textContent = t.logout;

  document.getElementById('stat-total-label').textContent = t.statTotalLabel;
  document.getElementById('stat-fastest-label').textContent = t.statFastestLabel;
  document.getElementById('sheet-complete-banner').textContent = t.sheetComplete;
  renderStyleRow();
}

(function initLangFromStorage() {
  const saved = localStorage.getItem('quizdrop_lang') || 'zh';
  setLang(saved);
})();

/* 所有初始化呼叫統一放在檔案最末端，確保 currentLang 等變數已宣告完畢 */
renderGrid();
renderStyleRow();
initAuthUI();
</script>
</body>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizDrop 測驗</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
  :root {
    --bg:#faf7f2; --bg2:#fff; --card:#fff;
    --accent:#ff5da2; --accent2:#ff8a5c; --gold:#e8a838;
    --text:#2d2d2d; --muted:#999; --radius:18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; }
  body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 60px; }
  .hidden { display: none !important; }

  .quiz-topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 58px;
    background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
    border-bottom: 1px solid #f0f0f0; z-index: 100;
    display: flex; align-items: center; padding: 0 16px; gap: 10px;
  }
  .quiz-topbar .back { color: var(--muted); font-size: 13px; text-decoration: none; display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .quiz-topbar .spacer { flex: 1; }
  .qt-btn { padding: 7px 16px; border-radius: 99px; font-weight: 700; font-size: 12.5px; cursor: pointer; border: none; }
  .qt-login { background: transparent; color: var(--text); border: 1.5px solid #ececec; }
  .qt-signup { background: linear-gradient(120deg,var(--accent),var(--accent2)); color: #fff; }
  .qt-user-chip { display: flex; align-items: center; gap: 7px; background: #f6f6f6; border-radius: 99px; padding: 5px 12px 5px 5px; cursor: pointer; font-size: 12.5px; font-weight: 600; }
  .qt-avatar { width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(120deg,var(--accent),var(--accent2)); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 800; }
  body { padding-top: 80px; }

  .creator-badge { display: inline-flex; align-items: center; gap: 5px; background: #fff0f5; color: var(--accent); font-size: 11.5px; font-weight: 700; padding: 4px 12px; border-radius: 99px; margin-bottom: 14px; }

  .hero { text-align: center; padding: 8px 16px 28px; max-width: 600px; }
  .hero-emoji-wrap { width: 80px; height: 80px; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; }
  .hero-emoji { font-size: 52px; }
  .hero h1 { font-size: clamp(18px, 4.6vw, 26px); font-weight: 900; line-height: 1.4; margin-bottom: 10px; }
  .hero p { color: var(--muted); font-size: 14px; line-height: 1.7; }

  .progress-wrap { width: 100%; max-width: 560px; margin: 20px auto 0; }
  .step-dots { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 6px; }
  .step-dot { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid #ececec; background: #fff; color: var(--muted); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .2s; }
  .step-dot.answered { background: #fff0f5; border-color: var(--accent); color: var(--accent); }
  .step-dot.current { background: linear-gradient(135deg,var(--accent),var(--accent2)); border-color: transparent; color: #fff; transform: scale(1.15); }
  .step-dot.locked { opacity: 0.35; cursor: not-allowed; }

  .quiz-card { background: var(--card); border: 1px solid #f0f0f0; border-radius: var(--radius); padding: 30px 26px; max-width: 560px; width: 100%; margin-top: 24px; box-shadow: 0 4px 20px -10px rgba(0,0,0,0.06); }
  .q-num { font-size: 12px; color: var(--accent); font-weight: 600; letter-spacing: .06em; margin-bottom: 10px; }
  .q-text { font-size: 17px; font-weight: 700; line-height: 1.6; margin-bottom: 22px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt { background: #fafafa; border: 1.5px solid #ececec; border-radius: 14px; padding: 15px 18px; cursor: pointer; font-size: 14.5px; line-height: 1.6; text-align: left; color: var(--text); font-family: inherit; transition: all .18s; }
  .opt:hover { border-color: var(--accent); background: #fff5f8; }
  .opt.selected { border-color: var(--accent); background: #fff0f5; }

  .unanswered-warning { background: #fff7e6; color: #b8860b; font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-top: 14px; text-align: center; display: none; }
  .unanswered-warning.show { display: block; }
  .nav-row { display: flex; gap: 10px; margin-top: 22px; }
  .btn-prev { background: #fafafa; color: var(--muted); border: 1.5px solid #ececec; border-radius: 14px; padding: 15px 22px; font-size: 14.5px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
  .btn-prev:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-next { background: linear-gradient(135deg,var(--accent),var(--accent2)); color: #fff; border: none; border-radius: 14px; padding: 15px 36px; font-size: 15.5px; font-weight: 700; cursor: pointer; flex: 1; }

  .result-card { background: var(--card); border: 1px solid #f0f0f0; border-radius: var(--radius); padding: 38px 26px; max-width: 560px; width: 100%; margin-top: 24px; text-align: center; display: none; box-shadow: 0 4px 24px -10px rgba(0,0,0,0.08); }
  .result-emoji { font-size: 64px; display: block; margin-bottom: 14px; }
  .result-title { font-size: 25px; font-weight: 900; color: var(--accent); margin-bottom: 14px; }
  .result-desc { color: #555; font-size: 14.5px; line-height: 1.85; margin-bottom: 22px; text-align: left; }
  .save-status { font-size: 12.5px; padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; background: #fff0f5; color: var(--accent); }
  .save-status.guest { background: #fff7e6; color: #b8860b; }

  .share-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 16px; }
  .share-btn { border: none; border-radius: 12px; padding: 12px 10px; font-size: 13.5px; font-weight: 600; cursor: pointer; }
  .btn-twitter { background: #000; color: #fff; }
  .btn-line { background: #06C755; color: #fff; }
  .btn-fb { background: #1877F2; color: #fff; }
  .btn-copy { background: #fafafa; color: var(--text); border: 1.5px solid #ececec; }
  .btn-retry { background: linear-gradient(135deg,var(--accent),var(--accent2)); color: #fff; border: none; border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; }

  .cta-make-own { margin-top: 18px; padding: 16px; background: #fff7ed; border-radius: 14px; font-size: 13px; color: #b8860b; }
  .cta-make-own a { color: var(--accent); font-weight: 700; text-decoration: none; }

  #start-screen { max-width: 560px; width: 100%; text-align: center; }
  .btn-start { background: linear-gradient(135deg,var(--accent),var(--accent2)); color: #fff; border: none; border-radius: 16px; padding: 18px 48px; font-size: 16.5px; font-weight: 800; cursor: pointer; box-shadow: 0 8px 24px -6px rgba(255,93,162,.4); }
  .notice { color: var(--muted); font-size: 13px; margin-top: 14px; }

  .loading-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .home-link { margin-top: 22px; text-align: center; }
  .home-link a { color: var(--muted); font-size: 13px; text-decoration: none; border-bottom: 1px solid #ddd; padding-bottom: 2px; }
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--accent); color: #fff; padding: 10px 24px; border-radius: 99px; font-size: 14px; font-weight: 500; opacity: 0; transition: all .3s; pointer-events: none; z-index: 9999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="quiz-topbar">
  <a href="index.html" class="back">← QuizDrop</a>
  <div class="spacer"></div>
  <div id="qt-auth-buttons" style="display:flex; gap:8px;">
    <button class="qt-btn qt-login" onclick="window.location.href='index.html'">登入</button>
    <button class="qt-btn qt-signup" onclick="window.location.href='index.html'">註冊</button>
  </div>
  <div id="qt-user-chip-wrap" class="hidden">
    <div class="qt-user-chip" onclick="window.location.href='profile.html'">
      <div class="qt-avatar" id="qt-avatar-initial">U</div>
      <span id="qt-username-display">用戶</span>
    </div>
  </div>
</div>

<div id="loading" class="loading-state">載入測驗中...</div>

<div id="quiz-content" class="hidden">
  <div class="hero">
    <div class="creator-badge hidden" id="creator-badge">✨ 網友創作測驗</div>
    <div class="hero-emoji-wrap"><span class="hero-emoji">🔮</span></div>
    <h1 id="hero-title"></h1>
    <p id="hero-sub"></p>
  </div>

  <div id="start-screen">
    <button class="btn-start" onclick="startQuiz()">開始測驗 →</button>
    <p class="notice" id="notice-text"></p>
  </div>

  <div class="progress-wrap hidden" id="progress-wrap">
    <div class="step-dots" id="step-dots"></div>
  </div>

  <div class="quiz-card hidden" id="quiz-card">
    <div class="q-num" id="q-num"></div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <div class="unanswered-warning" id="unanswered-warning">⚠️ 請先選擇一個答案才能繼續</div>
    <div class="nav-row">
      <button class="btn-prev" id="btn-prev" onclick="prevQ()">← 上一題</button>
      <button class="btn-next hidden" id="btn-next" onclick="nextQ()">查看結果 ✨</button>
    </div>
  </div>

  <div class="result-card" id="result-card">
    <span class="result-emoji">🎉</span>
    <div class="result-title" id="r-title"></div>
    <div class="save-status" id="save-status"></div>
    <div class="result-desc" id="r-desc"></div>

    <p style="font-size:13px;color:#999;margin-bottom:12px;">分享你的結果</p>
    <div class="share-grid">
      <button class="share-btn btn-twitter" onclick="shareTwitter()">𝕏 Twitter / X</button>
      <button class="share-btn btn-line" onclick="shareLine()">💬 LINE</button>
      <button class="share-btn btn-fb" onclick="shareFacebook()">📘 Facebook</button>
      <button class="share-btn btn-copy" onclick="copyResult()">📋 複製</button>
    </div>
    <button class="btn-retry" onclick="retry()">再測一次</button>

    <div class="cta-make-own" id="cta-make-own">
      想自己出一個這樣的測驗？<a href="create.html">立即創作 →</a>
    </div>

    <div class="home-link"><a href="index.html">← 回 QuizDrop 首頁</a></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://xsflpzozgdgbtrtdzdlj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzZmxwem96Z2RnYnRydGR6ZGxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTMyMzUsImV4cCI6MjA5NzE4OTIzNX0.Uyi5dYa73h0JJ9KwT2bP0C79wV_H-PoYneiR5xsbT6I';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const urlParams = new URLSearchParams(window.location.search);
const QUIZ_ID = urlParams.get('id');

let quizData = null;       // { questions, results, scoring_note }
let scoringType = 'tag';   // 'tag' (UGC標籤計次法) 或 'dimension' (官方維度法，這個播放器主要服務 UGC)
let isOfficial = false;
let current = 0;
let answers = [];
let selected = null;
let currentUser = null;
let finalResult = null;

async function loadQuiz() {
  if (!QUIZ_ID) {
    document.getElementById('loading').textContent = '找不到測驗 ID，請確認連結是否正確';
    return;
  }

  try {
    const { data: { session } } = await supabaseClient.auth.getSession();
    currentUser = session?.user || null;
    await updateTopbarAuthState();

    const { data, error } = await supabaseClient
      .from('quizzes')
      .select('title, description, questions, results, scoring_type, is_official')
      .eq('id', QUIZ_ID)
      .single();

    if (error) throw error;

    quizData = { questions: data.questions, results: data.results.results };
    scoringType = data.scoring_type || 'tag';
    isOfficial = data.is_official;

    document.getElementById('hero-title').textContent = data.title;
    document.getElementById('hero-sub').textContent = data.description || '';
    document.getElementById('notice-text').textContent = `共 ${quizData.questions.length} 題 · 結果僅供娛樂參考`;

    if (!isOfficial) {
      document.getElementById('creator-badge').classList.remove('hidden');
    } else {
      document.getElementById('cta-make-own').classList.add('hidden');
    }

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('quiz-content').classList.remove('hidden');

    const resultIdFromUrl = urlParams.get('result');
    if (resultIdFromUrl) {
      const savedResult = quizData.results.find(r => r.id === resultIdFromUrl);
      if (savedResult) {
        showSavedResult(savedResult);
        return;
      }
    }
  } catch (err) {
    document.getElementById('loading').textContent = '找不到這個測驗，可能已被刪除或連結錯誤';
    console.error(err);
  }
}
loadQuiz();

async function updateTopbarAuthState() {
  if (!currentUser) return;
  document.getElementById('qt-auth-buttons').classList.add('hidden');
  document.getElementById('qt-user-chip-wrap').classList.remove('hidden');
  let displayName = currentUser.email.split('@')[0];
  try {
    const { data } = await supabaseClient.from('users').select('display_name').eq('id', currentUser.id).single();
    if (data?.display_name) displayName = data.display_name;
  } catch (e) {}
  document.getElementById('qt-username-display').textContent = displayName;
  document.getElementById('qt-avatar-initial').textContent = displayName.charAt(0).toUpperCase();
}

function showSavedResult(result) {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('r-title').textContent = result.label;
  document.getElementById('r-desc').textContent = result.desc;
  const statusEl = document.getElementById('save-status');
  statusEl.textContent = '📜 這是你重溫的舊測驗結果';
  document.getElementById('result-card').style.display = 'block';
}

function startQuiz() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('progress-wrap').classList.remove('hidden');
  document.getElementById('quiz-card').classList.remove('hidden');
  renderDots();
  renderQ();
}

function renderDots() {
  const qs = quizData.questions;
  const wrap = document.getElementById('step-dots');
  wrap.innerHTML = qs.map((q, i) => {
    let cls = 'step-dot';
    if (i === current) cls += ' current';
    else if (answers[i]) cls += ' answered';
    else if (i > current) cls += ' locked';
    return `<button class="${cls}" onclick="jumpTo(${i})">${i + 1}</button>`;
  }).join('');
}

function jumpTo(idx) {
  if (idx > current && !answers[idx]) return;
  if (idx === current) return;
  current = idx;
  selected = answers[current] || null;
  renderQ();
}

function renderQ() {
  const qs = quizData.questions;
  const q = qs[current];
  document.getElementById('q-num').textContent = `問題 ${current + 1} / ${qs.length}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('unanswered-warning').classList.remove('show');

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach((o) => {
    const btn = document.createElement('button');
    btn.className = 'opt' + (answers[current]?.id === o.id ? ' selected' : '');
    btn.textContent = o.text;
    btn.onclick = () => selectOpt(o, btn);
    opts.appendChild(btn);
  });

  selected = answers[current] || null;
  const isLast = current === qs.length - 1;
  const nextBtn = document.getElementById('btn-next');
  if (isLast) {
    nextBtn.classList.remove('hidden');
    nextBtn.textContent = '查看結果 ✨';
  } else {
    nextBtn.classList.add('hidden');
  }
  document.getElementById('btn-prev').disabled = current === 0;
  renderDots();
}

function selectOpt(option, btn) {
  document.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selected = option;
  answers[current] = option;
  document.getElementById('unanswered-warning').classList.remove('show');
  renderDots();

  const total = quizData.questions.length;
  if (current < total - 1) {
    setTimeout(() => {
      current++;
      selected = answers[current] || null;
      renderQ();
    }, 280);
  }
}

function prevQ() {
  if (current === 0) return;
  current--;
  selected = answers[current] || null;
  renderQ();
}

function nextQ() {
  const total = quizData.questions.length;
  const unansweredIdx = quizData.questions.findIndex((_, i) => !answers[i]);
  if (unansweredIdx !== -1) {
    current = unansweredIdx;
    selected = null;
    renderQ();
    document.getElementById('unanswered-warning').classList.add('show');
    return;
  }
  showResult();
}

// 標籤計次法計分：統計每個結果 ID 累積了多少次選擇，取最高分
function calcTagScores() {
  const tally = {};
  answers.forEach(opt => {
    for (const resultId in opt.scores) {
      tally[resultId] = (tally[resultId] || 0) + opt.scores[resultId];
    }
  });
  return tally;
}

function matchResult() {
  const tally = calcTagScores();
  const entries = Object.entries(tally);
  if (entries.length === 0) return quizData.results[0];
  entries.sort((a, b) => b[1] - a[1]);
  const topResultId = entries[0][0];
  return quizData.results.find(r => r.id === topResultId) || quizData.results[0];
}

async function showResult() {
  document.getElementById('quiz-card').classList.add('hidden');
  document.getElementById('progress-wrap').classList.add('hidden');

  finalResult = matchResult();
  document.getElementById('r-title').textContent = finalResult.label;
  document.getElementById('r-desc').textContent = finalResult.desc;
  document.getElementById('result-card').style.display = 'block';
  document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'start' });

  await saveResultIfLoggedIn();
}

async function saveResultIfLoggedIn() {
  const statusEl = document.getElementById('save-status');
  if (!currentUser) {
    statusEl.className = 'save-status guest';
    statusEl.textContent = '🔓 登入後系統會自動保存你的測驗紀錄，現在是訪客模式';
    return;
  }
  try {
    const { error } = await supabaseClient.from('quiz_results').upsert({
      user_id: currentUser.id,
      quiz_id: QUIZ_ID,
      result_label: finalResult.id,
      result_title: finalResult.label,
      scores: calcTagScores(),
      played_at: new Date().toISOString(),
    }, { onConflict: 'user_id,quiz_id' });
    if (error) throw error;
    statusEl.className = 'save-status';
    statusEl.textContent = '✅ 已自動保存到你的測驗紀錄';
  } catch (err) {
    statusEl.className = 'save-status guest';
    statusEl.textContent = '⚠️ 結果保存失敗，但你還是可以看測驗結果';
    console.error(err);
  }
}

function getShareText() {
  return {
    text: `🔮 我在 QuizDrop 測出「${finalResult.label}」\n\n你也來測測看！`,
    url: window.location.href.split('?')[0] + '?id=' + QUIZ_ID
  };
}
function shareTwitter() {
  const { text, url } = getShareText();
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank', 'noopener,noreferrer');
}
function shareLine() {
  const { text, url } = getShareText();
  window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`, '_blank', 'noopener,noreferrer');
}
function shareFacebook() {
  const { text, url } = getShareText();
  navigator.clipboard.writeText(text + '\n' + url).then(() => {
    showToast('結果已複製！貼到 Facebook 貼文裡分享吧 📋', 4000);
    setTimeout(() => {
      window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank', 'noopener,noreferrer');
    }, 1200);
  });
}
function copyResult() {
  const { text, url } = getShareText();
  navigator.clipboard.writeText(text + '\n' + url).then(() => showToast('已複製！'));
}
function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function retry() {
  current = 0; answers = []; selected = null;
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('quiz-card').classList.remove('hidden');
  document.getElementById('progress-wrap').classList.remove('hidden');
  renderQ();
}
</script>
</body>
</html>
